metadata:
  name: hustler_db_schema
  class: pipeline_hustler
  type: schema
  version: '2.1'

credentials:
  description: Schema for pipeline_hustler.board.yaml and all hustler ledger/runbook files.
  when_to_use: 
  contains: >-
      Board: metadata, state(metrics, recent_events), hub, runtime(product_gaps), milestones.

hustler_db_schema: |
  metadata:
    name: string
    type: pipeline_hustler
    version: string
    schema_version: string
    freshness:
      status: fresh | syncing | error
      sync_count: integer
      last_synced_by: string
      last_synced: timestamp

  state:
    metrics:
      throughput: integer
      active_pipelines: integer
    recent_events: [string]

  hub:
    messages: [string]
    backlog: [string]
    ledger_in: [string]
    ledger_out: [string]

  runtime:
    product_gaps:
      - gap_id: string
        description: string
        discovered_by: string
        status: open | resolved

  milestones:
    "[SESSION_NAME]": {...}

sources_ledger_schema: |
  metadata:
    name: string
    type: focus_sources
    focus_id: string
    description: string
    schema_version: string
  credentials:
    description: string
    when_to_use: string
    contains: [string]
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string
  tracked_sources:
    - source_id: string
      path: string
      content_hash: string
      focus_id: string
      status: PENDING | CASCADED | REJECTED
      routed_at: timestamp

focus_ledger_schema: |
  metadata:
    name: string
    type: focus
    focus_id: string
    description: string
    schema_version: string
    market_context: {...}
  credentials:
    description: string
    when_to_use: string
    contains: [string]
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string
  tracked_products:
    - product_id: string
      name: string
      status: PENDING | VALIDATED | REJECTED
      source_ids: [string]
      cascaded_at: timestamp
  tracked_features:
    - feature_id: string
      name: string
      product_id: string
      status: NEW | DEFINED | FULFILLED
      source_ids: [string]

mixed_inbox_ledger_schema: |
  metadata:
    name: string
    description: string
    schema_version: string
  credentials:
    description: string
    when_to_use: string
    contains: [string]
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string
  tracked_items:
    - item_id: string
      path: string
      content_hash: string
      status: PENDING | PROCESSED | REJECTED
      routed_at: timestamp
