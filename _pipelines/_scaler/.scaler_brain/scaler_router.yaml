# 🧭 SCALER PIPELINE ROUTER
description: "Master index for the Scaler Pipeline. Exposes the growth engine's architecture,
  workflows, rules, gateway lifecycle, and tracking ledgers to the top-level system."
when_to_use: "Use when you need to grow the OS, evolve prompts, audit architecture,
  or process external discoveries."
schema_version: "3.1"
last_updated: '2026-05-17T04:00:43.221974'

routing_instructions:
- "The Scaler pipeline has strict Input Modes (INTERNAL, EXTERNAL, AUTO) and 3 Target
  Pillars (Foundational_Integrity, Operational_Muscles, Value_Generation). Target
  pillar always mirrors the resolved discovery type."
- "When executing an OS architectural audit, the scaler operates in INTERNAL mode.
  The identity documents (.meta_brain/meta_identity/) serve as the runbook for structural
  changes."
- "MANDATORY: Read all FIVE runbook files before any Scaler execution — Architecture,
  Workflows, Operational-Rules, Gateway, Discovery-Logic."
- "MANDATORY: Every Scaler output must pass through the gateway ([Pillar]/external_proposals/
  or [Pillar]/internal_proposals/) before integration."
- "MANDATORY: For EXTERNAL operations — consult the relevant sub-ledger ([Pillar].ledger.yaml)
  BEFORE starting any operation (anti-duplication). Then update master EXTERNAL_INBOX-LEDGER.yaml
  after."
- "MANDATORY: For INTERNAL operations — consult the relevant sub-ledger ([Pillar].ledger.yaml
  under tracked_gaps) before starting."
- "MANDATORY: Update scaler_state.yaml at the start AND end of every operation cycle."
- "MANDATORY: Check _EXTERNAL_INBOX/ staging folder FIRST in Phase 1 before scanning
  discovery folders. Route staged items before processing discoveries."
- "Cards use primary_aspect (folder location) + aspects list (all applicable). 14
  valid aspects — see Scaler-Architecture.md §3."
- "CRITICAL: Never guess file paths. Always use the absolute paths explicitly provided
  within these routers."

components:
  runbook:
    path: "_pipelines/_scaler/.scaler_brain/_scaler_runbooks/"
    description: "The identity, operational rules, and discovery logic for the Scaler.
      Read ALL 5 files before executing."
    files:
    - name: "Scaler-Architecture.md"
      description: "Defines pipeline layers, input modes, pillar-based discovery structure,
        14 granular OS aspects with multi-aspect rule, Strategic Interrogation engine,
        and granular action_gate behavior."
      when_to_use: "Read first — establishes the fundamental laws of how the Scaler
        operates. Contains the full aspect map and Scope Creation Law."

    - name: "Scaler-Workflows.md"
      description: "Implements the 5-phase execution approach (Discovery → Mapping
        → Engineering → Architecting/Proposing → Integration). Features the Double-Scan
        Protocol and Strategic Interrogation (Identify Targets first). Supports multi-target/multi-type
        proposals (v3.1)."
      when_to_use: "Read when executing a Scaler task. Follow the phase-by-phase execution
        path and integration strategy table."

    - name: "Scaler-Operational-Rules.md"
      description: "Strict rules, constraints, and prohibitions. P-LAW-001 enforces
        atomic update. P-LAW-004 lists all 14 valid aspects. Contains the Laws of
        System Evolution and card schemas v3.1 with target_pillar and integration_strategy
        blocks."
      when_to_use: "Read always during Scaler operations to ensure compliance. Contains
        the card schemas used for all gateway outputs."

    - name: "Scaler-Gateway.md"
      description: "Single authoritative reference for the full Proposal/Solution
        Card lifecycle. Includes Step 5 Verification Scan and Step 6 Failure Recovery
        (Remediation Cards). Lists all 14 valid primary_aspect values and integration
        types."
      when_to_use: "Read whenever creating a Proposal Card or Solution Card. Contains
        the step-by-step lifecycle, NOTES re-approval loop, and post-integration verification
        requirements."

    - name: "Scaler-Discovery-Logic.md"
      description: "Prescriptive discovery boundary logic and selection criteria for
        Phase 1 and Phase 2. Defines the Laws of DNA Preservation (UPGRADE Protocol).
        Table resolves Integration Types (INJECT, UPGRADE, BUILD_NEW, EXTEND) based
        on Selection Criteria."
      when_to_use: "Read before scanning any discovery folder. Mandatory for Phase
        1 (Discovery) and Phase 2 (Mapping & Tracking) of every EXTERNAL cycle."

  scratch:
    path: "_pipelines/_scaler/.scaler_runtime/.scaler_scratch/"
    description: "Automation scripts and engines for the Scaler (similar to .sync_engine).
      Not for drafting proposals or processing data."
    files: []

  tracker:
    path: "_pipelines/_scaler/.scaler_brain/scaler_ledgers/"
    description: "Granular tracking of all external files, internal gaps, proposals,
      solutions, and gateway state. Schema version 3.1 — supports the strategic gateway
      card lifecycle."
    files:
    - name: "scaler_history.yaml"
      description: "Immutable append-only history of Scaler evolution events, integrations,
        and structural audits."
    - name: "scaler_state.yaml"
      description: "Current high-level operational state, phase, active_mode mirror
        (granular action_gate, input_mode, target_pillar), discovery metrics, and
        gateway_metrics. Update at START and END of every operation."
      when_to_use: "Update when changing phases, starting operations, creating cards,
        or completing integrations."

    - name: "EXTERNAL_INBOX-LEDGER.yaml"
      description: "Schema v3.1. MASTER ROLLUP — aggregates counts from sub-ledgers
        + directly tracks D-level discoveries only. Sub-ledger index: Foundational_Integrity.ledger.yaml,
        Operational_Muscles.ledger.yaml, Value_Generation.ledger.yaml. Always update
        the sub-ledger FIRST."
      when_to_use: "Update master counts AFTER the sub-ledger is updated. Add D-level
        discovery entries here."

  gateway:
    external_proposals:
      path: "_pipelines/_scaler/[Pillar]/external_proposals/"
      description: "Distributed gateway folders for all EXTERNAL outputs. Structure:
        external_proposals/PROPOSAL-[ID].yaml inside Foundational_Integrity/, Operational_Muscles/,
        or Value_Generation/ roots."
      when_to_use: "All EXTERNAL Scaler outputs MUST be materialized in the relevant
        pillar's external_proposals/ folder before integration."

    discoveries:
      path: "_pipelines/_scaler/[Pillar]/_external_discoveries/"
      description: "Pillar-based discovery roots. 3 main pillars (Foundational_Integrity/,
        Operational_Muscles/, Value_Generation/). The pipeline contains a master _EXTERNAL_INBOX/
        staging folder and [Pillar].ledger.yaml sub-ledgers in scaler_ledgers/."
      when_to_use: "Phase 1 entry point. Check _EXTERNAL_INBOX/ staging folder first,
        then scan pillar roots. Apply Scaler-Discovery-Logic.md before classifying
        any item."

    internal_actions:
      path: "_pipelines/_scaler/[Pillar]/internal_proposals/"
      description: "Gateway folder for all INTERNAL outputs. Structure: internal_proposals/MEGA-INT-[ID].yaml.
        Uses consolidated v4.0 Mega-YAML."
      when_to_use: "All INTERNAL Scaler outputs MUST be materialized here as an Internal
        Action Card before integration."

telemetry:
  gateway:
    pending_approvals: 0
    last_action:
    integration_queue: 0
  discoveries:
    total_discoveries: 0
    total_integrated: 0
    total_pending: 0
    total_rejected: 0
    total_proposed: 0
    total_active_gaps: 0
    total_resolved_gaps: 1
  internal_gaps:
    active_gaps: 0
    resolved_gaps: 1
