# 🧭 SCALER PIPELINE ROUTER
description: "Master index for the Scaler Pipeline. Exposes the growth engine's architecture,\
  \ workflows, rules, gateway lifecycle, and tracking ledgers to the top-level system."
when_to_use: "Use when you need to grow the OS, evolve prompts, audit architecture,\
  \ or process external discoveries."
schema_version: "3.1"
last_updated: '2026-05-18T17:19:45.440482'

routing_instructions:
- "The Scaler pipeline has strict Input Modes (INTERNAL, EXTERNAL, AUTO) and 3 Target\
  \ Pillars (Foundational_Integrity, Operational_Muscles, Value_Generation). Target\
  \ pillar always mirrors the resolved discovery type."
- "When executing an OS architectural audit, the scaler operates in INTERNAL mode.\
  \ The identity documents (.meta_brain/meta_identity/) serve as the runbook for structural\
  \ changes."
- "MANDATORY: Read all FIVE runbook files before any Scaler execution — Architecture,\
  \ Workflows, Operational-Rules, Gateway, Discovery-Logic."
- "MANDATORY: Every Scaler output must pass through the gateway ([Pillar]_external_proposals/\
  \ or [Pillar]_internal_proposals/ at the pipeline root) before integration."
- "MANDATORY: For EXTERNAL operations — consult the relevant `[Pillar].sources_ledger.yaml`\
  \ (anti-duplication via content hash) BEFORE starting. Items in .scaler_mixed_inbox/\
  \ also gate against .scaler_mixed_inbox.ledger.yaml. The auto-sync rolls all per-pillar\
  \ split files into the .scaler_routing/scaler_ledgers.yaml rollup."
- "MANDATORY: For INTERNAL operations — consult the relevant `[Pillar].proposals_ledger.yaml`\
  \ under tracked_gaps before starting."
- "MANDATORY: Update scaler_state.yaml at the start AND end of every operation cycle."
- "MANDATORY: Check _SCALER-EXTERNAL_SOURCES/ inboxes (.scaler_mixed_inbox/, _[Pillar]_inbox/)\
  \ FIRST in Phase 1 before scanning _SCALER-EXTERNAL_SOURCES/[Pillar]_discoveries/.\
  \ Route staged items before processing discoveries."
- "Cards use primary_aspect (folder location) + aspects list (all applicable). 14\
  \ valid aspects — see Scaler-Architecture.md §3."
- "CRITICAL: Never guess file paths. Always use the absolute paths explicitly provided\
  \ within these routers."

components:
  runbook:
    path: "_pipelines/_scaler/.scaler_brain/scaler_runbooks/"
    description: "The identity, operational rules, and discovery logic for the Scaler.\
      \ Read ALL 5 files before executing."
    files:
    - name: "Scaler-Architecture.md"
      description: "Systemic Metabolism. The Scaler pipeline is the **Systemic Growth\
        \ Engine** of the Agentic OS. Its mission is the continuous evaluation, enhancement,\
        \ and extension of the workspace scopes. It utilizes a **5-Phase Execu..."
      when_to_use: "Read first — establishes the fundamental laws of how the Scaler\
        \ operates. Contains the full aspect map and Scope Creation Law."

    - name: "Scaler-Workflows.md"
      description: "A periodic, on-demand workflow that scans the Scaler's own state\
        \ for drift between the live workspace and what its ledgers/state files claim.\
        \ Outputs an INTERNAL Mega-YAML if drift is detected. **The Audit Pass is\
        \ Scaler-internal only — it scans Scaler artifacts only and never touches\
        \ the Hustler pipeline.**"
      when_to_use: "Read when executing a Scaler task. Follow the phase-by-phase execution\
        \ path and integration strategy table."

    - name: "Scaler-Operational-Rules.md"
      description: "Define the operational rules and constraints for the Scaler pipeline."
      when_to_use: "Read always during Scaler operations to ensure compliance. Contains\
        \ the card schemas used for all gateway outputs."

    - name: "Scaler-Gateway.md"
      description: "Single authoritative reference for the complete lifecycle of a\
        \ Proposal Card (EXTERNAL) or Solution Card (INTERNAL) — from creation through\
        \ integration and post-integration sync. All Scaler outputs MUST pass through\
        \ t..."
      when_to_use: "Read whenever creating a Proposal Card or Solution Card. Contains\
        \ the step-by-step lifecycle, NOTES re-approval loop, and post-integration\
        \ verification requirements."

    - name: "Scaler-Discovery-Logic.md"
      description: "Define what constitutes an individual Discovery, a Sub-Discovery,\
        \ and deeper levels — and how to process multi-depth discoveries before proposing.\
        \ This is a mandatory reference for Phase 1 (Discovery) and Phase 2 (Map..."
      when_to_use: "Read before scanning any discovery folder. Mandatory for Phase\
        \ 1 (Discovery) and Phase 2 (Mapping & Tracking) of every EXTERNAL cycle."

  scratch:
    path: "_pipelines/_scaler/.scaler_runtime/.scaler_scratch/"
    description: "Automation scripts and engines for the Scaler (similar to .sync_engine).\
      \ Not for drafting proposals or processing data."
    files: []

# ─── Engine Descriptor (master sync contract — never edit manually) ──────────
# Read by .meta_brain/.meta_routing/meta_sync_engines/pipelines_sync.py.
# The pipeline router self-declares HOW to sync itself so the OS-level engine
# never hardcodes paths to drift from.
engine:
  sync_script: "_pipelines/_scaler/.scaler_brain/scaler_sync.py"
  state_file: "_pipelines/_scaler/.scaler_brain/.scaler_routing/scaler_state.yaml"

  tracker:
    path: "_pipelines/_scaler/.scaler_brain/scaler_ledgers/"
    description: "Granular tracking of all external files, internal gaps, proposals,\
      \ solutions, and gateway state. Schema version 3.1 — supports the strategic\
      \ gateway card lifecycle."
    files:
    - name: "scaler_history.yaml"
      description: "Immutable append-only history of Scaler evolution events, integrations,\
        \ and structural audits."
    - name: "scaler_state.yaml"
      description: "Current high-level operational state, phase, active_mode mirror\
        \ (granular action_gate, input_mode, target_pillar), discovery metrics, and\
        \ gateway_metrics. Update at START and END of every operation."
      when_to_use: "Update when changing phases, starting operations, creating cards,\
        \ or completing integrations."

    - name: "[Pillar].sources_ledger.yaml"
      description: "Per-pillar anti-duplication tracker for raw EXTERNAL discoveries\
        \ cascaded into this pillar. Holds tracked_discoveries[] with content hashes.\
        \ One file per pillar (Foundational_Integrity, Operational_Muscles, Value_Generation)."
      when_to_use: "Update atomically when ingesting/routing a discovery into the\
        \ pillar's hub. Anti-duplication source-of-truth."

    - name: "[Pillar].proposals_ledger.yaml"
      description: "Per-pillar gateway-card audit trail. Holds tracked_gaps[] (active\
        \ internal gaps awaiting cards) and history[] (integrated/rejected gaps and\
        \ proposals). One file per pillar."
      when_to_use: "Update atomically with card creation, integration, or rejection."

    - name: ".scaler_mixed_inbox.ledger.yaml"
      description: "Anti-duplication tracker for items in .scaler_mixed_inbox/. Each\
        \ entry records content hash + timestamp so the same source is never cascaded\
        \ twice."
      when_to_use: "Read before cascading any item out of .scaler_mixed_inbox/. Update\
        \ atomically with the cascade move."

  gateway:
    external_proposals:
      path: "_pipelines/_scaler/[Pillar]_external_proposals/"
      description: "Flat gateway folders at the pipeline root for all EXTERNAL outputs.\
        \ One folder per pillar: Foundational_Integrity_external_proposals/, Operational_Muscles_external_proposals/,\
        \ Value_Generation_external_proposals/. Cards: PROPOSAL-[ID].yaml."
      when_to_use: "All EXTERNAL Scaler outputs MUST be materialized in the relevant\
        \ pillar's *_external_proposals/ folder before integration."

    discoveries:
      path: "_pipelines/_scaler/_SCALER-EXTERNAL_SOURCES/[Pillar]_discoveries/"
      description: "Pillar-based discovery roots inside _SCALER-EXTERNAL_SOURCES/.\
        \ 3 main roots (Foundational_Integrity_discoveries/, Operational_Muscles_discoveries/,\
        \ Value_Generation_discoveries/). _SCALER-EXTERNAL_SOURCES/ also contains\
        \ the staging inboxes (.scaler_mixed_inbox/, _[Pillar]_inbox/) and the user-space\
        \ zone (.scaler_USER-SPACE/ for complex_systems/ and others/). Per-pillar\
        \ split ledgers ([Pillar].sources_ledger.yaml + .proposals_ledger.yaml) live\
        \ in scaler_ledgers/."
      when_to_use: "Phase 1 entry point. Check _SCALER-EXTERNAL_SOURCES/ inboxes first,\
        \ then scan [Pillar]_discoveries/. Apply Scaler-Discovery-Logic.md before\
        \ classifying any item. NEVER scan .scaler_USER-SPACE/."

    internal_actions:
      path: "_pipelines/_scaler/[Pillar]_internal_proposals/"
      description: "Flat gateway folders at the pipeline root for all INTERNAL outputs.\
        \ One folder per pillar: Foundational_Integrity_internal_proposals/, Operational_Muscles_internal_proposals/,\
        \ Value_Generation_internal_proposals/. Cards: MEGA-INT-[ID].yaml. Uses consolidated\
        \ v4.0 Mega-YAML."
      when_to_use: "All INTERNAL Scaler outputs MUST be materialized in the relevant\
        \ pillar's *_internal_proposals/ folder as an Internal Action Card before\
        \ integration."

