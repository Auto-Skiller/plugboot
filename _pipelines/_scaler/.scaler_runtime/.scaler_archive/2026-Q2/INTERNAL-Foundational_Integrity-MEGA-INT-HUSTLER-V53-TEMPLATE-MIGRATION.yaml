    - path: _pipelines/hustler/.hustler_brain/hustler_sync.py
      action: CREATE
    # Ledgers
    - path: _pipelines/hustler/.hustler_brain/hustler_ledgers/hustler_state.yaml
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/hustler_ledgers/discoveries.ledger.yaml
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/hustler_ledgers/_not_routed.ledger.yaml
      action: CREATE
    # Sync engines
    - path: _pipelines/hustler/.hustler_brain/.hustler_routing/hustler_sync_engines/hustler_runtime_sync.py
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/.hustler_routing/hustler_sync_engines/hustler_state_sync.py
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/.hustler_routing/hustler_sync_engines/hustler_ledgers_sync.py
      action: CREATE
    # Runbooks (rewrites preserving content)
    - path: _pipelines/hustler/.hustler_brain/hustler_runbooks/Hustler-Architecture.md
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/hustler_runbooks/Hustler-Workflows.md
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/hustler_runbooks/Hustler-Operational-Rules.md
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/hustler_runbooks/Hustler-Cascading-Logic.md
      action: CREATE
    - path: _pipelines/hustler/.hustler_brain/hustler_runbooks/Hustler-Tagging-System.md
      action: CREATE
    # Upstream references
    - path: .meta_brain/.meta_routing/pipelines.yaml
      action: EDIT
    - path: .meta_brain/.meta_routing/meta_sync_engines/pipelines_sync.py
      action: EDIT

