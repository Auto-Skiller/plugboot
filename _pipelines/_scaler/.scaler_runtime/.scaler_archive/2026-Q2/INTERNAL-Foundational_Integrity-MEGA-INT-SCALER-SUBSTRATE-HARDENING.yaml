schema_version: "4.0"
action_id: MEGA-INT-SCALER-SUBSTRATE-HARDENING
primary_aspect: pipeline_scaler
aspects:
  - pipeline_scaler
  - routing_and_syncing
  - identity_architecture
target_pillar: Foundational_Integrity
description: >
  Substrate hardening pass on the Scaler brain. Naming consistency, archive
  bloat prevention, audit-trail backfill, sync engine parity with meta_sync.py,
  and cross-OS launcher alignment for sub-syncs. (Cluster C of substrate audit.)

gap:
  gap_id: GAP-SCALER-SUBSTRATE-HARDENING
  description: |
    G5: `.scaler_brain/_scaler_runbooks/` uses underscore prefix while sibling
        `.scaler_routing/` uses dot prefix. Per Naming-Conventions.md §1, runbooks
        are systemic identity content — should align with `.scaler_routing/`
        convention. Rename to `scaler_runbooks/` (no prefix, matches `scaler_ledgers/`)
        which is more conservative — runbooks are "permanent reference material"
        not "immutable infrastructure".

    G6: master ledger filename `EXTERNAL_INBOX-LEDGER.yaml` references the retired
        `_EXTERNAL_INBOX/` folder name (renamed to `EXTERNAL_SOURCES/` in v5.3).
        Rename to `EXTERNAL_SOURCES-LEDGER.yaml` for consistency.

    G7: meta_runtime_sync.py recursively walks `.scaler_archive/` and lists every
        archived card as a separate `runtime_infrastructure` row. Router balloons
        linearly with archive size (already 6 rows just from 4 archived cards).

    G9: 2 archived cards (MEGA-INT-LEDGERS, MEGA-INT-IDENTITY-PATH-SYNC) have no
        ledger history entry. Audit trail orphaned. One-time backfill needed.

    G11: scaler_sync.py lacks `--validate` and `--dry-run` flags that meta_sync.py
         provides. Sub-syncs already accept --dry-run but the master orchestrator
         doesn't propagate it.

    G12: scaler_sync.py doesn't auto-extract runbook descriptions; scaler_router.yaml
         components.runbook.files[] descriptions drift over time. meta_sync.py has
         the extract_identity_metadata() pattern; mirror it.

solution:
  solution_id: SOL-INT-SCALER-SUBSTRATE-HARDENING
  change_type: AUDIT_AND_REMEDIATE
  integration_strategy:
    target_scan_results:
      current_state: |
        Five distinct hardening targets identified via direct audit. All within
        the .scaler_brain/ substrate; no impact on user-space content or
        EXTERNAL_SOURCES discoveries.
      delta_analysis: |
        Pure substrate refinement. G5 + G6 are renames (Logic Preservation
        respected). G7 + G11 + G12 add capability without removing any. G9 is
        a one-time data backfill.
    execution_plan:
      steps:
        - "1. G5: rename .scaler_brain/_scaler_runbooks/ to .scaler_brain/scaler_runbooks/ (use git mv); update all 6 references in scaler_router.yaml + Scaler-Operational-Rules P-LAW-008 + Scaler-Architecture §1"
        - "2. G6: rename scaler_ledgers/EXTERNAL_INBOX-LEDGER.yaml to scaler_ledgers/EXTERNAL_SOURCES-LEDGER.yaml; update scaler_ledgers_sync.py and 6 runbook references"
        - "3. G7: in meta_runtime_sync.py, replace rglob('*') recursion with iterdir() + skip-list for .scaler_archive/ and .scaler_scratch/ (register the roots only, not their contents)"
        - "4. G9: backfill MEGA-INT-LEDGERS + MEGA-INT-IDENTITY-PATH-SYNC into Foundational_Integrity.ledger.yaml history with reconstructed metadata"
        - "5. G11: add --validate (read-only structural check) and --dry-run pass-through to scaler_sync.py"
        - "6. G12: add extract_runbook_metadata() to scaler_sync.py mirroring meta_sync.py's pattern; populate scaler_router.yaml.components.runbook.files[].description from runbook content"
        - "7. Run meta_run.ps1 .meta_brain\\meta_sync.py; verify all routes resolve, archive bloat absent, runbook metadata extracted"
      verification: |
        - .scaler_brain/scaler_runbooks/ exists with 5 .md files, _scaler_runbooks/ does not
        - scaler_ledgers/EXTERNAL_SOURCES-LEDGER.yaml exists, EXTERNAL_INBOX-LEDGER.yaml does not
        - scaler_runtime.yaml.runtime_infrastructure has ≤ 4 keys (only top-level dirs)
        - Foundational_Integrity.ledger.yaml history has 4+ entries (3 path-fixes + GSD via Op_Muscles)
        - scaler_sync.py --validate exits 0; --dry-run produces no writes
        - scaler_router.yaml.components.runbook.files[*].description not empty
        - meta_sync.py Health 100%, [!] Sync Complete
  files_involved:
    - path: _pipelines/_scaler/.scaler_brain/_scaler_runbooks/
      action: MOVE
    - path: _pipelines/_scaler/.scaler_brain/scaler_ledgers/EXTERNAL_INBOX-LEDGER.yaml
      action: MOVE
    - path: _pipelines/_scaler/.scaler_brain/scaler_router.yaml
      action: EDIT
    - path: _pipelines/_scaler/.scaler_brain/.scaler_routing/scaler_sync_engines/meta_runtime_sync.py
      action: EDIT
    - path: _pipelines/_scaler/.scaler_brain/.scaler_routing/scaler_sync_engines/scaler_ledgers_sync.py
      action: EDIT
    - path: _pipelines/_scaler/.scaler_brain/scaler_sync.py
      action: EDIT
    - path: _pipelines/_scaler/.scaler_brain/scaler_runbooks/Scaler-Operational-Rules.md
      action: EDIT
    - path: _pipelines/_scaler/.scaler_brain/scaler_runbooks/Scaler-Architecture.md
      action: EDIT
    - path: _pipelines/_scaler/.scaler_brain/scaler_ledgers/Foundational_Integrity.ledger.yaml
      action: EDIT

user_decision: APPROVED
action_gate_at_creation: EXECUTION
integration_status: PENDING_INTEGRATION
integrated_at:
scaler_notes: >
  Self-review per system.action_gate=EXECUTION. Mixed renames + additions, all
  substrate-internal. Logic Preservation respected throughout. No P-LAW
  weakened, no workflow phase removed. Approved.
