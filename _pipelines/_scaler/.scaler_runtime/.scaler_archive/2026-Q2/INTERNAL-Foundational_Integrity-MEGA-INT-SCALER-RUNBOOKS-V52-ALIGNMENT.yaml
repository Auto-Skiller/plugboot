gap:
  gap_id: GAP-SCALER-RUNBOOKS-V52-PATH-DRIFT
  description: >
    The Scaler runbooks contain stale references that diverge from the current
    Agentic OS v5.2 truth-state established in BOOT_CONTRACTS.yaml,
    meta_router.yaml, and the cross-OS portability commit (PR #58):

    1. Scaler-Architecture.md §2.4 — Strategic Interrogation tells the Scaler to
       consult `.brain/meta.router.yaml`, `.brain/meta.router/pipelines.router/`,
       `.brain/.identity/`, `runbooks/`. Real paths: `.meta_brain/meta_router.yaml`,
       `.meta_brain/.meta_routing/pipelines.yaml`, `.meta_brain/meta_identity/`,
       `_pipelines/_scaler/.scaler_brain/_scaler_runbooks/`.
    2. Scaler-Architecture.md §3 — 5 of 14 Aspect rows reference `.brain/.identity/`,
       `.brain/meta.router/.sync_engine/`, `.runtime/.mission_board/`. None of
       those paths exist. Real paths: `.meta_brain/meta_identity/`,
       `.meta_brain/.meta_routing/meta_sync_engines/`, `.meta_brain/milestones/`,
       `.meta_brain/toolboxes/`.
    3. Scaler-Workflows.md §3 — INTERNAL PROMPT tells the agent to align with
       'v5.1 standard'. Current OS is v5.2 per BOOT_CONTRACTS.yaml.
    4. Scaler-Operational-Rules.md §5 — Architectural Portability Laws still
       prescribe direct `.venv\\Scripts\\python.exe` interpreter calls. The
       PR #58 cross-OS launcher made this an anti-pattern; the rule must point
       to `.meta_runtime/venv/meta_run.{ps1,sh}`.
    5. Scaler-Operational-Rules.md P-LAW-002 — references
       `.runtime/.mission_board/[SESSION]/[GOAL]/[GOAL].yaml`. Real path is
       `.meta_brain/milestones/[SESSION]/[GOAL]/GOAL.yaml`.
    6. Scaler-Operational-Rules.md P-LAW-017 — references
       `.meta_brain\\.meta_router\\.meta_sync\\meta_sync.py`. Real path is
       `.meta_brain\\meta_sync.py`. The interpreter call also needs the launcher.

    Combined effect: any Scaler agent following the runbooks literally will
    guess paths that don't exist (violating Zero Guess Law), generate proposals
    grounded in stale Ground Truth, and break cross-OS portability the moment a
    Linux clone runs the prescribed commands.

