        Scope: documentation + 2 sync engine path fixes + ledger schema cleanup.
        focus_ledger semantics: strategic rollup of products/features under the
        focus + market context (currency, language, delivery, payment).
        sources_ledger semantics: anti-duplication for sources cascaded INTO
        this focus (content hashes from .hustler_mixed_inbox cascading inbound).
