        - "7. HUSTLER_CONTRACTS.yaml: update boundary components + restrictions"
        - "8. hustler_state_sync.py: fix NOT_ROUTED_DIR constant to point at .hustler_mixed_inbox/"
        - "9. hustler_ledgers_sync.py: rewrite to scan hustler_ledgers/[focus].focus_ledger.yaml + .sources_ledger.yaml (in brain, not in focus folder)"
        - "10. .hustler_mixed_inbox.ledger.yaml: rename internal name field (currently says not_routed_ledger), fix metadata description"
