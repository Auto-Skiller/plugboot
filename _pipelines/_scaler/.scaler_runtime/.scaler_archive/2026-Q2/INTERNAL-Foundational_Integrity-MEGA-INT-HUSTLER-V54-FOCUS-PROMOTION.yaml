        - grep '\\.not_routed' across active Hustler files → 0 hits
        - grep 'discoveries\\.ledger\\.yaml' (old master name) across active Hustler files → 0 hits
        - hustler_state_sync.py output reports correct .hustler_mixed_inbox/ pending count (24)
        - hustler_ledgers_sync.py output reports algerian-ecommerce focus processed
