schema_version: "4.0"
action_id: MEGA-INT-SCALER-LEDGERS-COUNTER-FIX
primary_aspect: pipeline_scaler
aspects:
  - pipeline_scaler
  - routing_and_syncing
target_pillar: Foundational_Integrity
description: >
  Fix two correctness bugs and one missing-validation gap in scaler_ledgers_sync.py
  that quietly corrupt every Scaler ledger rollup. (Cluster A of substrate audit.)

gap:
  gap_id: GAP-SCALER-LEDGERS-COUNTER-CORRECTNESS
  description: |
    Audit revealed 3 issues in scaler_ledgers_sync.py:

    G1 (CRITICAL): line 59 `p_resolved_gaps = len(history)` blindly counts every
       history entry as a resolved gap. History also stores integrated proposals
       (e.g., PROPOSAL-GSD-KNOWLEDGE in Operational_Muscles). Result:
       resolved_gaps inflated by every archived proposal. Live evidence: master
       rollup currently shows total_resolved_gaps: 3 but the truthful number is 2.

    G2 (CRITICAL): line 73 `p_proposed = sum(... if d.get("proposal_ids"))` only
       counts EXTERNAL discoveries. INTERNAL gaps with action_card_id never
       increment. Live evidence: Foundational_Integrity has 3 INTERNAL action
       cards in history but summary.proposed reports 0.

    G10 (MED): no schema validation on ledger entries. Malformed shapes coerce
       silently, poisoning the rollup. No fail-fast guard.

solution:
  solution_id: SOL-INT-SCALER-LEDGERS-COUNTER-FIX
  change_type: PATCH_FILE
  integration_strategy:
    target_scan_results:
      current_state: |
        scaler_ledgers_sync.py treats `history[]` as homogeneous gaps-only.
        It actually contains a mix of {gap_id+action_card_id} entries (resolved
        gaps) and {proposal_id} entries (integrated proposals). Counter logic
        must discriminate by entry shape.
      delta_analysis: |
        Add per-entry shape detection:
          - Entry with `gap_id` → resolved gap (+1 to resolved_gaps)
          - Entry with `proposal_id` and no `gap_id` → resolved proposal (+1 to integrated for proposals_history)
        Add basic validation: required keys per entry shape. Fail-fast on missing
        fields.
    execution_plan:
      steps:
        - "1. In scaler_ledgers_sync.py, replace `p_resolved_gaps = len(history)` with shape-filtered count"
        - "2. Add `p_history_proposed = sum(1 for h in history if h.get('action_card_id'))` and include in proposed total"
        - "3. Add validate_ledger_entry(entry) helper; call before counting; warn on missing keys"
        - "4. Run meta_run.ps1 .meta_brain\\meta_sync.py; verify Operational_Muscles resolved_gaps drops to 0 and Foundational_Integrity summary.proposed becomes 3"
      verification: |
        - Operational_Muscles.ledger.yaml `state.summary.resolved_gaps` = 0 (was 1)
        - Foundational_Integrity.ledger.yaml `summary.proposed` >= 2 (was 0)
        - Master rollup `total_resolved_gaps` aligns with sum of pillar gap-only counts
        - meta_sync.py still reports Health 100%, exit 0
  files_involved:
    - path: _pipelines/_scaler/.scaler_brain/.scaler_routing/scaler_sync_engines/scaler_ledgers_sync.py
      action: EDIT

user_decision: APPROVED
action_gate_at_creation: EXECUTION
integration_status: PENDING_INTEGRATION
integrated_at:
scaler_notes: >
  Self-review per system.action_gate=EXECUTION. Pure correctness fix to a
  programmatic engine. 0 logic deleted; 2 silent-bug counters made truthful;
  1 validation gate added. Approved.
