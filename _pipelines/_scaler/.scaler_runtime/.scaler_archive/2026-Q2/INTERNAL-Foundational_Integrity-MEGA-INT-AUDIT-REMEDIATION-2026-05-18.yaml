target_pillar: Foundational_Integrity
description: >
  Audit Pass dry-run (Sim 2 of the cross-pollination simulations) found drift
  findings on 4 historical archived cards. After triage, the findings split
  into 3 simulator false-positives (MOVE source paths checked as if they were
  destinations) and 8 real path supersessions (paths that WERE created at
  integration time but were later refactored by subsequent cards without
  forward-pointers). This card annotates the 4 historical cards in-place with
  `superseded_by_path_changes[]` blocks so the next Audit Pass run no longer
  flags the same paths as drift, and fixes the simulator's MOVE handling.

  This is the eat-our-own-dogfood validation of the Audit Pass workflow added
  in this PR — the rule found real archive inconsistency, the response is the
  Mega-YAML the rule predicted would be drafted. After integration: Sim 2
  outcome moved from DRIFT (5 findings) to WARN (15 P-LAW-020 backlog
  warnings, by design).

gap:
  gap_id: GAP-AUDIT-2026-05-18-HISTORICAL-PATH-SUPERSEDE
  description: >
    Sim 2 Check #1 surfaced 5 DRIFT entries (later analysis: 8 real path
    supersessions plus 3 MOVE-handling false-positives) across 4 historical
    cards: HUSTLER-V53-TEMPLATE-MIGRATION, LEDGERS, SCALER-RUNBOOKS-V52-ALIGNMENT,
    and SCALER-STRUCTURE-V53-RELINK. Root cause: v5.3 archive entries don't
    carry forward-pointers to the cards that later modified them.

solution:
  solution_id: SOL-INT-AUDIT-2026-05-18-ANNOTATE-HISTORICAL-CARDS
  change_type: AUDIT_AND_REMEDIATE
  integration_strategy:
    target_scan_results:
      current_state: "All `drifted` CREATE/EDIT targets point to paths that were superseded by later integrated cards, not paths that are missing. Every successor path exists on disk; every superseding card shows integration_status: INTEGRATED in proposals_ledger.history[]."
      delta_analysis: "Append `superseded_by_path_changes[]` block to each of 4 historical cards. The block lists original_path → current_path mapping plus the superseding card's action_id. Audit Pass Check #1 reads this block and skips drift-flagging when a target path appears under original_path. Also fix sim_runner.py Check #1 MOVE handling — MOVE declares the source of a move; after a successful move the source is gone."
    execution_plan:
      steps:
        - "Annotate INTERNAL-Foundational_Integrity-MEGA-INT-HUSTLER-V53-TEMPLATE-MIGRATION.yaml with 3 forward-pointers"
        - "Annotate INTERNAL-Foundational_Integrity-MEGA-INT-LEDGERS.yaml with 1 forward-pointer"
        - "Annotate INTERNAL-Foundational_Integrity-MEGA-INT-SCALER-RUNBOOKS-V52-ALIGNMENT.yaml with 3 forward-pointers"
        - "Annotate INTERNAL-Foundational_Integrity-MEGA-INT-SCALER-STRUCTURE-V53-RELINK.yaml with 5 forward-pointers"
        - "Update sim_runner.py Check #1: skip drift on superseded_by_path_changes[].original_path; treat MOVE source as no-expectation"
        - "Re-run sim_runner.py and verify sim_2_audit_pass.report.md outcome moves from DRIFT to WARN"
      verification: "After integration: sim_2_audit_pass.report.md outcome = WARN (0 DRIFT). 15 WARN findings remain by design (pre-P-LAW-020 artifacts cannot be retroactively required)."
  files_involved:
