gap:
  gap_id: GAP-RUNBOOK-CROSS-POLLINATION
  description: >
    The Scaler and Hustler pipelines have matured independently after the v5.4
    splits. Both now have 5-runbook structures, 5-phase workflows, and the same
    Always-On + Localized layer model â€” but each has developed asymmetric
    patterns the other lacks. Specific gaps surfaced:

    1. Scaler had no explicit atomic-trio recovery procedure (Hustler did via
       H-LAW-006). A partial-failure on card+ledger+state writes silently broke
       anti-duplication.
    2. Scaler had no atomic-update cross-reference table â€” reverse-engineering
       which stores update on which operation required reading 3 files.
    3. Hustler had a single binary action_gate (PLANNING|EXECUTION) for all
       cascade and processing operations. Scaler had granular per-transition
       profiles; Hustler did not. Auto-validating a Focus carries far more risk
       than auto-cascading one source into an existing feature, but the binary
       gate didn't distinguish.
    4. Hustler had no quality bar on inbound sources â€” threshold-counting alone
       could scaffold Focuses on noise (5 low-credibility ads validate a Focus).
    5. Both pipelines had only one-shot validation per discovery/source. Drift
       between live disk and what ledgers/state files claim accumulated silently.
    6. Hustler had no rule for re-scoping (retiring a Product, superseding a
       definition). H-LAW-008 covered runbooks but not artifacts.
    7. Hustler had no consolidated pre-promotion checklist (Scaler had one for
       cards via Scaler-Gateway Â§3).
    8. Hustler boundary signals (C1-C4) conflated thematic grouping (same
       ecosystem/author) with functional affinity (same product-shape) â€” Scaler
       had separated these as S4 vs S5.
    9. Hustler had zero sourceâ†’featureâ†’product lineage. When a [new-def]
       contradicted an existing one, finding the original sources was manual.
    10. Both pipelines had prose phase descriptions â€” locating
        "what does this phase consume / produce / recover from" required scanning.
    11. Scaler had no negative-space documentation for its 4 zones
        (.scaler_brain / .scaler_runtime / EXTERNAL_SOURCES / gateway folders).
        Hustler had this in Architecture Â§5.
    12. Scaler tie-breaking for ambiguous integration types was implicit
        (first-mentioned-wins bias).
    13. Scaler scaffolded functional groups inside discovery hubs eagerly,
        causing empty-folder noise.
    14. Scaler-generated artifacts had no provenance markers â€” once cards
        archived, the link to the originating proposal was lost.
    15. Both pipelines had no rule against skipping files by extension when
        processing folder discoveries (.svg/.csv/.png often carry the deliverable).
    16. Cross-pipeline event vocabulary was undefined â€” no canonical names for
        events emitted in CONTROLER hubs, no scope discipline.

