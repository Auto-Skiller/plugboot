# ─── Gap ──────────────────────────────────────────────────────────────────────
gap:
  id: GAP-HUSTLER-CRITICAL-SCHEMA-RUNTIME
  description: |
    Four critical gaps surfaced during the .hustler_brain/.hustler_runtime audit:

    H1 — focus_ledger.yaml schema-broken. algerian-ecommerce.focus_ledger.yaml
    has free-form keys ("Key Focus Context:", "Products:") OUTSIDE the state:
    block. Duplicates state.tracked_products. Market context (DZD, Arabic/Darija,
    COD, Facebook Ads) is invisible to the auto-rollup because it's in
    unstructured top-level keys.

    H2 — H-LAW count mismatch. hustler_router.yaml.telemetry.governance reports
    laws_count=3 but Hustler-Operational-Rules.md documents 12 H-LAWs. The router
    computes from hustler_state.yaml.governance.laws[] which only carries the
    original 3 (H-LAW-001/002/003). H-LAWs 004–012 are documented but undeclared.

    H3 — state.active_mode doesn't mirror CONTROLER. hustler_state_sync.py never
    reads CONTROLER.modes.hustler — active_mode is hand-set once and drifts.
    Worse, the state mirrors a Scaler-shaped dict
    (`action_gate: {EXECUTION:[], PLANNING:[FULL]}`) while CONTROLER uses a flat
    list (`action_gate: [PLANNING 🟢]`). Two divergent shapes for one concept.

    H4 — Off-by-one: 24 vs 23 pending. Hustler-Architecture.md tree comment says
    "(24 sources await cascade)" but disk + rollup show 23. Stale by 1.

  surfaced_via: .hustler_brain/.hustler_runtime audit (user prompt)
  primary_aspect: pipeline_hustler
  aspects: [pipeline_hustler, routing_and_syncing, controller, mission_board]

# ─── Solution ─────────────────────────────────────────────────────────────────
solution:
  summary: |
    Critical-path fixes only. No documentation expansion (deferred to Card B).

  changes:
    h1_focus_ledger_schema:
      - "Rewrite algerian-ecommerce.focus_ledger.yaml: lift Market/Currency/Delivery/Advertising/Payment/Language/Product strategy under metadata.market_context (structured); remove duplicate top-level Products[] key; preserve all original values verbatim."
      - "All future focus ledgers follow the same shape: metadata.market_context is the canonical place for free-form market intelligence; state.tracked_* is the canonical place for tracked entities."
    h2_h_laws_completion:
      - "hustler_state.yaml.governance.laws[]: append H-LAW-004 through H-LAW-012 (9 laws). H-LAW-001/002/003 preserved verbatim. enforced flag honored as in Hustler-Operational-Rules.md (H-LAW-010 enforced=false honor-system)."
      - "Result: hustler_router.yaml.telemetry.governance now correctly reads laws_count=12, laws_enforced=11 (H-LAW-010 honor-system not counted)."
    h3_active_mode_mirror:
      - "hustler_state_sync.py: read CONTROLER.modes.hustler at sync time, mirror work_mode + action_gate (flat list) into state.active_mode."
      - "hustler_state.yaml: flatten state.active_mode.action_gate from `{EXECUTION:[], PLANNING:[FULL]}` to flat list `[PLANNING]` (or whatever CONTROLER says). One canonical shape."
    h4_off_by_one:
      - "Hustler-Architecture.md: '(24 sources await cascade)' → '(23 sources await cascade)'."

  impact:
    risk: LOW (state schema + sync engine + 1 ledger + 1 doc line; no cascading or processing logic touched)
    reversibility: HIGH (git revert)
    compliance:
      - "P-LAW-009 Minimal Proposal Cohesion: 4 critical fixes bundled in one card."
      - "P-LAW-011 Mandatory Archiving: card archived to YYYY-QQ/ shape on integration."
      - "Logic Preservation Law (H-LAW-008): 0 logic deleted; 3 original H-LAWs preserved verbatim."
      - "Zero-Drift Audit Law: fresh disk reads before each edit."

  verification:
    - "meta_sync.py end-to-end: EXIT=0, Health 100%, both pre/post-flight pass."
    - "hustler_router.yaml.telemetry.governance.laws_count == 12."
    - "hustler_state.yaml.state.active_mode reflects CONTROLER.modes.hustler exactly."
    - "algerian-ecommerce.focus_ledger.yaml validates as clean YAML with metadata.market_context structure."
    - "0 references to '24 sources' anywhere outside .scaler_archive/."

