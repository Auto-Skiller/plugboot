name: hustler_state
metadata:
  description: "Hustler pipeline state, governance, and telemetry. Single source of
    truth lives in this routing file (no ledger-side mirror). state.active_mode is
    auto-mirrored from CONTROLER.modes.hustler at every sync."
  schema_version: "2.1"
  last_updated: "2026-05-18T06:15:00+01:00"

# ─── Governance: 12 H-LAWs (3 original + 9 added in v2.0) ─────────────────────
# Originals (001/002/003) preserved verbatim from v1.0 per H-LAW-008 Logic Preservation.
# Full prose lives in Hustler-Operational-Rules.md.
governance:
  laws:
  # ─── Original Foundation (preserved verbatim from v1.0) ────────────────────
  - id: H-LAW-001-HUSTLE-IDENTITY
    name: "Hustle Naming Standard"
    description: "All Hustle sessions must follow the pattern: HUSTLE-[Market]-[ID]."
    enforced: true
  - id: H-LAW-002-ROI-VERIFICATION
    name: "Value-First Protocol"
    description: "No campaign execution can begin without a documented ROI projection
      in the session goal."
    enforced: true
  - id: H-LAW-003-MARKET-CHECK
    name: "Market Sanity Check"
    description: "Every hustle must perform a market research step before building
      final assets."
    enforced: true
  # ─── Integrity Invariants (added in v2.0) ──────────────────────────────────
  - id: H-LAW-004-CASCADING-THRESHOLD-INTEGRITY
    name: "Cascading Threshold Integrity"
    description: "A new Focus / Product / Feature MUST NEVER be created until the
      cascading threshold (defined per-level in Hustler-Cascading-Logic.md) has been
      met. Premature validation creates folder thrashing."
    enforced: true
  - id: H-LAW-005-TAG-LIFECYCLE-PRESERVATION
    name: "Tag Lifecycle Preservation"
    description: "Every file inside a feature's 00-data/ MUST carry exactly one of
      [new-data], [processed-data], [new-scraped]. Every section in [feature].yaml
      MUST carry one of [new-def], [new-needs], or no tag (validated). Tag transitions
      follow Hustler-Tagging-System.md and may not skip steps."
    enforced: true
  - id: H-LAW-006-ATOMIC-TRACKER-UPDATE
    name: "Atomic Tracker Update"
    description: "A cascade or processing operation MUST NEVER be committed without
      simultaneous updates to the relevant ledger, the target tracker, and the source's
      status. Card-and-ledger or move-and-tracker pairs are a single atomic operation."
    enforced: true
  - id: H-LAW-007-ANTI-DUPLICATION-LEDGER
    name: "Anti-Duplication via Ledger"
    description: "Before cascading any item out of .hustler_mixed_inbox/, consult
      .hustler_mixed_inbox.ledger.yaml.state.tracked_items for a matching content
      hash. When cascading INTO a focus, also log the hash in the target focus's [focus].sources_ledger.yaml.
      Same source MUST NEVER be cascaded twice."
    enforced: true
  - id: H-LAW-008-LOGIC-PRESERVATION
    name: "Logic Preservation"
    description: "No existing operational logic in Hustler runbooks may be deleted
      during evolution if it does not directly conflict with new logic. Foundational
      step-by-step instructions (e.g., Phase 3 Step 2.1/2.2/2.3) MUST be modernized
      rather than replaced. Mirror of workspace-level Evolution Protocol §1."
    enforced: true
  - id: H-LAW-009-CROSS-OS-LAUNCHER
    name: "Cross-OS Launcher Execution"
    description: "All Python tooling for the Hustler MUST be invoked via the workspace
      cross-OS launcher (.meta_runtime/venv/meta_run.{ps1,sh}). Direct .venv/Scripts/python.exe
      calls are prohibited because they break cross-OS portability."
    enforced: true
  - id: H-LAW-010-MANDATORY-RUNBOOK-IMMERSION
    name: "Mandatory Runbook Immersion"
    description: "Before ANY Hustler execution cycle or simulation, the agent MUST
      confirm fresh context from all five runbook files. Currently honor-system: no
      programmatic gate verifies the read; future enhancement could store per-session
      runbook acks in hustler_state.yaml.runbook_readiness."
    enforced: false  # honor-system; documented limitation
  - id: H-LAW-011-MODE-AWARE-ACTION-GATE
    name: "Mode-Aware Action Gate"
    description: "The Hustler MUST consult CONTROLER.yaml.modes.hustler.action_gate
      before any cascade or processing action. EXECUTION → autonomous. PLANNING →
      post proposed action to communication_hubs.hustler_hub.messages and wait."
    enforced: true
  - id: H-LAW-012-MANDATORY-SYNC-ENGINE
    name: "Mandatory Sync Engine Execution"
    description: "All agents MUST execute the master Hustler sync at the start and
      end of every session, via the cross-OS launcher. Ensures hustler_runtime.yaml,
      hustler_state.yaml, hustler_ledgers.yaml, and master hustler_router.yaml reflect
      on-disk truth."
    enforced: true

# ─── State: Auto-mirrored from CONTROLER.modes.hustler at every sync ──────────
state:
  current_phase: Idle      # Idle | Ingestion | Cascading | Definition | NeedsFulfillment | Productization
  active_mode:
    work_mode: STRICT 🟢
    action_gate: []
    profiles:
      INGESTION:
        action_gate:
          EXECUTION:
          - cascade_into_existing_feature
          - cascade_into_existing_product
          PLANNING:
          - validate_new_feature
          - validate_new_product
          - validate_new_focus
          - cluster_first_audit
      PROCESSING:
        action_gate:
          EXECUTION:
          - definition_extraction
          - tag_transition_new_data_to_processed
          - extract_need_from_processed_data
          PLANNING:
          - scrape_for_data_gap
          - productization_marking
  gateway_metrics:
    pending_approvals_count: 0
    active_proposals: []
    last_gateway_action: ""
    last_archive_rotation:
  status: IDLE
  active_operation: "None"
  # Audit Pass state (Hustler-Workflows.md §7) — populated by the on-demand
  # Audit Pass workflow. last_audit holds the most recent run's outcome;
  # audit_findings[] retains structured findings for at least one quarter.
  audit_in_progress: false
  last_audit:
    triggered_by:
    started_at:
    completed_at:
    outcome:        # CLEAN | WARN | DRIFT | INCOMPLETE
    drift_count: 0
  audit_findings: []
  audit_policy:
    auto_run_on_goal_complete: false
    auto_run_on_drift_threshold: 2  # H-LAW-006 recovery events that trigger auto-Audit
    audit_check_timeout_seconds: 300
  # H-LAW-014 DNA Preservation in Re-Scoping — every focus/product/feature
  # re-scope, retire, merge, or supersede operation appends one entry here
  # for permanent audit trail. Each entry shape:
  #   {level: focus|product|feature, before_id, after_id, reason,
  #    dependent_artifacts[], timestamp}.
  rescoping_history: []
  # Honor-system runbook readiness ledger (H-LAW-010) — placeholder until
  # programmatic enforcement lands. Populated as {file: content_hash, at: ISO}.
  runbook_readiness: {}

# ─── Telemetry: Health, metrics, current snapshot ─────────────────────────────
  active_sessions: []
