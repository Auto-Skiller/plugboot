# 🤖 HUSTLER BOUNDARY & PIPELINE CONTRACTS
name: hustler_contracts
schema_version: "1.0"
description: "Authoritative definition of automation boundaries and mapping protocols for the Hustler product-discovery pipeline."

# ─── Automation Boundaries ───────────────────────────────────────────────────
boundaries:
  deterministic_sync:
    description: "Components governed by structured schemas and synced via automated python engines."
    enabled: true
    components:
      - name: "hustler_state"
        path: "_pipelines/hustler/.hustler_brain/.hustler_routing/hustler_state.yaml"
        sync_engine: "_pipelines/hustler/.hustler_brain/.hustler_routing/hustler_sync_engines/hustler_state_sync.py"
      - name: "hustler_ledgers"
        source: "_pipelines/hustler/.hustler_brain/hustler_ledgers/"
        target: "_pipelines/hustler/.hustler_brain/.hustler_routing/hustler_ledgers.yaml"
        sync_engine: "_pipelines/hustler/.hustler_brain/.hustler_routing/hustler_sync_engines/hustler_ledgers_sync.py"
      - name: "hustler_runtime"
        source: "_pipelines/hustler/.hustler_runtime/"
        target: "_pipelines/hustler/.hustler_brain/.hustler_routing/hustler_runtime.yaml"
        sync_engine: "_pipelines/hustler/.hustler_brain/.hustler_routing/hustler_sync_engines/hustler_runtime_sync.py"

  cognitive_mapping:
    description: "Unstructured market discovery zones that MUST NOT be auto-organized by scripts."
    enabled: true
    restrictions:
      - "Discoveries inside _HUSTLER-EXTERNAL_SOURCES/[focus]_discoveries/ and the validated focus folders at pipeline root MUST be updated strictly by the agent following Hustler-Cascading-Logic.md."
      - "Direct script automation is permanently prohibited from re-organizing or re-cataloging Focus → Product → Feature trees."
      - "Prohibition: The Hustler (both scripts and agents) MUST NEVER look at, scan, or auto-route items inside _HUSTLER-EXTERNAL_SOURCES/.hustler_USER-SPACE/ — this is a strictly user-only zone."
    components:
      - name: "external_sources"
        path: "_pipelines/hustler/_HUSTLER-EXTERNAL_SOURCES/"
      - name: "mixed_inbox"
        path: "_pipelines/hustler/_HUSTLER-EXTERNAL_SOURCES/.hustler_mixed_inbox/"
      - name: "user_space"
        path: "_pipelines/hustler/_HUSTLER-EXTERNAL_SOURCES/.hustler_USER-SPACE/"

# ─── Verification Protocols ───────────────────────────────────────────────────
verification_protocols:
  pre_flight_check:
    - "Verify hustler_state.yaml exists and has a valid current_phase before initiating sync."
  post_flight_check:
    - "Confirm hustler_router.yaml is dynamically re-assembled and has a fresh last_updated stamp."
