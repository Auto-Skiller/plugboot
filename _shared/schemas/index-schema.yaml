####################################################
# ENTITY INDEX SCHEMA — system-index.yaml
#                        project_name-index.yaml
#
# Every entity (_system or project) has its own index.
# This is the PATH MAP + MACHINE INDEX for that entity.
#
# ALL paths live here. ZERO paths in the board.
# The engine populates this by scanning disk.
#
# Structure:
#   metadata            → entity identity and sync state
#   entity              → this entity's own folder paths
#   shared              → paths to shared resources
#   os_prompts          → machine-indexed identity/law files
#   pipelines           → available pipelines (shared + local)
#   toolboxes           → available toolboxes (shared + local)
#   missions            → machine-indexed mission files
#   pipelines_runtime   → active pipeline execution runs
#   ledgers             → all non-hidden project content files
####################################################


####################################################
# METADATA
####################################################

metadata:
  name: string                          # e.g. "system-index", "project_name-index"
  class: system | project
  version: string

  freshness:
    sync_status: fresh | need-syncing | syncing | error
    sync_count: integer
    last_synced: timestamp
    last_edited: timestamp


####################################################
# ENTITY PATHS — This entity's own folders
####################################################

entity:
  root: string                          # e.g. "_system/" or "project_name/"
  readme: string                        # e.g. "_system/system.md"
  board: string                         # e.g. "_system/system-board.yaml"
  index: string                         # e.g. "_system/system-index.yaml"
  meta: string                          # e.g. "_system/.system-meta/"
  os_prompts: string                    # e.g. "_system/.system-meta/.system-os_prompts/"
  pipelines_definitions: string         # e.g. "_system/.system-meta/.system-pipelines/"
  toolboxes_definitions: string         # e.g. "_system/.system-meta/.system-toolboxes/"
  missions: string                      # e.g. "_system/.system-missions/"
  pipelines_runtime: string             # e.g. "_system/.system-pipelines_runtime/"
  archive: string                       # e.g. "_system/.system-meta/system-archive/"
  scratch: string                       # e.g. "_system/.system-meta/system-scratch/"


####################################################
# SHARED PATHS — Paths to shared resources
####################################################

shared:
  root: string                          # "_shared/"
  pipelines: string                     # "_shared/.shared-pipelines/"
  toolboxes: string                     # "_shared/.shared-toolboxes/"
  schemas: string                       # "_shared/schemas/"


####################################################
# OS_PROMPTS — Machine index of all identity/law files
# Files are plain Markdown — no frontmatter required.
# Engine scans the os_prompts folder and populates.
# Moved here from board.
####################################################

os_prompts:

  "filename.md":
    path: string                        # Full relative path from workspace root
    role: string                        # e.g. "architecture", "behavior", "state"
    description: string
    when_to_use: string
    contains: string | [string]

  "...":


####################################################
# PIPELINES — Available pipelines for this entity
# Shared (from _shared/) + entity-local.
# Engine scans both locations and populates.
####################################################

pipelines:

  shared:                               # From _shared/.shared-pipelines/
    "pipeline_name":
      path: string
      readme: string
      contracts: string
      runbooks_path: string

      runbooks:                         # Machine-indexed runbook files
        "Runbook-Filename.md":
          path: string
          description: string
          when_to_use: string
          contains: string | [string]

        "...":

    "...":

  local:                                # From entity's .XXX-meta/.XXX-pipelines/
    "pipeline_name":
      path: string
      readme: string
      contracts: string
      runbooks_path: string

      runbooks:
        "Runbook-Filename.md":
          path: string
          description: string
          when_to_use: string
          contains: string | [string]

        "...":

    "...":


####################################################
# TOOLBOXES — Machine index of all toolboxes
# Files are plain Markdown — no frontmatter required.
# Engine scans both shared and local toolbox folders.
####################################################

toolboxes:

  shared:                               # From _shared/.shared-toolboxes/
    "domain_name":                      # e.g. "agentic", "engineering"
      path: string

      "toolbox_name":                   # e.g. "analysis", "coding"
        path: string

        agents:
          "agent_filename":
            path: string
            role: string
            description: string
            when_to_use: string
            maturity: stub | functional | hardened | battle-tested
            triggers: [string]

          "...":

        skills:
          "skill_folder_name":
            path: string
            description: string
            when_to_use: string
            maturity: stub | functional | hardened | battle-tested
            triggers: [string]
            inputs: [string]
            outputs: [string]

            references:
              "reference_filename":
                path: string
                description: string
                when_to_use: string

              "...":

          "...":

      "...":

    "...":

  local:                                # From entity's .XXX-meta/.XXX-toolboxes/
    "domain_name":
      path: string

      "toolbox_name":
        path: string

        agents:
          "agent_filename":
            path: string
            role: string
            description: string
            when_to_use: string
            maturity: stub | functional | hardened | battle-tested
            triggers: [string]

          "...":

        skills:
          "skill_folder_name":
            path: string
            description: string
            when_to_use: string
            maturity: stub | functional | hardened | battle-tested
            triggers: [string]
            inputs: [string]
            outputs: [string]

            references:
              "reference_filename":
                path: string
                description: string
                when_to_use: string

              "...":

          "...":

      "...":

    "...":


####################################################
# MISSIONS — Machine index of mission files
####################################################

missions:

  "mission_name":
    path: string
    status: active | paused | completed | archived
    started_at: timestamp

  "...":


####################################################
# PIPELINES_RUNTIME — Active pipeline execution runs
####################################################

pipelines_runtime:

  "run_name":
    path: string
    pipeline: string                    # Which pipeline definition
    status: active | paused | completed | archived
    started_at: timestamp

  "...":


####################################################
# LEDGERS — All non-hidden project content files
# Indexes every file inside this entity's non-hidden
# content folders (excludes: root .md and .yaml files,
# folders starting with ".", and the 3 top-level
# workspace folders: _shared, _system, project_name).
#
# Engine scans entity root for non-hidden folders and
# recursively indexes all files found within them.
# Schema mirrors os_prompts for consistency.
#
# Moved here from board.
####################################################

ledgers:

  "folder_name":                        # e.g. "content", "research", "deliverables"
    path: string                        # Path to the folder

    "filename":                         # Each file inside the folder
      path: string
      description: string
      when_to_use: string
      contains: string | [string]

    "...":

  "...":


####################################################
# END OF ENTITY INDEX SCHEMA
####################################################
