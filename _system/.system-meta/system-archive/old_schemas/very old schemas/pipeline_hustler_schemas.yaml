metadata:
  name: hustler_db_schema
  type: schema
  version: '2.0'
  schema_version: '2.0'
  schema_path: .db/.schemas/pipeline_hustler_schemas.yaml

  purpose:
    entry_type: static
    value: >-
      Schema for pipeline_hustler.yaml — the Hustler pipeline runtime state.
      Structure: metadata, state(metrics, recent_events), hub(messages, backlog),
      pipeline(product_gaps), milestones.

content: {}

hustler_db_schema: |
  metadata:
    name: string
    type: pipeline
    version: string
    schema_version: string
    freshness:
      status: fresh | syncing | error
      sync_count: integer
      last_synced_by: string
      last_synced: timestamp

  state:
    metrics:
      throughput: integer
      active_pipelines: integer
    recent_events: [string]

  hub:
    messages: [string]
    backlog: [string]

  pipeline:
    product_gaps:
      - gap_id: string
        description: string
        discovered_by: string
        status: open | resolved
    recent_events: [string]

  milestones:
    <milestone_name>:
      sessions:
        - session_id: string
          status: active | paused | completed | archived
          priority: HIGH | MEDIUM | LOW
          goals:
            - goal_id: string
              status: pending | active | done | archived
              description: string

sources_ledger_schema: |
  metadata:
    name: string
    type: focus_sources
    focus_id: string
    description: string
    schema_version: string
    last_updated: timestamp
    metrics:
      total_sources: integer
  tracked_sources:
    - source_id: string
      content_hash: string
      source_path: string
      cascaded_at: timestamp
      routed_to: string
  history: [string]

focus_ledger_schema: |
  metadata:
    name: string
    type: focus
    focus_id: string
    description: string
    schema_version: string
    last_updated: timestamp
    market_context:
      market: string
      currency: string
      delivery: string
      advertising: string
      payment: string
      language: string
      product_strategy: string
    metrics:
      total_products: integer
      pending_products: integer
      validated_products: integer
      total_features: integer
      pending_features: integer
      validated_features: integer
  tracked_products: [string]
  tracked_features: [string]
  history: [string]
  lineage_graph:
    metadata:
      schema_version: string
      last_updated: timestamp
      edge_count: integer
    nodes:
      sources: []
      features: []
      products: []
      productizations: []
    edges: []

mixed_inbox_ledger_schema: |
  metadata:
    name: string
    description: string
    schema_version: string
    last_updated: timestamp
  tracked_items:
    - item_id: string
      source_folder: string
      routed_at: timestamp
      routing_decision: string
      routed_to:
        - pillar: string
          destination: string
          extracted_concern: string
      multi_pillar_ref_id: string
      rejected_to_complex_inboxes: boolean
      status: cascaded | rejected | pending
      quality_scoring:
        scored_by: agent_semantic
        scored_at: timestamp
        score: integer
        verdict: PASS | BORDERLINE | REJECTED
        rubric:
          recency: {pass: boolean, rationale: string}
          authority: {pass: boolean, rationale: string}
          specificity: {pass: boolean, rationale: string}
          relevance: {pass: boolean, rationale: string}
          completeness: {pass: boolean, rationale: string}
  history: [string]
  summary:
    total_pending: integer
    total_cascaded: integer
    total_rejected: integer
