metadata:
  name: .system_schemas
  type: schema
  version: '4.0'
  schema_version: '1.0'
  schema_path: .db/.schemas/.system_schemas.yaml

  purpose:
    entry_type: static
    value: >-
      Structural schema for .db/.system.yaml — the core OS execution DB.
      Flat structure: metadata (identity), system (errors), hub (messages/backlog),
      evolution (queues), milestones. No nested hubs.

content: {}

core_schema: |
  metadata:
    name: string
    type: db
    version: string
    schema_version: string
    freshness:
      last_synced: timestamp
      sync_count: integer
      status: fresh | syncing | error
      last_synced_by: string
      modes: {...}                    # (in) — user-editable via config.yaml
    milestones: {...}

  state:
    metrics: {...}
    recent_events: [string]

  hub:
    messages: [string]             # (in-out)
    backlog: [string]              # (in-out)

  system:
    sync_errors: [string]          # (in-out) — error gate
    evolution_queue: [...]         # (in-out)

  milestones:
    "[SESSION_NAME]": {...}       # runtime milestones state
