metadata:
  name: scaler_db_schema
  type: schema
  version: '2.0'
  schema_version: '2.0'
  schema_path: .db/.schemas/pipeline_scaler_schemas.yaml

  purpose:
    entry_type: static
    value: >-
      Schema for pipeline_scaler.yaml — the Scaler pipeline runtime state.
      Structure: metadata, state(metrics, recent_events), hub(messages, backlog),
      pipeline(review_queue, remediation_queue, recent_events), milestones.

content: {}

scaler_db_schema: |
  metadata:
    name: string
    type: pipeline
    version: string
    schema_version: string
    freshness:
      status: fresh | syncing | error
      sync_count: integer
      last_synced_by: string
      last_synced: timestamp

  state:
    metrics:
      scaled: integer
      proposals: integer
      solutions: integer
      sources: integer
    recent_events: [string]

  hub:
    messages: [string]
    backlog: [string]

  pipeline:
    review_queue:
      - id: string
        type: PROPOSAL | SOLUTION
        path: string
        summary: string
        status: PENDING | APPROVED | REJECTED | INTEGRATED
        pillar: string
        impact: string
        integration_type: string
        primary_aspect: string
        created_at: timestamp
    remediation_queue: [string]
    recent_events: [string]

  milestones:
    <milestone_name>:
      sessions:
        - session_id: string
          status: active | paused | completed | archived
          priority: HIGH | MEDIUM | LOW
          max_rounds: integer
          current_round: integer
          goals:
            - goal_id: string
              status: pending | active | done | archived
              description: string

sources_ledger_schema: |
  metadata:
    name: string
    purpose: string
    type: ledger
    version: string
    metrics:
      total_discoveries: integer
      pending: integer
      integrated: integer
      rejected: integer
      proposed: integer
      total: integer
    hub:
      messages: [string]

  tracked_discoveries:
    - discovery_id: string
      discovery_status: PENDING | INTEGRATED | REJECTED | ARCHIVED
      source_path: string
      group_path: string
      discovery_type: string
      primary_aspect: string
      aspects: [string]
      routed_from_random: boolean
      routed_from_typed_inbox: boolean
      multi_pillar_ref_id: string
      multi_pillar_siblings: [string]
      extracted_concern: string
      routed_at: timestamp
      contents_summary:
        files: [string]
      proposal_ids: [string]
      integration_status: PENDING | INTEGRATED | REJECTED

proposals_ledger_schema: |
  metadata:
    name: string
    purpose: string
    type: ledger
    version: string
    metrics:
      active_gaps: integer
      resolved_gaps: integer
      proposed: integer
      active: integer
      resolved: integer
    hub:
      messages: [string]

  tracked_gaps:
    - gap_id: string
      description: string
      proposal_ids: [string]
      integration_status: PENDING | INTEGRATED | REJECTED
  history: [string]

mixed_inbox_ledger_schema: |
  metadata:
    name: string
    description: string
    schema_version: string
    last_updated: timestamp
  tracked_items:
    - item_id: string
      source_folder: string
      routed_at: timestamp
      routing_decision: string
      routed_to:
        - pillar: string
          destination: string
          extracted_concern: string
      multi_pillar_ref_id: string
      rejected_to_complex_inboxes: boolean
      status: cascaded | rejected | pending
  history: [string]
  summary:
    total_pending: integer
    total_cascaded: integer
    total_rejected: integer
