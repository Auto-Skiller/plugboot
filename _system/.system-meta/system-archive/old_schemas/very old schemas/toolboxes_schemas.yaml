metadata:
  name: toolboxes_schemas
  type: schema
  version: '4.0'
  schema_version: '1.0'
  schema_path: .db/.schemas/toolboxes_schemas.yaml

metadata:
  purpose:
    entry_type: static
    value: >
      Schema for the toolbox index file (.db/toolboxes.yaml) and
      individual toolbox DB files in .db/toolboxes_rollup/.
      Follows the Dual-Entry system.

content: {}

toolboxes_index_schema: |
  # Schema for .db/toolboxes.yaml
  metadata:
    name: string
    purpose: string
    type: db
    version: string
    schema_version: string
    schema_path: string
    freshness:
      last_synced: timestamp
      status: fresh | syncing | error

  metadata:                          # OUT — aggregated from individual toolbox metadata blocks
    core_toolboxes:
    business_toolboxes:
    engineering_toolboxes:
    studio_toolboxes:
    life_toolboxes:

  dependency_graph: {}               # OUT — inter-toolbox dependency edges

  toolboxes_pathes:                  # OUT — physical path index per domain
    "[domain]_toolboxes":
      "[toolbox_name]": string       # relative path to toolbox DB file


toolbox_db_schema: |
  # Schema for individual toolbox DB files (e.g. analysis.yaml, branding.yaml)
  metadata:
    name: string                     # toolbox name only, no domain prefix
    type: db
    version: string
    schema_version: string
    schema_path: string
    last_audited: timestamp          # OUT — written by sync engine

  metadata:
    when_to_use: string              # static — set at creation
    status: string                   # (in) — on | off
    agent_count: integer             # OUT — counted by sync engine
    agent_names: [string]            # OUT — from agents/ folder
    skill_count: integer             # OUT — counted by sync engine
    skill_names: [string]            # OUT — from skills/ folder

  agents:                            # OUT — populated from agents/ subfolder
    # The sync daemon extracts the rich YAML frontmatter from each agent's
    # markdown file (e.g., capabilities, triggers, inputs) and injects it here
    # to provide routing metadata for other agents without requiring file reads.
    "[agent_name]":
      path: string
      specialization: string
      model_preference: string
      capabilities: [string]
      invocation_trigger: string
      required_skills: [string]

  skills:                            # OUT — populated from skills/ subfolder
    # The sync daemon extracts the rich YAML frontmatter from each skill's
    # markdown file and injects it here.
    "[skill_name]":
      path: string
      description: string
      triggers: [string]
      inputs: [string]
      outputs: [string]
      cataloger_lock: boolean

  allowed_values:
    status:
      - on
      - off
