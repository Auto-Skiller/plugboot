####################################################
# WORKSPACE INDEX SCHEMA — index.yaml (root level)
# Location: open-workspace/index.yaml
#
# This is the top-level map of the entire workspace.
# It registers:
#   - Infrastructure (non-entity): _shared, .infra, .stash
#   - All workspace-level files (AGENTS.md, README, config)
#   - The _system entity (board, index, readme)
#   - All project entities (board, index, readme)
#
# Purpose: agents landing at the root can read this
# single file to know where everything lives before
# diving into entity-specific indexes.
####################################################

####################################################
# METADATA
####################################################

metadata:
  name: workspace-index
  class: workspace
  version: string

  freshness:
    sync_status: fresh | need-syncing | syncing | error
    sync_count: integer
    last_synced: timestamp
    last_edited: timestamp

####################################################
# WORKSPACE FILES — Root-level key files
####################################################

workspace_files:
  agents_md: "AGENTS.md" # Agent boot pointer
  readme: "README.md" # Human-facing overview
  config: "config.yaml" # Global entity activation
  index: "index.yaml" # This file

####################################################
# INFRA — Infrastructure paths
####################################################

infra:
  root: ".infra/"
  backend: ".infra/backend/" # Engine, boot, daemon scripts
  frontend: ".infra/frontend/" # Dashboard UI

####################################################
# STASH — Runtime ephemeral
####################################################

stash:
  root: ".stash/"
  venv: ".stash/.venv/" # Python virtual environment
  logs: ".stash/logs/" # Engine logs
  pids: ".stash/pids/" # Process PID files
  env: ".stash/.env/" # Environment variables

####################################################
# SHARED — Shared library
####################################################

shared:
  root: "_shared/"
  pipelines: "_shared/.shared-pipelines/"
  toolboxes: "_shared/.shared-toolboxes/"
  schemas: "_shared/schemas/"

####################################################
# SYSTEM — The always-on orchestrator entity
####################################################

system:
  root: "_system/"
  readme: "_system/system.md"
  board: "_system/system-board.yaml"
  index: "_system/system-index.yaml"

####################################################
# PROJECTS — All registered project entities
# Engine-maintained: auto-updated when projects added.
####################################################

projects:
  "project_name": # Replace with actual project name
    root: "project_name/"
    readme: "project_name/project_name.md"
    board: "project_name/project_name-board.yaml"
    index: "project_name/project_name-index.yaml"

  "...":

####################################################
# END OF WORKSPACE INDEX SCHEMA
####################################################
