  add_a_draft_missions_just_like_planing/execution/archived_so_this_new_will_be_befor_planing:
    proposal_name: 
      add_a_draft_missions_just_like_planing/execution/archived_so_this_new_will_be_befor_planing
    model: standard
    objective: 'Introduce a DRAFT lifecycle stage for missions that sits BEFORE PLANNING.
      Today a mission is PLANNING, EXECUTION, or archived (completed/cancelled) -
      there is no place to park a freshly captured idea that is NOT yet committed
      to the active planning board. Add a DRAFT class so new mission ideas land as
      drafts (visible, not active, not auto-triggered) and are promoted to PLANNING
      only when ready. Lifecycle becomes DRAFT -> PLANNING -> EXECUTION -> archived,
      matching the request for a pre-planning stage.'
    priority: MEDIUM
    state:
      status: true
      class: PLANNING
      progress: pending
    readiness:
      ready_to_advance: false
    rounds:
      status: false
      persistent: false
      max: 1
    goals:
      define_draft_stage: Define the DRAFT lifecycle stage and pin its position 
        as the first step (before PLANNING).
      schema_and_frontend: Add DRAFT to the state.class enum across schema, 
        daemon, and dashboard; render drafts in their own bucket distinct from 
        PLANNING/EXECUTION.
      promote_flow: Provide a promote action (DRAFT -> PLANNING) usable by agent
        or user so a draft graduates into the active planning board.
      split_missions_sections: Split the missions view VERTICALLY into separate
        sections by mission type - STANDARD, RESEARCH, ANALYTICS, and EVOLUTION
        - so each type gets its own column/bucket instead of one flat list.
      relevance_mapping: Change the missions mapping logic GLOBALLY (not just the
        draft section) so ALL missions are also linked by RELEVANCE (topic/area),
        not only by type/lifecycle. e.g. a topic like "ui/ux" becomes a hub that
        surfaces every mission working on that topic across every section, so you
        can see all related missions cross-sectionally.
    tasks:
      inspect_lifecycle:
        progress: pending
        owner: agent
        detail: Read missions-schema.yaml, daemon.py state handling, and 
          frontend app.js to map where DRAFT must be inserted (enum, 
          active-count logic, board rendering).
      update_schema:
        progress: pending
        owner: agent
        detail: Add DRAFT to the state.class enum in missions-schema.yaml (and 
          the lifecycle comment) so the schema accepts the new stage.
      update_daemon:
        progress: pending
        owner: agent
        detail: Ensure the daemon treats DRAFT as non-active - not counted in 
          actives, not eligible for auto_triggering/auto_execution - but still 
          visible/synced.
      update_frontend:
        progress: pending
        owner: agent
        detail: Render DRAFT missions in a separate draft bucket; add a Promote 
          control that flips state.class to PLANNING.
      split_sections_frontend:
        progress: pending
        owner: agent
        detail: Refactor the missions view to split vertically into typed 
          sections - STANDARD, RESEARCH, ANALYTICS, EVOLUTION (each mode) - 
          instead of one merged list; keep DRAFT + PLANNING/EXECUTION buckets 
          inside each section.
      relevance_mapping_logic:
        progress: pending
        owner: agent
        detail: Add a relevance/topic linkage. Give missions a topics-or-pillars
          tag, then build mapping logic (daemon index + frontend view) so a
          topic like "ui/ux" links all missions touching it - a cross-cutting
          hub view in addition to the typed sections.
      propose_to_user:
        progress: pending
        owner: user
        detail: Present the DRAFT stage + vertical-split + relevance-mapping 
          change list to the user for approval before building anything.
    metrics:
      goals: 5
