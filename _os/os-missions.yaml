  enhance_evolution_with_curator_mechanics:
    proposal_name: enhance_evolution_with_curator_mechanics
    model: tencent/hy3:free
    objective: "Rescope of the Curator mechanics to TWO prompt-only upgrades (no new
      files/code): (1) CONSOLIDATION for the DEEP evolution workflow - DEEP must also
      hunt similar/relevant things (like it already does for toolboxes) and fold them
      under an umbrella or merge into one case, exactly as it hunts gaps and enhancement
      opportunities; (2) self-improve discipline for the FAST evolution workflow,
      which already targets os_prompts - harden FAST's methodology (record the change,
      honor maturity/activation, treat the edit as reversible under LAW 2) so it self-improves
      os_prompts like the background skill-review loop. Deliverable = os_prompt 05
      edits only."
    priority: CRITICAL
    state:
      status: true
      class: PLANNING
      progress: pending
    rounds:
      status: false
      persistent: false
      max: 1
    goals:
      deep_consolidation:
        why: "DEEP already hunts gaps / best-practices / enhancement opportunities;
          it should equally hunt SIMILAR and RELEVANT things across toolboxes, os_prompts,
          and functional groups and fold them under an umbrella or merge them into
          one case - exactly the way it already hunts gaps."
        cause: DEEP emits many near-duplicate / overlapping cases (same 
          functional group, same target) with no similarity pass, so per-run 
          work sprawls.
        how: "Edit os_prompt 05's DEEP description to add a similarity/consolidation
          detection habit of equal weight to gap-hunting: during DEEP analytics, cluster
          cases that touch the same functional group / same target / overlapping concerns
          and emit them as ONE umbrella case (or merge into one case). Reuse the existing
          case-scoring structure (benefit/cost/worth-it, os_prompt 05 'one FG = one
          case'). No new engine - prompt methodology only.\\nTargets: _os/os_prompts/05_evolution-Evolution_System.md\\
          n\\ Steps: - In os_prompt 05 DEEP section, add 'also detect similar/relevant
          things and consolidate into umbrella/merged cases'. - Keep case scoring
          intact. - Honor LAW 4 (functional groups named by function) when merging."
        benefit: Smaller, cleaner DEEP case set; less duplicate execution work; 
          mirrors how DEEP already handles toolboxes
        cost: One os_prompt 05 edit (methodology, no code)
        worth_it: yes
      fast_self_improve:
        why: "FAST already targets os_prompts (os_prompt 05 lists os_prompts as a
          component FAST works on). Two duties: (a) when it edits an os_prompt, apply a
          self-improve discipline - record the change, honor maturity/activation, treat
          the edit as reversible under LAW 2 - like the background skill-review loop
          does for the build-in skills store; (b) FAST must ACTUALLY RUN each turn -
          per-tick it audits os_prompts + project data for improvement opportunities,
          but ONLY when FAST is active. FAST is the SOLE auditor of os_prompts: no other
          script or loop audits os_prompts (the build-in skill-review loop only covers
          ~/.hermes/skills, never workspace os_prompts)."
        cause: FAST edits os_prompts ad-hoc with no recorded-patch / reversible 
          / maturity-aware discipline, so its self-improvement of the OS is not 
          auditable or safe. Also, nothing currently runs FAST per-turn, so os_prompts
          drift without a continuous audit - the per-turn duty above needs a daemon
          trigger to actually fire (outside the edit-only os_prompts scope).
        how: "Edit os_prompt 05's FAST description to harden its os_prompts methodology:
          (1) record what changed and why in the mission's runtime.recent_events /
          review_queue; (2) honor the os_prompt's maturity/activation state (high-maturity
          = treat as pinned, do not reshape); (3) treat each os_prompt edit as reversible
          under LAW 2 (the existing archive model). No new mechanism - prompt methodology
          only.\\nTargets: _os/os_prompts/05_evolution-Evolution_System.md; _os/os_prompts/06_toolboxes-Toolboxes.md
          (maturity/activation reuse)\\n\\ Steps: - In os_prompt 05 FAST section,
          add self-improve methodology for os_prompts edits + the per-turn active-only
          audit duty (FAST scans os_prompts each tick when active; it is the sole os_prompt
          auditor). - Reference LAW 2 reversibility
          + os_prompt 06 maturity."
        benefit: FAST self-improves the OS's own operating instructions safely 
          and audibly, mirroring background_review.py for build-in skills
        cost: One os_prompt 05 edit (methodology, no code)
        worth_it: yes
    tasks:
      deep_consolidation:
        progress: pending
        owner: agent
        detail: "Edit os_prompt 05 DEEP section: add similarity/consolidation detection
          (umbrella/merge of similar+relevant cases) as a first-class DEEP habit,
          equal to gap-hunting; reuse existing case scoring; honor LAW 4."
      fast_self_improve:
        progress: pending
        owner: agent
        detail: "Edit os_prompt 05 FAST section: harden os_prompts-editing methodology
          - record change, honor maturity/activation (pinned-equivalent), reversible
          under LAW 2; mirror background_review.py self-improve discipline. ALSO add the
          per-turn duty: when FAST is active it audits os_prompts + project data each
          tick (sole os_prompt auditor). NOTE: making it actually run each turn requires
          a daemon per-tick trigger - resolve before EXECUTION (currently edit-only scope)."
