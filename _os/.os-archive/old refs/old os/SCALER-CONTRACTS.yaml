# SCALER-CONTRACTS.yaml
# Pre/post-flight gates and integration contracts for the Scaler pipeline.
# Aligned with Pipelines_Architecture.md v2.0 — run-based execution, gateway delivery, tracker YAMLs.

contracts:
  pre_flight_gates:
    - check_board_freshness
    - check_no_active_audit
    - verify_target_entity_exists
    - verify_gateway_pillars_exist
    - verify_trackers_initialized
  post_flight_gates:
    - verify_trackers_updated
    - update_board_metrics
    - log_to_recent_events
    - verify_runtime_board_sync
  integration_rules:
    require_planning_run: true
    allow_direct_write: false
    require_action_gate_approval: true
    gateway_delivery_required: true
    copy_never_move: true
    run_folder_atomic_with_board: true
    archive_header_promotion: true
    archived_runs_leave_board: true