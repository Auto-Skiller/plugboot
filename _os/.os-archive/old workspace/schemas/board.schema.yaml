####################################################
# BOARD SCHEMA — <entity>-board.yaml
# Universal schema for system-board.yaml AND
# project_name-board.yaml.
#
# The board is the ONLY CONTROL PLANE for this entity.
# Everything is controlled from here — missions, pipelines,
# toolboxes, and all agent/user interactions.
#
# Structure:
#   metadata      → entity identity and sync state
#   metrics       → engine-computed aggregated counters
#   live_state    → live operational events (engine-written)
#   hub           → fill_queue / review_queue / backlog
#   missions      → goal/task hierarchy (user-controlled)
#   pipelines     → shared_pipelines + local_pipelines
#   toolboxes     → shared_toolboxes + local_toolboxes
#
# NO PATHS in boards. All paths live in the index.
# Agent/skill/reference files are plain Markdown — no frontmatter.
# Their metadata is declared here in the board so
# both users and agents can see it.
####################################################

####################################################
# METADATA — Entity identity and sync state
####################################################

####################################################
# METRICS — Engine-computed aggregated counters
# OUT fields — written by the sync daemon only.
####################################################

####################################################

# STATE + communication channel
#
#   fill_queue    (was: sync_requests)
#     → Engine → Agents: fields/files that need populating.
#       Engine flags what's empty or stale; agents fill it.
#
#   review_queue  (was: review_requests)
#     → Agents → User: items that need human review.
#       Agents queue proposals, decisions, or blockers here.
#
#   backlog       (was: backlog_events)
#     → Shared: ideas, next steps, and focuses from
#       both agents and the user. A rolling ideas pool.
####################################################

####################################################
# MISSIONS — Active goals for this entity
# Everything is controlled from here — status, goals,
# tasks. Agents read and update missions from the board.
# Move missions above pipelines.
####################################################

####################################################
# PIPELINES — User-controlled pipeline activation
# and action gate profiles.
#
# Pipelines are blueprints in _shared/ or entity-local.
# They are controlled and launched from here.
# Pillars are defined per-entity — set them to match
# this entity's context (differ per project/system).
####################################################

####################################################
# TOOLBOXES — User-controlled toolbox activation
# Full agent/skill/reference metadata presented here
# so users can see what's available and control it.
# Toolbox files are plain Markdown — no frontmatter.
####################################################

metadata:
  name: string # Entity name e.g. "system", "project_name"
  class: system | "project_name"
  type: board
  version: string

freshness:
  sync_status: fresh | need-syncing | syncing | error
  last_synced: timestamp
  last_edited: timestamp
  sync_count: integer
  fill_queue:
    os_prompts: [string] # Gaps at os_prompts level
    ledgers: [string] # Gaps at ledgers level
    missions: [string] # Task/Goal gaps in missions
    pipelines: [string] # Setup gaps in pipelines
    toolboxes: [string] # Frontmatter/metadata gaps in toolboxes

control:
  status: true | false # Is it active?
  auto_mode: true | false # Does it run autonomously?
  plan_first: on | off # When ON: agents MUST plan before executing

  pipelines_control:
    local_pipelines: on | off | custom
    shared_pipelines: on | off | custom

  toolboxes_control:
    local_toolboxes: on | off | custom
    shared_toolboxes: on | off | custom

  boot: on | off
  sync_daemon: on | off

  evolution:
    status: on | off # When ON: system evolves via proposals

metrics:
  os_prompts: integer

  ledgers:
    total: integer # Total tracked content files
    indexed: integer

  missions_metrics:
    total: integer # Engine-computed
    active: integer # Engine-computed
    paused: integer
    completed: integer
    archived: integer
    unlimited_missions: integer
    missions_progress_percentage:
    missions_current_round_progress_percentage:

  pipelines_metrics:
    total: integer
    local: integer
    shared: integer
    active_pipelines:
      local: integer
      shared: integer
      total: integer
      stub: integer
      functional: integer
      hardened: integer
      battle-tested: integer
    inactive_pipelines:
      local: integer
      shared: integer
      total: integer
      stub: integer
      functional: integer
      hardened: integer
      battle-tested: integer

  toolboxes_metrics:
    total: integer
    local: integer
    shared: integer
    active_toolboxes:
      local: integer
      shared: integer
      total: integer
      stub: integer
      functional: integer
      hardened: integer
      battle-tested: integer
    inactive_toolboxes:
      local: integer
      shared: integer
      total: integer
      stub: integer
      functional: integer
      hardened: integer
      battle-tested: integer

state:
  last_progress_at: timestamp
  recent_events: [string]

  review_queue: [string]

  backlog: [string]

evolution:
  "proposal_name":
    proposal_id: string
    target_file: string
    rationale: string
    status: pending | accepted | rejected
    created_at: timestamp
    resolved_at: timestamp

  "...":

# for missions and pipelines always show them soretd from the last_progress_at to the oldest without losing any datas

missions:
  "mission_name":
    last_progress_at: timestamp
    mission_objective: string

    mission_control:
      status: active | paused | completed | archived
      priority: LOW | MEDIUM | HIGH | CRITICAL
      max_rounds: integer | "unlimited"

    mission_metrics: # Engine-computed
      progress_status: blocked | pending | in-progress | completed
      current_round: integer
      mission_tasks: integer
      current_round_progress_percentage: string
      mission_goals: integer
      total_progress_percentage: string

    mission_state:
      recent_events: [string]

      review_queue: [string]

      backlog: [string]

    goals:
      "goal_name":
        goal_objective: string
        goal_control:
          status: on | off
          priority: LOW | MEDIUM | HIGH | CRITICAL
        goal_instructions: string
        goal_artifacts:
          - "filename"
          - "..."

      "...":

    tasks:
      "task_name":
        task_objective: string
        task_metrics:
          progress: blocked | pending | in-progress | completed
          last_progress_at: timestamp
        task_instructions: string
        task_artifacts:
          - "filename"
          - "..."

      "...":

  "...":

pipelines:
  pipelines_metrics:
    local_pipelines:
      total: integer
      active_pipelines:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer
      inactive_pipelines:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer

    shared_pipelines:
      total: integer
      active_pipelines:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer
      inactive_pipelines:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer

  "pipeline_name":
    last_progress_at: timestamp
    definition_source: local | shared

    pipeline_control:
      status: on | off
      maturity: stub | functional | hardened | battle-tested

    pipeline_metrics:
      active_pillars: integer

      INTERNAL:
        PLANNING_runs:
          total: integer
          need_aproval: integer
          active: integer
        EXECUTION_runs:
          total: integer
          need_aproval: integer
          active: integer

      INBOX:
        PLANNING_runs:
          total: integer
          need_aproval: integer
          active: integer
        EXECUTION_runs:
          total: integer
          need_aproval: integer
          active: integer

      RESEARCH:
        PLANNING_runs:
          total: integer
          need_aproval: integer
          active: integer
        EXECUTION_runs:
          total: integer
          need_aproval: integer
          active: integer

    pipeline_state:
      recent_events: [string]

      review_queue: [string]

      backlog: [string]

    pillars:
      user_added:
        pillars: [string]

        "pillar_name":
          status: on | off
          description: string
          examples: string
          why: string
          objective: string

      agents_added:
        pillars: [string]

        "pillar_name":
          status: on | off
          description: string
          examples: string
          why: string
          objective: string

      active_pillars: [string] # actives

    profiles:
      INTERNAL: # scans internal project ledgers and os_prompts to fix gaps and enhance systems
        status: on | off

        runs:
          PLANNING:
            status: on | off
            focused_pillars: all | [string]
            focused_objective: all | Link | Fix | Enhance
            action_gates: all | [string]
            PLANNING_runs:
              "run_name":
                status: PLANNING | reject | rejected | approve | EXECUTION | completed | archive | archived
                run_summary: string
                focused_pillars: [string]
                focused_objective: all | Link | Fix | Enhance
                action_gates: [string]

          EXECUTION:
            status: on | off
            focused_pillars: all | [string]
            focused_objective: all | Link | Fix | Enhance
            action_gates: all | [string]
            EXECUTION_runs:
              "run_name":
                status: PLANNING | reject | rejected | approve | EXECUTION | completed | archive | archived
                run_summary: string
                focused_pillars: [string]
                focused_objective: all | Link | Fix | Enhance
                action_gates: [string]

      INBOX: # scans internal ledgers + user inbox (INBOX-inboxing/) to fix gaps and enhance systems
        status: on | off
        gateway_delivery:  # controls how agent delivers from INBOX-inboxing/ → INBOX-gateway/<Pillar>/
          status: on | off
          focused_pillars: all | [string]

        runs:
          PLANNING:
            status: on | off
            focused_pillars: all | [string]
            focused_objective: all | Link | Fix | Enhance
            action_gates: all | [string]
            PLANNING_runs:
              "run_name":
                status: PLANNING | reject | rejected | approve | EXECUTION | completed | archive | archived
                run_summary: string
                focused_pillars: [string]
                focused_objective: all | Link | Fix | Enhance
                action_gates: [string]

          EXECUTION:
            status: on | off
            focused_pillars: all | [string]
            focused_objective: all | Link | Fix | Enhance
            action_gates: all | [string]
            EXECUTION_runs:
              "run_name":
                status: PLANNING | reject | rejected | approve | EXECUTION | completed | archive | archived
                run_summary: string
                focused_pillars: [string]
                focused_objective: all | Link | Fix | Enhance
                action_gates: [string]

      RESEARCH: # agent stores web research in RESEARCH-researching/, then delivers to RESEARCH-gateway/<Pillar>/
        status: on | off
        gateway_delivery:  # controls how agent delivers from RESEARCH-researching/ → RESEARCH-gateway/<Pillar>/
          status: on | off
          focused_pillars: all | [string]
        researching:  # controls the autonomous research activity itself
          status: on | off
          focused_pillars: all | [string]
          focused_objective: all | Link | Fix | Enhance

        runs:
          PLANNING:
            status: on | off
            focused_pillars: all | [string]
            focused_objective: all | Link | Fix | Enhance
            action_gates: all | [string]
            PLANNING_runs:
              "run_name":
                status: PLANNING | reject | rejected | approve | EXECUTION | completed | archive | archived
                run_summary: string
                focused_pillars: [string]
                focused_objective: all | Link | Fix | Enhance
                action_gates: [string]

          EXECUTION:
            status: on | off
            focused_pillars: all | [string]
            focused_objective: all | Link | Fix | Enhance
            action_gates: all | [string]
            EXECUTION_runs:
              "run_name":
                status: PLANNING | reject | rejected | approve | EXECUTION | completed | archive | archived
                run_summary: string
                focused_pillars: [string]
                focused_objective: all | Link | Fix | Enhance
                action_gates: [string]

toolboxes:
  toolboxes_metrics: # Engine-computed
    local_toolboxes:
      total: integer
      active_toolboxes:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer
      inactive_toolboxes:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer

    shared_toolboxes:
      total: integer
      active_toolboxes:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer
      inactive_toolboxes:
        total: integer
        stub: integer
        functional: integer
        hardened: integer
        battle-tested: integer

  local_toolboxes: # From entity's own .XXX-meta/.XXX-toolboxes/
    "domain_name": # e.g. "agentic", "engineering"
      domain_control:
        status: on | off | custom
        maturity: stub | functional | hardened | battle-tested

      domain_metrics:
        total: integer
        active_toolboxes:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer
        inactive_toolboxes:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer

      "toolbox_name": # e.g. "analysis", "coding"
        toolbox_control:
          status: on | off | custom
          maturity: stub | functional | hardened | battle-tested
          agents_status: on | off | custom
          skills_status: on | off | custom

        toolbox_metrics:
          agents:
            total: integer
            active:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer
            inactive:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer

          skills:
            total: integer
            active:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer
            inactive:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer

        toolbox_agents:
          "agent_name":
            agent_control:
              status: on | off
              maturity: stub | functional | hardened | battle-tested
            role: string
            description: string
            when_to_use: string
            triggers: [string]

          "...":

        toolbox_skills:
          "skill_name":
            skill_control:
              status: on | off
              maturity: stub | functional | hardened | battle-tested
            description: string
            when_to_use: string
            triggers: [string]
            inputs: [string]
            outputs: [string]
            total_references:

          "...":

      "...":

    "...":

  shared_toolboxes: # From _shared/.shared-toolboxes/
    "domain_name": # e.g. "agentic", "engineering"
      domain_control:
        status: on | off
        maturity: stub | functional | hardened | battle-tested

      domain_metrics:
        total: integer
        active:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer
        inactive:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer

      "toolbox_name": # e.g. "analysis", "coding"
        toolbox_control:
          status: on | off
          maturity: stub | functional | hardened | battle-tested

        toolbox_metrics:
          agents:
            total: integer
            active:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer
            inactive:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer

          skills:
            total: integer
            active:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer
            inactive:
              total: integer
              stub: integer
              functional: integer
              hardened: integer
              battle-tested: integer

        toolbox_agents:
          "agent_name":
            agent_control:
              status: on | off
              maturity: stub | functional | hardened | battle-tested
            role: string
            description: string
            when_to_use: string
            triggers: [string]

          "...":

        toolbox_skills:
          "skill_name":
            skill_control:
              status: on | off
              maturity: stub | functional | hardened | battle-tested
            description: string
            when_to_use: string
            triggers: [string]
            inputs: [string]
            outputs: [string]
            total_references:

          "...":

      "...":

    "...":

####################################################
# END OF BOARD SCHEMA
####################################################
