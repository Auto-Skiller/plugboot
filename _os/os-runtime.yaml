  suggestions:
    total: 3
    agent_operating_conventions:
      status: true
      description: Workspace-wide operating conventions for how the agent 
        onboards, profiles, and respects boundaries for this user. Derived from 
        os_prompts (identity/ laws/conduct/behaviors), NOT from inbox drop 
        names. Inbox items route into this pillar by content (per-item), 
        regardless of which raw drop they came from.
      why: Centralises user-specific onboarding, profile/setup, security 
        boundaries, out-of-scope rules, and reusable interaction guidelines so 
        the agent reliably honours them instead of re-deriving them per session.
      contains:
      - Agent onboarding + workspace profile/setup conventions
      - Security boundaries, out-of-scope rules, and safe-operations guardrails
      - Reusable interaction guidelines (how the agent should talk/act for this 
        user)
      triggers:
      - when onboarding or acting for this user
      - when a security / scope / conduct question arises
      relevant_paths:
      - _os/os_prompts
    capability_and_skill_library:
      status: true
      description: 'Catalog of capability/skill resources the OS can activate on demand.
        Derived from os_prompts (toolboxes: the Capabilities aspect), NOT from inbox
        drop names. Inbox items route in by content.'
      why: Makes the agent's skill set discoverable and activatable by name; 
        closes the gap between raw capability drops and live toolboxes.
      contains:
      - Skill/agent catalog (analysis, benchmarking, engineering, swifty, etc.)
      - Activation + discovery metadata (role / when_to_use / triggers / inputs 
        / outputs)
      - Capability maturity ladder (stub -> functional -> hardened -> 
        battle-tested)
      triggers:
      - when a task maps to a known capability
      - when installing/activating a skill
      relevant_paths:
      - _os/os-toolboxes.yaml
    engineering_methodologies:
      status: true
      description: Structured multi-phase engineering processes the OS applies 
        to large work. Derived from os_prompts (the Evolution System + 01 
        identity/architecture), NOT from inbox drop names.
      why: Gives the OS a repeatable methodology for requirements, skill 
        lifecycle, conversation hooks, and goal-specify-develop work.
      contains:
      - PRP system (product-requirements prompt for large projects)
      - Instinct system (reflex/learned behavior patterns)
      - Hookify (conversation hooks / triggered behaviors)
      - GSD (goal -> specify -> develop execution loop)
      triggers:
      - when tackling large/multi-phase engineering work
      - when a structured methodology is needed
      relevant_paths:
      - _os/os_prompts
  validated:
    active: 0
    total: 0
