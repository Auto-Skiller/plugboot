    tighten_agent_user_operating_boundaries:
      status: true
      description: Direction - the agent must reliably respect the user's 
        operating conventions (onboarding, profile/setup, security boundaries, 
        out-of-scope, interaction style) without re-deriving them each session.
      objective: Make agent<->user operating conventions a first-class, enforced
        part of the OS identity/laws/conduct + runtime pillars so boundaries are
        applied by default.
    make_capabilities_discoverable_and_activatable:
      status: true
      description: Direction (Capabilities aspect) - the OS skill/agent library 
        should be discoverable by name and activatable on demand, with complete 
        metadata (role/when_to_use/triggers/inputs/outputs) on every entry.
      objective: Close all toolboxes metadata gaps and surface the capability 
        library so any task maps to a known, activatable skill.
    give_the_os_a_repeatable_engineering_methodology:
      status: true
      description: Direction (Architecture aspect) - the OS should apply a 
        structured, multi-phase engineering process to large work rather than 
        ad-hoc execution.
      objective: Establish one reusable engineering methodology (plan -> specify
        -> build -> verify) wired into standard execution for multi-phase 
        projects.
