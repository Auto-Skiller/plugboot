      - Instinct system (reflex/learned behavior patterns)
      - Hookify (conversation hooks / triggered behaviors)
      - GSD (goal -> specify -> develop execution loop)
      triggers:
      - when tackling large/multi-phase engineering work
      - when a structured methodology is needed
      relevant_paths:
