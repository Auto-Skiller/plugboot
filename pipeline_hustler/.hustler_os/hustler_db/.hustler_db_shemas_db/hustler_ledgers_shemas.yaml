system_metadata:
  name: hustler_ledgers_schemas
  type: schema
  version: '1.1'
  schema_version: '1.1'
  schema_path: pipeline_hustler/.hustler_os/hustler_db/.hustler_db_shemas_db/hustler_ledgers_shemas.yaml

metadata:
  purpose:
    entry_type: static
    value: >
      Schema for the granular tracking ledgers inside .hustler_os/hustler_db/.
      Defines the focus, sources, and mixed inbox trackers.
      Enforces the strict State (Physical Work) vs Metadata (IN-OUT Communication) architecture.

content: {}

sources_ledger_schema: |
  system_metadata:
    name: string
    purpose: string
    type: db
    version: string
  
  metadata:
    metrics:
      total_sources: integer
    hub:
      messages: [string] # (in-out) targeted messages from main OS DB

  state:
    tracked_sources: [string] # Physical file paths

focus_ledger_schema: |
  system_metadata:
    name: string
    purpose: string
    type: db
    version: string
  
  metadata:
    metrics:
      total_products: integer
      pending_products: integer
      validated_products: integer
      total_features: integer
      pending_features: integer
      validated_features: integer
    hub:
      messages: [string] # (in-out) targeted messages from main OS DB
      
  state:
    tracked_products: [string] # Physical file paths
    tracked_features: [string] # Physical file paths
    history: [string] # Physical file paths

mixed_inbox_ledger_schema: |
  system_metadata:
    name: string
    purpose: string
    type: db
    version: string
  
  metadata:
    metrics:
      processed_count: integer
      
  state:
    processed_items:
      - filename: string
        content_hash: string
        processed_at: timestamp
        routed_to: string
