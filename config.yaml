####################################################
# CONFIG - config.yaml (follows schemas/config-schema.yaml)
####################################################

freshness:
  sync_status: fresh
  sync_count: 0
  last_synced:
  last_edited:

current_window: os # os | "<project_name>"
manager_boot: true
sync_daemon: true

# Dashboard UI config (separate from the server itself, which sync_daemon controls)
dashboard:
  enabled: true
  auto_open: true
  theme: dark
  port: 8000

status: true
autonomy: true
toolboxes: true
inbox-gateway_delivery: true

missions:
  auto_triggering:
    standard: false
    research: false
    evolution: {FAST: false, DEEP: false, RESEARCH: true, INBOX: true}
  auto_execution:
    standard: true
    research: true
    evolution: {FAST: true, DEEP: true, RESEARCH: true, INBOX: true}
  auto_archiving:
    standard: true
    research: true
    evolution: {FAST: true, DEEP: true, RESEARCH: false, INBOX: true}

# Projects (engine-maintained, one block per project)
