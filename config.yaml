####################################################
# CONFIG - config.yaml (follows schemas/config-schema.yaml)
####################################################

freshness:
  sync_status: fresh
  sync_count: 0
  last_synced:
  last_edited:

current_window: os          # os | "<project_name>"
boot: false
sync_daemon: false

# Dashboard UI config (separate from the server itself, which sync_daemon controls)
dashboard:
  enabled: true
  auto_open: true
  theme: dark
  port: 8000

status: true
autonomy: false
toolboxes: false
inbox-gateway_delivery: false

missions:
  auto_triggering:
    standard: false
    research: false
    evolution: {FAST: false, DEEP: false, RESEARCH: false, INBOX: false}
  auto_execution:
    standard: false
    research: false
    evolution: {FAST: false, DEEP: false, RESEARCH: false, INBOX: false}
  auto_archiving:
    standard: false
    research: true
    evolution: {FAST: true, DEEP: true, RESEARCH: true, INBOX: true}

# Projects (engine-maintained, one block per project)
