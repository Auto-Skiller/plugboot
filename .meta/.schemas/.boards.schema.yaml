        active_agents: integer
        total_skills: integer
        active_skills: integer
        usage_count:
        usage_rating:
      
      toolbox_agents:

        "agent_01_filename":
          agent_freshness:
            sync_status: fresh | need-syncing | syncing | error
            sync_count: integer
            last_synced: timestamp
            last_edited: timestamp
          agent_id:
            role: string
            when_to_use: string
            contains: string
            triggers: [string]
          agent_control:
            status: on | off
            maturity: stub | functional | hardened | battle-tested
          agent_metrics:
            usage_count:
            usage_rating:

        "...":

      toolbox_skills:

        "skill_01_foldername":
          skill_freshness:
            sync_status: fresh | need-syncing | syncing | error
            sync_count: integer
            last_synced: timestamp
