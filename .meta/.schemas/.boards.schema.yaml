metadata:
  class: system | "pipeline_name"  | "project_name"
  version: 
  
freshness:
  sync_status: fresh | need-syncing | syncing | error
  sync_count: integer
  last_synced: timestamp
  last_edited: timestamp


####################################################
# 
####################################################


metrics: 
  os_prompts: integer

  missions:
    total: integer
    active: integer
    paused: integer
    completed: integer
    archived: integer

  ledgers:
    total: integer
    tracked: integer
    completed: integer
    rejected: integer
    pending: integer

  toolboxes:
    total: integer
    stub: integer
    functional: integer
    hardened: integer
    battle-tested: integer


####################################################
# 
####################################################


runtime:
  sync_requests: [string]
  recent_events: [string]

hub:
  review_requests: []
  backlog_events: []


####################################################
# 
####################################################


missions:

  "mission_01_name":

    mission_objective: string
    mission_control:
      status: active | paused | completed | archived
      priority: LOW | MEDIUM | HIGH | CRITICAL
      max_rounds: integer|"unlimited"

    mission_metrics:
      progress_status: blocked | pending | in-progress | completed
      current_round: integer
      mission_tasks: integer
      round_progress_percentage: string
      mission_goals: integer
      total_progress_percentage: string
      last_progress_at: timestamp

    mission_runtime:

      goals:

        "goal_01_name":
          goal_objective: string
          goal_control:
            status: on | off
            priority: LOW | MEDIUM | HIGH | CRITICAL
          goal_instructions: string
          goal_artifacts: 
            - "goal_artifact_01_filename"
            - "...":

        "...":

      tasks:

        "task_01_name":
          task_objective: string
          task_metrics:
            progress: blocked | pending | in-progress | completed
            last_progress_at: timestamp
          task_instructions: string
          task_artifacts: 
            - "task_artifact_01_filename"
            - "...":

        "...":

  "...":


