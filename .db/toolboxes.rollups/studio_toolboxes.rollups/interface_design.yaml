      25 chart types across 10 stacks (React, Next.js, Vue, Svelte, SwiftUI, React
      Native, Flutter, Tailwind, shadcn/ui, and HTML/CSS). Actions: plan, build, create,
      design, implement, review, fix, improve, optimize, enhance, refactor, and check
      UI/UX code. Projects: website, landing page, dashboard, admin panel, e-commerce,
      SaaS, portfolio, blog, and mobile app. Elements: button, modal, navbar, sidebar,
      card, table, form, and chart. Styles: glassmorphism, claymorphism, minimalism,
      brutalism, neumorphism, bento grid, dark mode, responsive, skeuomorphism, and
      flat design. Topics: color systems, accessibility, animation, layout, typography,
      font pairing, spacing, interaction states, shadow, and gradient. Integrations:
      shadcn/ui MCP for component search and examples."
    path: .meta/toolboxes/studio_toolboxes/interface_design/skills/ui-ux-pro-max
