metadata:
  name: pipeline_hustler.rollup
  class: pipeline_hustler
  type: rollup
  version: '2.0'
  schema_version: '2.0'
  freshness:
    status: fresh
    sync_count: 0
    last_synced_by: daemon
    last_synced: '2026-06-26T07:18:16'

credentials:
  description: Hustler pipeline rollup — aggregated index of runbooks, ledgers, and focus tracking metadata
  when_to_use: Read to understand hustler pipeline structure, find runbooks, or check focus/ledger state
  contains: runbooks, ledgers, focus, products, features, sources

runbooks:
  hustler-contracts.yaml:
    path: .meta/.os/pipeline_hustler.runbooks/HUSTLER_CONTRACTS.yaml
    description: "Pre/post-flight gates and cascade validation contracts."
    when_to_use: "Read before any hustler operation — defines the cascade contract"
    contains: contracts, contract_rules
  hustler-architecture.md:
    path: .meta/.os/pipeline_hustler.runbooks/Hustler-Architecture.md
    description: "Three-tier Focus-Product-Feature hierarchy, tracker system, automation boundaries, and brain/runtime/workspace separation"
    when_to_use: "Read to understand the Hustler pipeline structure, hierarchy, and placement rules"
    contains: hierarchy, tracker_system, automation
  hustler-cascading-logic.md:
    path: .meta/.os/pipeline_hustler.runbooks/Hustler-Cascading-Logic.md
    description: "Cascading decision tree, threshold definitions, 5 boundary signals, cluster-first rule, and validation checklist"
    when_to_use: "Read when deciding whether to cascade a signal into an existing focus/product/feature"
    contains: decision_tree, thresholds, cluster_rule
  hustler-event-vocabulary.md:
    path: .meta/.os/pipeline_hustler.runbooks/Hustler-Event-Vocabulary.md
    description: "Complete catalog of event names emitted inside the Hustler pipeline — cascade, tag lifecycle, atomic recovery, audit"
    when_to_use: "Read when logging events during Hustler sync or auditing the event trail"
    contains: event_types, tag_lifecycle, recovery_procedures
  hustler-operational-rules.md:
    path: .meta/.os/pipeline_hustler.runbooks/Hustler-Operational-Rules.md
    description: "15 H-LAWs governing Hustler behavior — cascading integrity, atomic tracker update, DNA preservation, source quality bar, and conflict resolution"
    when_to_use: "Read when making cascade decisions — defines all operational constraints and the 15 H-LAWs"
    contains: h_laws, atomic_tracker, operational_rules
  hustler-tagging-system.md:
    path: .meta/.os/pipeline_hustler.runbooks/Hustler-Tagging-System.md
    description: "Tag taxonomy ([new-data], [processed-data], [new-scraped], [new-def], [new-needs]) and Phase 3/4 processing playbook"
    when_to_use: "Read when transitioning data between pipeline stages or handling data gap provenance"
    contains: tags, transitions, taxonomy
  hustler-workflows.md:
    path: .meta/.os/pipeline_hustler.runbooks/Hustler-Workflows.md
    description: "5-phase execution approach — ingestion, cascading discovery, definition, needs fulfillment, productization, and audit pass"
    when_to_use: "Read during each Hustler execution cycle or when reviewing the audit pass procedure"
    contains: workflows, audit_pass, reference_cards

ledgers:
  .mixed_inbox.yaml:
    path: .db/pipeline_hustler.ledgers/.mixed_inbox.yaml
    description: Anti-duplicator — tracks items processed from .hustler_mixed_inbox/
    when_to_use: Read to check if a source was already cascaded
    contains: routing_history, content_hashes
  algerian-ecommerce.focus.yaml:
    path: .db/pipeline_hustler.ledgers/algerian-ecommerce.focus.yaml
    description: Per-focus strategic rollup for Algerian ecommerce (products/features
      + market context)
    when_to_use: Read when working with algerian ecommerce focus — products, features,
      market data
    contains: focus_rollup, products, features, market_context
  algerian-ecommerce.sources.yaml:
    path: .db/pipeline_hustler.ledgers/algerian-ecommerce.sources.yaml
    description: Anti-duplication tracker for sources cascaded into algerian-ecommerce
      focus
    when_to_use: Read when checking if a source was already cascaded into this focus
    contains: source_hashes, cascade_history

