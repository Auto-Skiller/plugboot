---

credentials:
  description: "Tracks all evolution proposals, their lifecycle, integration status, and rollback history. Central ledger for OS self-improvement."
  when_to_use: "Read when reviewing evolution proposals, auditing integration status, or checking rollback history. Write when proposing, approving, or integrating any systemic change."
  contains:
    - evolution_proposals
    - integration_status
    - rollback_history
    - dna_trio_checks
  triggers:
    - user_submits_evolution_proposal
    - agent_identifies_systemic_flaw
    - integration_complete
    - rollback_required
  inputs:
    - user_evolution_request: .db/.system.board.yaml/runtime.evolution_queue
    - agent_discovery: .db/ledgers/pipeline_scaler.ledgers/*proposals.yaml
  outputs:
    - status_to: .db/.system.board.yaml/runtime.evolution_queue
    - events_to: .db/.system.board.yaml/state.recent_events
    - proposals_to: .db/ledgers/pipeline_scaler.ledgers/*proposals.yaml

metadata:
  name: system-evolution.ledger
  class: system/ledger
  type: ledger
  version: '1.0'
  schema_version: '1.0'
  freshness:
    status: active
    sync_count: 1
    last_synced_by: agent
    last_synced: '2026-06-28T05:00:00'
  role: system-evolution.ledger
summary:
  total_proposals: 0
  pending: 0
  approved: 0
  integrated: 0
  rejected: 0
  rolled_back: 0
tracked_items: []
history: []
