metadata:
  name: hustler_db_schema
  type: schema
  version: '2.1'
  schema_version: '2.1'

  purpose:
    entry_type: static
    value: >-
      Schema for pipeline_hustler.board.yaml and all hustler ledger/runbook files.
      Board: metadata, state(metrics, recent_events), hub, runtime(product_gaps), milestones.

content: {}

hustler_db_schema: |
  metadata:
    name: string
    type: pipeline_hustler
    version: string
    schema_version: string
    freshness:
      status: fresh | syncing | error
      sync_count: integer
      last_synced_by: string
      last_synced: timestamp

  state:
    metrics:
      throughput: integer
      active_pipelines: integer
    recent_events: [string]

  hub:
    messages: [string]
    backlog: [string]

  runtime:
    product_gaps:
      - gap_id: string
        description: string
        discovered_by: string
        status: open | resolved

  milestones:
    "[SESSION_NAME]": {...}

sources_ledger_schema: |
  metadata:
    name: string
    type: focus_sources
    focus_id: string
    description: string
    schema_version: string
  credentials:
    description: string
    when_to_use: string
    contains: [string]
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string
  tracked_sources: [...]

focus_ledger_schema: |
  metadata:
    name: string
    type: focus
    focus_id: string
    description: string
    schema_version: string
    market_context: {...}
  credentials:
    description: string
    when_to_use: string
    contains: [string]
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string
  tracked_products: [string]
  tracked_features: [string]

mixed_inbox_ledger_schema: |
  metadata:
    name: string
    description: string
    schema_version: string
  credentials:
    description: string
    when_to_use: string
    contains: [string]
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string
  tracked_items: [...]
