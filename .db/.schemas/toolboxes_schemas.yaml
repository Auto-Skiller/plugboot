metadata:
  class: toolboxes
  type: schema
  version: '1.0'
    
id:
  contains: 

toolboxes: |
  metadata:
    class: toolboxes
    type: toolboxes
    version: 
    schema_version: string
    
  sync_freshness:
    sync_status: fresh | syncing | error
    sync_count: integer
    last_synced_by: string
    last_synced: timestamp
    sync_requests: [string]

  metrics:
    status: on | off
    total_toolboxes: integer
    active_toolboxes: integer
    total_agents: 
    active_agents:
    total_skills:
    active_skills:
    domains:
      domain_name: 
        status: on | off
        toolboxes: integer
        active_toolboxes: integer
        total_agents: 
        active_agents:
        total_skills:
        active_skills:
      ...
    
    domain_name:
      rollup_name:
        id:
        metrics:
      ...
    ...

rollups: |
  metadata:
    class: toolboxes
    type: rollup
    version: 
    schema_version: string
    
  sync_freshness:
    sync_status: fresh | syncing | error
    sync_count: integer
    last_synced_by: string
    last_synced: timestamp
    sync_requests: [string]

    id:
      role: string 
      when_to_use: string

    metrics:
      status: on | off
      maturity: stub | functional | hardened | battle-tested
      usage_count:
      usage_rating:
      total_skills:
      active_skills:
      skills: [string]
      total_agents: 
      active_agents
      agents: [string]

    agents: (id + metrics sections from the skills and agents)
      agent_name:
        id: 
        metrics:
      ...

    skills: (id + metrics sections from the skills and agents)
      skill_name:
        id: 
        metrics:
      ...

skills, agents: |
  metadata:
    class: toolboxes
    type: skill | agent
    version: 
    schema_version: string
    
  sync_freshness:
    sync_status: fresh | syncing | error
    sync_count: integer
    last_synced_by: string
    last_synced: timestamp
    sync_requests: [string]

  id:
    role: string 
    when_to_use: string
    contains:
    triggers: [string]
    inputs: [string]
    outputs: [string]

  metrics:
    status: on | off
    maturity: stub | functional | hardened | battle-tested
    usage_count:
    usage_rating:
    references_count:

  references:
    reference_name:
      role: string 
      when_to_use: string
      contains:
    ...
  ...
