metadata:
  name: milestones_schemas
  type: schema
  version: '5.1'
  schema_version: '1.0'
  schema_path: .db/.schemas/milestones_schemas.yaml

  purpose:
    entry_type: static
    value: >-
      Structural schema for session YAML files in .meta/milestones/ (and pipeline-local
      milestone folders). Each session file holds both the session AND all its goals.
      Follows the Dual-Entry system with (in) / (in-out) / OUT markers.

content: {}

session_schema: |
  metadata:
    name: string
    pipeline: string
    version: string
    type: schema
    freshness:
      last_synced: timestamp
      sync_count: integer
      status: fresh | syncing | error
      last_synced_by: string
    milestones: {...}

  sessions:
    - name: string
      summary: string
      status: active | paused | completed | archived
      priority: LOW | MEDIUM | HIGH | CRITICAL
      persistence:
        enabled: boolean
        max_rounds: integer|"unlimited"
        current_round: integer
      progress: pending | in-progress | done | blocked
      progress_percentage: string
      agent: string
      goals:
        - name: string
          summary: string
          status: on | pending | done | archived
          priority: LOW | MEDIUM | HIGH | CRITICAL
          progress: string
          progress_percentage: string

  "[SESSION_NAME]":
    last_progress_at: timestamp
    instructions: string
    artifacts: [string]
    tracking: string
    goals:
      "[GOAL_NAME]":
        last_progress_at: timestamp
        instructions: string
        artifacts: [string]
        tasks:
          - task: string
            status: pending | in-progress | done
        tracking: string

  allowed_values:
    session_status:
      - active
      - on
      - paused
      - completed
      - archived
    goal_status:
      - on
      - pending
      - done
      - archived
    priority:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    pipeline:
      - core
      - scaler
      - hustler
      - projects
