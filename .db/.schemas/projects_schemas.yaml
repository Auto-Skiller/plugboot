metadata:
  name: projects_schemas
  type: schema
  version: '2.1'
  schema_version: '2.1'

  purpose:
    entry_type: static
    value: >-
      Schema for project DB files (.db/project_assets.board.yaml, .db/project_ecoma.board.yaml).
      Structure: metadata, state(metrics, recent_events), hub, runtime, milestones.

content: {}

project_rollup_schema: |
  metadata:
    name: string
    class: project_assets | project_ecoma
    type: rollup
    version: string
    schema_version: string
    freshness: {...}
  credentials:
    description: string
    when_to_use: string
    contains: [string]
  docs: {}
  ledgers: {}

project_db_schema: |
  metadata:
    name: string
    type: project
    version: string
    schema_version: string
    freshness:
      last_synced: timestamp
      sync_count: integer
      status: fresh | syncing | error
      last_synced_by: string
    milestones: {...}

  state:
    metrics:
      active: integer
      completed: integer
      pending: integer
    recent_events: [string]

  hub:
    messages: [string]
    backlog: [string]

  runtime: {}
