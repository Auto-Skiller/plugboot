metadata:
  name: project_ecoma_schemas
  class: project_ecoma
  type: schema
  version: '2.0'

credentials: 
  description: Schema for project_ecoma.board.yaml — tracks ecoma project state.
  when_to_use: 
  contains: >-
   metadata, state(metrics, recent_events), hub(messages, backlog),
    project, milestones.

project_db_schema: |
  metadata:
    name: string
    type: project
    version: string
    schema_version: string
    freshness:
      last_synced: timestamp
      sync_count: integer
      status: fresh | syncing | error
      last_synced_by: string
    milestones: {...}

  state:
    metrics:
      active: integer
      completed: integer
      pending: integer
    recent_events: [string]

  hub:
    messages: [string]
    backlog: [string]

  runtime: {}
