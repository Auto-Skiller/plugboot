metadata:
  name: pipelines_schemas
  type: schema
  version: '2.1'
  schema_version: '2.1'

  purpose:
    entry_type: static
    value: >-
      Schema for pipeline board files (.db/pipeline_scaler.board.yaml, .db/pipeline_hustler.board.yaml).
      Structure: metadata, state(metrics, recent_events), sync_requests,
      runtime(domain-specific), milestones. No ledger_path in board (in index.yaml only).

content: {}

pipeline_db_schema: |
  metadata:
    name: string
    class: pipeline_scaler | pipeline_hustler
    type: board
    version: string
    schema_version: string
    freshness:
      last_synced: timestamp
      sync_count: integer
      status: fresh | syncing | error
      last_synced_by: string

  state:
    metrics:
      proposals: integer
      solutions: integer
      sources: integer
      scaled: integer
      throughput: integer
      active_pipelines: integer
    recent_events: [string]

  sync_requests: [string]

  hub:
    messages: [string]
    backlog: [string]

  runtime:
    review_queue: [string]
    remediation_queue: [string]
    product_gaps: [string]

  milestones:
    "[SESSION_NAME]": {...}

ledger_file_schema: |
  metadata:
    name: string
    class: system/ledger
    type: ledger
    version: string
    schema_version: string
    freshness:
      status: active
      sync_count: integer
      last_synced_by: string
      last_synced: timestamp
  credentials:
    description: string
    when_to_use: string
    contains: string
    triggers: [string]
    inputs: [string]
    outputs: [string]
    role: string

project_db_schema: |
  metadata:
    name: string
    class: project
    type: board
    version: string
    schema_version: string
    freshness:
      last_synced: timestamp
      sync_count: integer
      status: fresh | syncing | error
      last_synced_by: string
    milestones: {...}

  state:
    metrics:
      active: integer
      completed: integer
      pending: integer
    recent_events: [string]

  sync_requests: [string]

  hub:
    messages: [string]
    backlog: [string]

  runtime: {}
