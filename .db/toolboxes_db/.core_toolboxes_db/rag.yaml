system_metadata:
  name: rag
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves rag.
  status: active # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - pyragify
agents: {}
skills:
  pyragify:
    description: "Convert any code repository or document directory into clean, semantically-chunked
      .txt files optimized for NotebookLM ingestion."
    triggers: ["chunk codebase", "prepare for rag", "preprocess for notebooklm", "pyragify",
      "chunk documents"]
    inputs: ["repo_path", "output_dir", "config.yaml"]
    outputs: ["chunked .txt files by type", "metadata.json", "hashes.json"]
    cataloger_lock: true
    path: _toolboxes/.core_toolboxes/rag/skills/pyragify
