system_metadata:
  name: projects_index
  purpose: Index of all registered projects in the OS. Each entry maps a project
    name to its DB file in projects_db/. Project DB files hold stack, state, 
    milestones, and telemetry for finite bounded codebases.
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/projects_shemas.yaml
  freshness:
    last_synced: '2026-05-20T00:08:22.115242'
    status: fresh

metadata:
  modes:
    project_status: inactive # (in) — set by user
  projects: {} # OUT — registered project entries from projects_db
  hub:
    messages: [] # (in-out)
    recent_events: [] # OUT — last 3 events
    backlog: [] # (in-out)
  queues: # (in-out)

  state:
    gateway: # OUT
      status: active
    metrics: # OUT
      active_projects: 0
  milestones: {} # OUT — from milestones metadatas in projects/.projects_milestones/

milestones_history: # OUT — only last 3 - from milestones metadatas in projects/.projects_milestones/.projects_archived_milestones/ - should support loging multi archived things like full millistones , sessions or goals

indexes:

  identity_laws: {} # OUT — from projects/.projects_identity
  db: {} # OUT — from projects/.projects_db
