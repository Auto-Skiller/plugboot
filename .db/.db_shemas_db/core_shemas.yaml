system_metadata:
  name: core_schemas
  type: schema
  version: '3.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/core_shemas.yaml

metadata:
  purpose:
    entry_type: static
    value: >
      Structural schema for .db/.core.yaml — the core OS execution DB.
      Tracks modes, system/evolution hubs, queues, milestones, history,
      and the identity/db index. Follows the Dual-Entry system.

content: {}

core_schema: |
  system_metadata:
    name: string
    purpose: string
    type: db
    version: string
    schema_version: string
    schema_path: string
    freshness:
      last_synced: timestamp
      status: fresh | syncing | error

  metadata:
    modes:
      work_mode: string              # (in) — set by user
      action_gate: string            # (in) — set by user
      evolution_status: string       # (in) — set by user
      autosync_status: string        # OUT — daemon | manual
      dashboard_status: string       # (in) — set by user

    system:
      hub:
        messages: [string]           # (in-out)
        recent_events: [string]      # OUT — last 3 events
        backlog: [string]            # (in-out)

    evolution:
      hub:
        messages: [string]           # (in-out)
        recent_events: [string]      # OUT — last 3 events
        backlog: [string]            # (in-out)
      queues:
        pending:                     # (in-out) — evolution proposals
          - id: string
            proposed_at: timestamp
            proposed_by: string
            target_file: string
            rationale: string
            proposed_change: {}
            status: pending | accepted | rejected
        applied: [object]            # OUT — accepted + applied items
        rejected: [object]           # OUT — rejected items

    milestones:                      # OUT — from .milestones/ metadata

  milestones_history:                # OUT — last 3, from .milestones/.archived_milestones/
  health_history:                    # OUT — last 3 health snapshots

  indexes:
    identity_laws:                   # OUT — from .identity/ folder, keyed by file
      "[category]":
        "[file.md]":
          path: string
