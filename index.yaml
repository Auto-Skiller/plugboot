name: Auto-Skiller Index
description: >
  Unified index (Domain/Department) for Agents and Skills.
  Check this first to identify the right domain/department for any task,
  then load the skill index and agent persona for execution.

system_brain:
  description: "The Global System Brain: Holds all workspace-wide templates, integrations, and global logic."
  path: "_agents_brain/"
  json: "_agents_brain/system_brain.json"
  resources:
    - _experience: "The Laws & Lessons: Global constraints and operational rules."
    - _context: "The Worldview: Business models, brand voice, and global data."
    - _playbooks: "The Integrations: System-level workflows and tool SOPs."
    - _tools: "The Executables: Workspace automation and maintenance scripts."
    - _formats: "The Boilerplates: Global templates (e.g., README.md)."
    - scratch: "The Workspace: Safe zone for temporary agent files and drafted scripts."

