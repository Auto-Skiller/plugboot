# index.yaml — OS Top-Level Indexer

metadata:
  name: root_index
  version: '2.1'

system:
  board: .db/.system.board.yaml
  rollup: .db/.system.rollup.yaml
  ledgers: .db/ledgers/.system.ledgers/
  identity: .meta/.os/.system.identity/
  milestones: .db/milestones/
  schema_path: .db/.schemas/system_schemas.yaml

domains:
  scaler:
    board: .db/pipeline_scaler.board.yaml
    rollup: .db/pipeline_scaler.rollup.yaml
    runbooks: .meta/.os/pipeline_scaler.runbooks/
    ledgers: .db/ledgers/pipeline_scaler.ledgers/
    external_sources: pipeline_scaler/_SCALER-EXTERNAL_SOURCES
    schema_path: .db/.schemas/pipeline_scaler_schemas.yaml
    proposals_paths:
      external:
        - pipeline_scaler/Foundational_Integrity_external_proposals
        - pipeline_scaler/Operational_Muscles_external_proposals
        - pipeline_scaler/Value_Generation_external_proposals
      internal:
        - pipeline_scaler/Foundational_Integrity_internal_proposals
        - pipeline_scaler/Operational_Muscles_internal_proposals
        - pipeline_scaler/Value_Generation_internal_proposals

  hustler:
    board: .db/pipeline_hustler.board.yaml
    rollup: .db/pipeline_hustler.rollup.yaml
    runbooks: .meta/.os/pipeline_hustler.runbooks/
    ledgers: .db/ledgers/pipeline_hustler.ledgers/
    external_sources: pipeline_hustler/_HUSTLER-EXTERNAL_SOURCES
    schema_path: .db/.schemas/pipeline_hustler_schemas.yaml

  assets:
    board: .db/project_assets.board.yaml
    rollup: .db/project_assets.rollup.yaml
    ledgers: .db/ledgers/project_assets.ledgers/
    disk: project_assets/
    schema_path: .db/.schemas/projects_schemas.yaml

  ecoma:
    board: .db/project_ecoma.board.yaml
    rollup: .db/project_ecoma.rollup.yaml
    ledgers: .db/ledgers/project_ecoma.ledgers/
    disk: project_ecoma/
    schema_path: .db/.schemas/projects_schemas.yaml

  dz_agents:
    board: .db/project_dz_agents.board.yaml
    tasks: .db/project_dz_agents.tasks.yaml
    ledgers: .db/ledgers/project_dz_agents.ledgers/
    disk: project_dz-agents-course/
    schema_path: .db/.schemas/projects_schemas.yaml

  street_food_elcap:
    board: .db/project_street_food_elcap.board.yaml
    tasks: .db/project_street_food_elcap.tasks.yaml
    ledgers: .db/ledgers/project_street_food_elcap.ledgers/
    disk: project_street-food-elcap/
    schema_path: .db/.schemas/projects_schemas.yaml

toolboxes:
  board: .db/toolboxes.board.yaml
  rollup: .db/toolboxes.rollup.yaml
  rollups_dir: .db/toolboxes.rollups/
  schema_path: .db/.schemas/toolboxes_schemas.yaml
