# 🧰 TOOLBOX: RAG

metadata:
  name: RAG
  description: Core toolbox for Retrieval-Augmented Generation workflows, 
    focusing on document ingestion, chunking, formatting, and semantic search 
    preparation.
  when_to_use: Use when the task involves preparing large codebases or document 
    structures for RAG engines, chunking data, or preprocessing context files.
  maturity_level: partial
content:
  agents: []
  skills:
  - name: pyragify
    path: .meta_brain/toolboxes/.core_toolboxes/rag/skills/pyragify
    description: Converts any code repository or document directory into clean, 
      semantically-chunked .txt files optimized for ingestion.
    version: '0.2.0'
    triggers:
    - preprocess workspace
    - chunk documents
    - rag preparation
    inputs:
    - repository or directory path
    - configuration settings
    outputs:
    - chunked .txt files
    - metadata and hashes
    cataloger_lock: false
    when_to_use: Run this BEFORE uploading massive folders to NotebookLM or any 
      other RAG system to ensure semantic structure is preserved.
  relevant_toolboxes:
  - notebooklm: Ingests the chunked outputs produced by this toolbox.
