# 🚀 BOOT CONTRACT — Agentic OS v5.3
# ─────────────────────────────────────────────────────────────────────────────
# This is the canonical, machine-readable boot sequence for the Agentic OS.
# ALL agents MUST execute these steps in exact order before taking any action.
# ─────────────────────────────────────────────────────────────────────────────
schema_version: "1.2"
last_updated: "2026-05-18T01:30:00+01:00"
os_version: "Agentic OS v5.3"

# ─── Runtime Constants (Single Source of Truth) ──────────────────────────────
# Every engine MUST read its operational constants from this block instead of
# hardcoding them. This is the authoritative reference for thresholds, caps,
# and structural limits. Sync engines that need a value not declared here must
# extend this block first, then consume it.
constants:
  health_history_max: 3            # Cap on telemetry.health_history (Controler Rule 2)
  recent_events_max: 3             # Cap on communication_hubs.*.recent_events
  recent_event_summary_max_chars: 240  # Truncation for verbose event lines
  scratch_log_retention_max: 5     # Max number of *.log files to catalog in meta_runtime
  pending_goal_stale_days: 14      # Goal pending this long counts against health
  pending_goal_health_penalty: 5   # % deducted per stale-pending goal
  blocked_goal_health_penalty: 10  # % deducted per blocked goal
  toolbox_completion_weights:
    skills: 40
    agents: 30
    execution: 20
    examples: 10
  # ─── Multi-session safety ──────────────────────────────────────────────────
  sync_lock_stale_seconds: 120     # Sync lock older than this is treated as abandoned
  sync_lock_timeout_seconds: 30    # Max wait when a peer agent already holds the lock
  milestones_history_max: 1000     # FIFO cap on milestones_history.yaml events
  archived_sessions_index_max: 50  # Cap on CONTROLER.archived_sessions visibility
  pipeline_status_stale_seconds: 600  # CONTROLER.telemetry.pipelines.*.status → 'stale' beyond this
  goal_progress_stale_days: 14     # GOAL.execution.state.last_progress_at — same threshold as pending

steps:
  - id: BOOT-00
    action: read
    target: ".meta_brain/meta_identity/*.md"
    purpose: >
      Grounded Identity Initialization. Read all architectural laws, persona
      definitions, and system rules before any cognitive processing begins.
    mandatory: true
    validation: "Must read all 18 files in .meta_brain/meta_identity/."

  - id: BOOT-01
    action: read
    target: ".meta_brain/meta_router.yaml"
    purpose: >
      Load the master routing index. This file maps every subsystem, pipeline,
      and toolbox to its exact path.
    mandatory: true
    validation: "File must be readable and contain top-level keys: routers, routing_instructions"

  - id: BOOT-02
    action: execute
    target: ".meta_brain/meta_sync.py"
    command_windows: ".\\.meta_runtime\\venv\\meta_run.ps1 .meta_brain\\meta_sync.py"
    command_unix: "./.meta_runtime/venv/meta_run.sh .meta_brain/meta_sync.py"
    purpose: >
      Synchronize all routers, CONTROLER.yaml, and the milestones index.
      The launcher (meta_run) auto-bootstraps the workspace .venv on first boot,
      then forwards execution to the venv python — works identically on
      Windows, Linux, and macOS.
    mandatory: true
    validation: "Output must include '[!] Sync Complete.'"

  - id: BOOT-03
    action: read
    target: "CONTROLER.yaml"
    purpose: >
      Load current operational state: active sessions, pipeline modes, and
      communication hub events.
    mandatory: true
    validation: "File must contain: system_status, modes, active_sessions blocks."

  - id: BOOT-03b
    action: conditional
    condition: "CONTROLER.yaml indicates work_mode: AUTO"
    target: ".meta_brain/meta_identity/System-Orchestrator-Loop.md"
    purpose: >
      Read the Orchestrator loop runbook for autonomous polling duties.
    mandatory: true
    validation: "Must execute the 5-step Orchestrator Loop if no specific session is assigned."

  - id: BOOT-04
    action: conditional
    condition: "Task involves a specific pipeline (scaler, hustler, or future pipelines)"
    target: ".meta_brain/.meta_routing/pipelines.yaml"
    purpose: >
      Load the pipeline-specific router and ALL referenced runbooks.
    mandatory: true
    validation: "All files listed in components.runbook.files[] must be read in full."

  - id: BOOT-05
    action: read
    target: ".meta_brain/.meta_routing/toolboxes.yaml"
    purpose: >
      Load the full toolbox router. Use internal logic to select between Core
      and Extended domains based on task context.
    mandatory: true
    validation: "Confirm required toolbox paths exist before use."

  - id: BOOT-06
    action: conditional
    condition: "Task involves creating or modifying a project"
    target: ".meta_brain/.meta_routing/projects.yaml"
    purpose: >
      Load the projects router to understand stack and entry points.
    mandatory: false
    validation: "Project entry must exist in projects.yaml."

# ─── Failure Protocol ─────────────────────────────────────────────────────────
fallback_on_failure:
  mode_aware_recovery:
    if_not_auto:
      rule: "HALT immediately and report failure to user."
      action: "STOP"
    if_auto:
      rule: "Attempt Autonomous Self-Repair."
      action_steps:
        1: "Search .meta_brain/meta_identity/ for structural laws."
        2: "Scan pipeline runbooks and OS-wide patterns for similar successful states."
        3: "Re-run BOOT-02 (meta_sync) or restore CONTROLER.yaml from healthy patterns."
        4: "Report fix to user and resume boot."
  
  prohibited_actions:
    - "Guessing file paths not present in a router"
    - "Skipping BOOT-02 sync to save time"
    - "Reading only part of a mandatory runbook"
    - "Using context from a previous conversation without re-reading physical files"
    - "Proceeding with operations when the sync engine reports validation warnings or fails"

# ─── Core Laws Enforced at Boot ───────────────────────────────────────────────
core_laws:
  zero_drift_audit: >
    Always perform a fresh disk read of any file before editing it.
    Never rely on context from earlier in the same conversation for file state.
  zero_guess_law: >
    Never guess file paths. All paths must come from a router or a physical
    directory listing (list_dir tool).
  portability_law: >
    All dependencies must be installed inside the workspace (.meta_runtime/venv/).
    Never install globally on the host OS.
  logic_preservation_law: >
    During structural moves or refactors, NO existing logic, rules, or content
    may be deleted without explicit user confirmation and a no-loss warning.
