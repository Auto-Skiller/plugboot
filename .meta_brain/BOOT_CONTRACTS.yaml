# 🚀 BOOT CONTRACT — Agentic OS v5.3
# ─────────────────────────────────────────────────────────────────────────────
# This is the canonical, machine-readable boot sequence for the Agentic OS.
# ALL agents MUST execute these steps in exact order before taking any action.
# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: `last_updated` and the `freshness:` block at the bottom are
# engine-managed (refreshed by .meta_brain/meta_sync.py on every cycle via
# _shared/boot_contracts.stamp_self). Do NOT hand-edit them — the engine
# overwrites them on the next sync. To bump the protocol contract, change
# `schema_version`; the engine treats that as the human-owned field and
# leaves it alone.
schema_version: "1.3"
last_updated: "2026-05-18T22:21:44.465069"
os_version: "Agentic OS v5.3"

# ─── Runtime Constants (Single Source of Truth) ──────────────────────────────
# Every engine MUST read its operational constants from this block instead of
# hardcoding them. This is the authoritative reference for thresholds, caps,
# and structural limits. Sync engines that need a value not declared here must
# extend this block first, then consume it.
constants:
  health_history_max: 3            # Cap on telemetry.health_history (Controler Rule 2)
  recent_events_max: 3             # Cap on communication_hubs.*.recent_events
  recent_event_summary_max_chars: 240  # Truncation for verbose event lines
  scratch_log_retention_max: 5     # Max number of *.log files to catalog in meta_runtime
  pending_goal_stale_days: 14      # Goal pending this long counts against health
  pending_goal_health_penalty: 5   # % deducted per stale-pending goal
  blocked_goal_health_penalty: 10  # % deducted per blocked goal
  toolbox_completion_weights:
    skills: 40
    agents: 30
    execution: 20
    examples: 10
  # ─── Multi-session safety ──────────────────────────────────────────────────
  sync_lock_stale_seconds: 120     # Sync lock older than this is treated as abandoned
  sync_lock_timeout_seconds: 30    # Max wait when a peer agent already holds the lock
  milestones_history_max: 1000     # FIFO cap on milestones_history.yaml events
  archived_sessions_index_max: 50  # Cap on CONTROLER.archived_sessions visibility
  pipeline_status_stale_seconds: 600  # CONTROLER.telemetry.pipelines.*.status → 'stale' beyond this
  # ─── Router freshness (inspired by archived router.md "stale" gate) ────────
  # Every router output (meta_router, milestones, toolboxes, pipelines,
  # projects, meta_runtime, plus the per-pipeline scaler/hustler routers)
  # is stamped with a `freshness:` block on every sync. Agents and
  # validators compare `now()` against `freshness.fresh_until` to decide
  # whether they need to re-run sync before consuming the router. 1800s
  # (30min) is a comfortable margin above typical multi-engine sync
  # intervals; lower it to be more aggressive about forcing fresh data
  # in heavily autonomous flows.
  router_freshness_max_seconds: 1800
  # GAP-VERSION-COMPAT fix: the engine and the protocol used to drift
  # silently because nothing audited the version triple. The engine now
  # reads its own version from this constant and --validate fails when
  # the running engine doesn't match. Bump this only when meta_sync.py is
  # itself replaced.
  required_sync_engine_version: "5.4"
  # G-CTRL-AUDIT-1/4 fix: the workspace requires Python >= this version
  # because requirements.txt's transitive deps (greenlet 3.3.x, ruamel.yaml
  # 0.19.x) and meta_sync.py's own typing/syntax depend on 3.10+.
  # The bootstrap scripts read THIS value (awk-only, no Python needed) to
  # pick the highest matching python3.X on PATH. Bumping the floor is a
  # one-line edit here — bootstrap and --validate both pick it up.
  required_python_min: "3.10"

# ─── Deprecated path tokens (G-CTRL-AUDIT-6 fix) ────────────────────────────
# Identity docs and runbooks MUST NOT mention these strings as live commands
# or live paths. ``meta_sync.py --validate`` walks every meta_identity/*.md
# file and flags any token that appears outside an explicit anti-pattern
# context. New deprecations are a one-line edit here; the sweep widens
# automatically.
#
# Add a token when you deprecate something that used to live in user-facing
# docs. Remove a token only after the deprecation has aged out and you're
# sure no doc references the dead string.
deprecated_path_tokens:
  - ".meta_router/.meta_sync"          # pre-v5 routing dir
  - ".meta_router/milestones"          # pre-v5 milestones path
  - ".meta_engine/"
  - ".meta_engines/"
  - ".venv\\Scripts\\python.exe"       # cross-OS-fragile direct interpreter
  - ".venv/Scripts/python.exe"
  - "Activate.ps1"                     # absolute-path-fragile activator
  - ".brain/toolbox_library"           # pre-v5 toolbox catalog
  - ".brain/.toolbox_library"
  - "_toolbox_graph.yaml"
  - "toolbox_graph.yaml"
  - ".hustler.meta/"                   # v4 pipeline-meta layout
  - ".scaler.meta/"
  - "/.meta/runbook/"
  - "/runbook/discovery.md"
  - "/runbook/processing.md"
  - "/runbook/ingestion.md"
  - "telemetry.mission_board"          # CONTROLER allow-list strips these
  - "telemetry.generated_at"
  - "telemetry.overall_health"
  - "system_health:"

# ─── CONTROLER schema (allow-list) ──────────────────────────────────────────
# G-CTRL-1/2: gives meta_sync a single source of truth for which keys belong
# in CONTROLER.yaml. Anything not declared here is dropped on write so legacy
# fields can never rot in place. Keep this list ordered; the engine preserves
# the order when re-emitting the file.
controler_schema:
  allowed_top_level:
    - name                      # static identity
    - type                      # static identity
    - system_status             # engine-managed
    - modes                     # agent-managed
    - communication_hubs        # agent + engine (rollups)
    - active_sessions           # engine-managed (rebuilt from milestones)
    - archived_sessions         # engine-managed (C2 rollup)
    - scratchpad                # agent free-form
    - telemetry                 # engine-managed
    # GAP-CONTROLER-FRESH fix: CONTROLER.yaml now stamps the same
    # `freshness:` contract every router uses, so any agent reading mid-
    # session can call ``is_fresh()`` against the live state file the same
    # way it does against meta_router.yaml. The old `system_status.last_sync`
    # is preserved for back-compat but is no longer the source of truth for
    # staleness detection.
    - freshness                 # engine-managed (uniform freshness block)
  allowed_telemetry:
    - sync_count                # incremented every sync
    - last_sync                 # ISO timestamp of last sync
    - overall_health            # mirrored from system_status
    - session_count             # mirrored from system_status
    - health_history            # FIFO, capped at health_history_max
    - peak_session_count        # max sessions ever seen
    - peak_goal_count           # max goals ever seen
    - pipelines                 # C1 rollup
    - toolbox_readiness         # T5 projection
    - pending_evolutions        # C4 rollup

steps:
  - id: BOOT-00
    action: read
    target: ".meta_brain/meta_identity/*.md"
    purpose: >
      Grounded Identity Initialization. Read all architectural laws, persona
      definitions, and system rules before any cognitive processing begins.
    mandatory: true
    # GAP-BOOT00-VALIDATION-MAGIC fix: the file count is auto-stamped by
    # .meta_brain/meta_sync.py on every cycle (read from disk, not magic
    # number). The engine writes the literal count into this string so a
    # newly-added identity file refreshes the contract automatically.
    validation: "Must read all 18 files in .meta_brain/meta_identity/."

  - id: BOOT-01
    action: read
    target: ".meta_brain/meta_router.yaml"
    purpose: >
      Load the master routing index. This file maps every subsystem, pipeline,
      and toolbox to its exact path.
    mandatory: true
    validation: "File must be readable and contain top-level keys: routers, routing_instructions"

  - id: BOOT-02
    action: execute
    target: ".meta_brain/meta_sync.py"
    command_windows: ".\\.meta_runtime\\venv\\meta_run.ps1 .meta_brain\\meta_sync.py"
    command_unix: "./.meta_runtime/venv/meta_run.sh .meta_brain/meta_sync.py"
    purpose: >
      Synchronize all routers, CONTROLER.yaml, and the milestones index.
      The launcher (meta_run) auto-bootstraps the workspace .venv on first boot,
      then forwards execution to the venv python — works identically on
      Windows, Linux, and macOS.
    mandatory: true
    validation: "Output must include '[!] Sync Complete.'"

  - id: BOOT-03
    action: read
    target: "CONTROLER.yaml"
    purpose: >
      Load current operational state: active sessions, pipeline modes, and
      communication hub events.
    mandatory: true
    validation: "File must contain: system_status, modes, active_sessions blocks."

  - id: BOOT-03b
    action: conditional
    condition: "CONTROLER.yaml indicates work_mode: AUTO"
    target: ".meta_brain/meta_identity/System-Orchestrator-Loop.md"
    purpose: >
      Read the Orchestrator loop runbook for autonomous polling duties.
    mandatory: true
    validation: "Must execute the 5-step Orchestrator Loop if no specific session
      is assigned."

  - id: BOOT-04
    action: conditional
    condition: "Task involves a specific pipeline (scaler, hustler, or future pipelines)"
    target: ".meta_brain/.meta_routing/pipelines.yaml"
    purpose: >
      Load the pipeline-specific router and ALL referenced runbooks.
    mandatory: true
    validation: "All files listed in components.runbook.files[] must be read in full."

  - id: BOOT-05
    action: read
    target: ".meta_brain/.meta_routing/toolboxes.yaml"
    purpose: >
      Load the full toolbox router. Use internal logic to select between Core
      and Extended domains based on task context.
    mandatory: true
    validation: "Confirm required toolbox paths exist before use."

  - id: BOOT-06
    action: conditional
    condition: "Task involves creating or modifying a project"
    target: ".meta_brain/.meta_routing/projects.yaml"
    purpose: >
      Load the projects router to understand stack and entry points.
    mandatory: false
    validation: "Project entry must exist in projects.yaml."

# ─── Failure Protocol ─────────────────────────────────────────────────────────
fallback_on_failure:
  mode_aware_recovery:
    if_not_auto:
      rule: "HALT immediately and report failure to user."
      action: "STOP"
    if_auto:
      rule: "Attempt Autonomous Self-Repair."
      action_steps:
        1: "Search .meta_brain/meta_identity/ for structural laws."
        2: "Scan pipeline runbooks and OS-wide patterns for similar successful states."
        3: "Re-run BOOT-02 (meta_sync) or restore CONTROLER.yaml from healthy patterns."
        4: "Report fix to user and resume boot."
  prohibited_actions:
    - "Guessing file paths not present in a router"
    - "Skipping BOOT-02 sync to save time"
    - "Reading only part of a mandatory runbook"
    - "Using context from a previous conversation without re-reading physical files"
    - "Proceeding with operations when the sync engine reports validation warnings
      or fails"

# ─── Core Laws Enforced at Boot ───────────────────────────────────────────────
core_laws:
  zero_drift_audit: >
    Always perform a fresh disk read of any file before editing it.
    Never rely on context from earlier in the same conversation for file state.
  zero_guess_law: >
    Never guess file paths. All paths must come from a router or a physical
    directory listing (list_dir tool).
  portability_law: >
    All dependencies must be installed inside the workspace (.meta_runtime/venv/).
    Never install globally on the host OS.
  logic_preservation_law: >
    During structural moves or refactors, NO existing logic, rules, or content
    may be deleted without explicit user confirmation and a no-loss warning.
freshness:
  last_synced: '2026-05-18T22:21:44.465081'
  fresh_until: '2026-05-18T22:51:44.465081'
  status: fresh
  threshold_seconds: 1800
