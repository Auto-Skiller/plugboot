# ─── Workspaces ─────────────────────────────────────────────────────────────
  workspaces:
    pipelines:
      path: .meta_brain/.meta_routing/pipelines.yaml
      target_path: _pipelines/
      description: "Index of all active OS pipelines (Scaler, Hustler, etc.). Pipelines
        are continuous operation loops governed by runbooks in their .meta folders.\n"
      when_to_use: Read to find the correct pipeline router when starting a 
        session.
    projects:
      path: .meta_brain/.meta_routing/projects.yaml
      target_path: projects/
      description: "Index of all finite, bounded codebases and standalone applications
        housed under projects/. Unlike pipelines (continuous processes), projects
        have a defined scope, a clear entry point, and a completion state.\n"
      when_to_use: Read before touching any file under projects/.
