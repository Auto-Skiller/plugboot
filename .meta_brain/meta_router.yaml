  workspaces:
    pipelines:
      path: ".meta_brain/.meta_router/pipelines.yaml"
      target_path: "_pipelines/"
      description: >
        Index of all active OS pipelines (Scaler, Hustler, etc.).
        Pipelines are continuous operation loops governed by runbooks in their .meta
        folders.
      when_to_use: "Read to find the correct pipeline router when starting a session."
    projects:
      path: ".meta_brain/.meta_router/projects.yaml"
      target_path: "projects/"
      description: >
        Index of all finite, bounded codebases and standalone applications housed
        under projects/. Unlike pipelines (continuous processes), projects have a
        defined scope, a clear entry point, and a completion state.
      when_to_use: "Read before touching any file under projects/. Use to discover
        project structure before editing."

# ─── Infrastructure — Supporting Subsystems ──────────────────────────────────
# These paths support execution but are not routers themselves.
# All agents must load .env BEFORE executing any tool.
infrastructure:
  env:
    path: ".meta_runtime/venv/.env"
    description: "Environment variables for the workspace. Must be loaded before executing
      any tool (notebooklm-py, pyragify, etc.)."
    when_to_use: "Load at the start of every session before calling any Python tool."
    load_command: "Get-Content .meta_runtime\\venv\\.env | ForEach-Object { if ($_
      -match '^([^#][^=]*)=(.*)$') { [System.Environment]::SetEnvironmentVariable($Matches[1].Trim(),
      $Matches[2].Trim()) } }"
    expected_vars:
    - name: NOTEBOOKLM_HOME
      required: true
      default: ".meta_runtime/auth/notebooklm"
      description: "Redirects notebooklm-py session data into the workspace for portability."

  auth:
    path: ".meta_runtime/auth/"
    description: "Active external state — auth cookies and session profiles for third-party
      services. Contents are tracked in Git for portability."
    when_to_use: "Check here for notebooklm auth state. Do NOT store mission tracking
      or tool configs here — use milestones/ and .scratch/ respectively."
    contents:
      notebooklm:
        path: ".meta_runtime/auth/notebooklm/"
        env_var: "NOTEBOOKLM_HOME"
        description: "Playwright browser profiles and cookies for notebooklm-py."

  scratch:
    path: ".meta_runtime/.scratch/"
    description: "Ephemeral agent working data and tool configurations. Never archived.
      Safe to clear between major sessions."
    when_to_use: "Use for temporary tool configs (e.g., pyragify identity rules) and
      intermediate working files that do not need to persist."
    cleanup_policy: "Contents are ephemeral. Never archive. Safe to delete between
      sessions."
    contents:
      pyragify:
        path: ".meta_runtime/.scratch/pyragify/"
        description: "pyragify output base directory. Organized by target (e.g., identity/,
          scaler-runbook/). Contains generated chunks and hashes."
        linked_toolbox: ".meta_brain/toolboxes/.core_toolboxes/rag"

  archive:
    path: ".meta_runtime/.archive/"
    description: "Root-level archive for deprecated workspace items, old pipeline
      runbooks, and superseded documents."
    when_to_use: "Never read actively — consult only when investigating historical
      context. All active content lives in its canonical location."
