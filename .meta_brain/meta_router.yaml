# 🧠 MASTER ROUTER INDEX
schema_version: "1.1"
description: "The absolute source of truth for Agentic OS routing. This map directs
  you to specialized routers. Always consult this file first before navigating the
  workspace."

# ─── Router Manifest (Schema Version Registry) ────────────────────────────────
# The sync engine validates child router versions against these expected values.
router_manifest:
  milestones: "1.0"
  toolboxes: "1.0"
  scaler: "3.1"
  hustler: "1.0"
  core: "1.0"
  projects: "1.0"
compatibility_matrix:
  "1.1":   # This master schema version accepts:
    milestones: ["1.0"]
    toolboxes: ["1.0"]
    scaler: ["3.1"]
    hustler: ["1.0"]
    core: ["1.0"]
    projects: ["1.0"]

# ─── Boot Contract Reference ──────────────────────────────────────────────────
boot_contract:
  path: ".meta_brain/BOOT_CONTRACTS.yaml"
  version: "1.0"
  description: "Machine-readable boot sequence. All agents MUST execute steps in order.
    This is the canonical source — AGENTS.md references it."

routing_instructions:
- "MANDATORY FIRST: Read BOOT_CONTRACTS.yaml at boot_contract.path above and execute
  all mandatory steps before any action."
- "Step 1: Read the 'when_to_use' field for each router below to determine if it fits
  your current task."
- "Step 2: If you need context on your assignment, active goals, or current state,
  follow the milestones path."
- "Step 3: If you need to leverage a specific capability, skill, or agent, follow
  the toolboxes path."
- "Step 4: If you are executing a pipeline workflow, follow the respective pipeline
  router to find your exact runbook instructions, state tracker, and scratchpad."
- "Step 5: If you are working on a finite codebase, follow the projects router to
  load stack, entry point, and status."
- "CRITICAL: Never guess file paths. Always use the absolute paths explicitly provided
  within these routers."
- "CRITICAL: A schema_version mismatch between this file and a child router is a blocking
  error — do not proceed."

# ─── Router Map ───────────────────────────────────────────────────────────────
routers:
  runtime:
    os_engine:
      path: ".meta_runtime/venv/requirements.txt"
      target_path: ".meta_runtime/venv/.venv"
      description: "The central Python runtime engine for the Agentic OS. Contains
        the manifest of all installed global dependencies."
      when_to_use: "Use to check if a required Python package (e.g., playwright, httpx)
        is already installed before attempting to download it."
      expected_schema: |
        [package_name]==[version]

    description: Index of all runtime infrastructure components.
    when_to_use:
  brain:
    milestones:
      path: ".meta_brain/.meta_router/milestones.yaml"
      target_path: ".meta_brain/milestones"
      description: "Catalogs all active execution sessions and goals."
      when_to_use: "Use this router for a fast boot overview, full paths, and detailed
        session/goal context."
      status_vocabulary:
        session: [active, paused, completed, archived]
        goal: [pending, in-progress, blocked, done, archived]
        priority: [LOW, MEDIUM, HIGH, CRITICAL]
      directory_conventions:
        session_dir: "SES-{PIPELINE}-{PURPOSE}/"
        session_file: "SESSION.yaml                   # canonical — always this name"
        session_scratch: ".meta_runtime/.scratch/                # ephemeral agent
          working space — never archived"
        goal_dir: "GOAL-{NAME}/                       # GOAL- prefix is mandatory"
        goal_file: "GOAL.yaml                         # canonical — always this name"
        goal_artifacts: "artifacts/                   # produced deliverables — archived
          with goal"

    toolboxes:
      path: ".meta_brain/.meta_router/toolboxes.yaml"
      target_path: ".meta_brain/toolboxes"
      description: "Master index of all toolboxes across Core and Extended domains."
      when_to_use: "Use to find available agentic capabilities and core tools."

    development_standards:
      path: ".meta_brain/meta_identity/Universal_Portability_Standard.md"
      description: "The absolute architectural rules for adding new Python tools and
        maintaining OS portability."
      when_to_use: "Use BEFORE installing any new pip packages or building a new Python
        toolbox to ensure you follow the OS portability rules."

    identity_standards:
      description: The absolute architectural rules and system laws for the 
        Agentic OS.
      when_to_use: Read before building new core components or changing system 
        logic.
      files:
        Communication_Style:
          path: .meta_brain/meta_identity/Communication_Style.md
          description: '**Status Visibility** Always show explicit Real-Time status
            text during operations.'
          when_to_use: ''
        Controler_Guide:
