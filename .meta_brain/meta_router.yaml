# 🧠 MASTER ROUTER INDEX
schema_version: '1.2'
description: The absolute source of truth for Agentic OS routing. This file acts
  as the 'Static Map' of the workspace. Always follow the 'How' protocol in 
  BOOT_CONTRACTS.yaml before navigating this map.
router_manifest:
  milestones: '1.0'
  toolboxes: '1.1'
  scaler: '3.1'
  hustler: '1.0'
  core: '1.0'
  projects: '1.0'
# ─── Protocol & State Reference ───────────────────────────────────────────────
protocols:
  boot:
    path: .meta_brain/BOOT_CONTRACTS.yaml
    version: '1.2'
    os_version: Agentic OS v5.3
    description: Canonical execution protocol. Defines the mandatory sequence of
      operations at startup.
  bridge:
    path: CONTROLER.yaml
    description: The Active State Bridge. Maps the physical milestones to the 
      high-level system status. Read after boot to understand current 
      objectives.
routing_instructions:
  - 'MANDATORY: Execute BOOT_CONTRACTS.yaml protocols before using this map.'
  - "The Map Principle: This file tells you 'WHERE'. The BOOT_CONTRACTS tells you
    'HOW'."
  - "Toolbox Selection: Load the full toolbox router. Prioritize 'Core' for foundation
    tasks (RAG, FS) and 'Extended' for domain-specific execution (Scaler, Hustler)."
  - 'Path Integrity: Never guess file paths. Use the absolute paths provided in child
    routers.'
controler_telemetry_schema: "telemetry:\n  sync_count: integer\n  last_sync: timestamp\n\
  \  overall_health: string       # e.g., \"90%\"\n  health_history:             \
  \ # FIFO, capped at 3\n    - ts: timestamp\n      health: string\n      sessions:
  integer\n  peak_session_count: integer\n  peak_goal_count: integer\n  toolbox_readiness:\n\
  \    total: integer\n    functional: integer\n    partial: integer\n    empty: integer\n"
router_freshness_schema: "# Public contract — every router stamps this block at write
  time so agents reading it\n# mid-session can decide whether the data is still trustworthy.\n\
  # Compare now() against fresh_until: if expired, re-run meta_sync before consuming.\n\
  # --validate audits this for every router; missing block -> warning, expired ->
  error.\nfreshness:\n  last_synced: timestamp           # ISO. When the sync engine
  wrote this file.\n  fresh_until: timestamp           # last_synced + threshold_seconds.\n\
  \  status: fresh                    # Always 'fresh' at write time. Readers compute
  live.\n  threshold_seconds: integer       # Currently 1800 (from BOOT_CONTRACTS.constants.router_freshness_max_seconds).\n"
meta_router_identity_schema: "brain:\n  identity:\n    description: string\n    when_to_use:
  string\n    files:\n      \"[file_name]\":\n        path: string\n        description:
  string    # Auto-extracted\n        when_to_use: string    # Auto-extracted\n"

# ─── Router Map ───────────────────────────────────────────────────────────────
routers:
  brain:
    milestones:
      path: .meta_brain/.meta_routing/milestones.yaml
      target_path: .meta_brain/milestones
      description: Catalogs all active execution sessions and goals.
      when_to_use: Use this router for a fast boot overview, full paths, and 
        detailed session/goal context.
      status_vocabulary:
        session: [active, paused, completed, archived]
        goal: [pending, in-progress, blocked, done, archived]
        priority: [LOW, MEDIUM, HIGH, CRITICAL]
    toolboxes:
      path: .meta_brain/.meta_routing/toolboxes.yaml
      target_path: .meta_brain/toolboxes
      description: Master index of all toolboxes across Core and Extended 
        domains.
      when_to_use: Use to find available agentic capabilities and core tools.
    runtime:
      path: .meta_brain/.meta_routing/meta_runtime.yaml
      description: Index of all runtime infrastructure components.
      when_to_use: Use this router to locate valid infrastructure paths (venv, 
        scratch, auth) instead of guessing.
