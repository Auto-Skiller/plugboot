# 🧠 MASTER ROUTER INDEX
schema_version: '1.2'
description: The absolute source of truth for Agentic OS routing. This file acts
  as the 'Static Map' of the workspace. Always follow the 'How' protocol in 
  BOOT_CONTRACTS.yaml before navigating this map.
router_manifest:
  milestones: '1.0'
  toolboxes: '1.1'
  scaler: '3.1'
  hustler: '1.0'
  core: '1.0'
  projects: '1.0'
# ─── Protocol & State Reference ───────────────────────────────────────────────
protocols:
  boot:
    path: .meta_brain/BOOT_CONTRACTS.yaml
    version: '1.3'
    os_version: Agentic OS v5.3
    description: Canonical execution protocol. Defines the mandatory sequence of
      operations at startup.
  bridge:
    path: CONTROLER.yaml
    description: The Active State Bridge. Maps the physical milestones to the 
      high-level system status. Read after boot to understand current 
      objectives.
routing_instructions:
  - 'MANDATORY: Execute BOOT_CONTRACTS.yaml protocols before using this map.'
  - "The Map Principle: This file tells you 'WHERE'. The BOOT_CONTRACTS tells you
    'HOW'."
  - "Toolbox Selection: Load the full toolbox router. Prioritize 'Core' for foundation
    tasks (RAG, FS) and 'Extended' for domain-specific execution (Scaler, Hustler)."
  - 'Path Integrity: Never guess file paths. Use the absolute paths provided in child
    routers.'
controler_telemetry_schema: "telemetry:\n  sync_count: integer\n  last_sync: timestamp\n\
  \  overall_health: string       # e.g., \"90%\"\n  health_history:             \
  \ # FIFO, capped at 3\n    - ts: timestamp\n      health: string\n      sessions:
  integer\n  peak_session_count: integer\n  peak_goal_count: integer\n  toolbox_readiness:\n\
  \    total: integer\n    functional: integer\n    partial: integer\n    empty: integer\n"
router_freshness_schema: "# Public contract — every router stamps this block at write
  time so agents reading it\n# mid-session can decide whether the data is still trustworthy.\n\
  # Compare now() against fresh_until: if expired, re-run meta_sync before consuming.\n\
  # --validate audits this for every router; missing block -> warning, expired ->
  error.\nfreshness:\n  last_synced: timestamp           # ISO. When the sync engine
  wrote this file.\n  fresh_until: timestamp           # last_synced + threshold_seconds.\n\
  \  status: fresh                    # Always 'fresh' at write time. Readers compute
  live.\n  threshold_seconds: integer       # Currently 1800 (from BOOT_CONTRACTS.constants.router_freshness_max_seconds).\n"
meta_router_identity_schema: "brain:\n  identity:\n    description: string\n    when_to_use:
  string\n    files:\n      \"[file_name]\":\n        path: string\n        description:
  string    # Auto-extracted\n        when_to_use: string    # Auto-extracted\n"

# ─── Router Map ───────────────────────────────────────────────────────────────
routers:
  brain:
    milestones:
      path: .meta_brain/.meta_routing/milestones.yaml
      target_path: .meta_brain/milestones
      description: Catalogs all active execution sessions and goals.
      when_to_use: Use this router for a fast boot overview, full paths, and 
        detailed session/goal context.
      status_vocabulary:
        session: [active, paused, completed, archived]
        goal: [pending, in-progress, blocked, done, archived]
        priority: [LOW, MEDIUM, HIGH, CRITICAL]
    toolboxes:
      path: .meta_brain/.meta_routing/toolboxes.yaml
      target_path: .meta_brain/toolboxes
      description: Master index of all toolboxes across Core and Extended 
        domains.
      when_to_use: Use to find available agentic capabilities and core tools.
    runtime:
      path: .meta_brain/.meta_routing/meta_runtime.yaml
      description: Index of all runtime infrastructure components.
      when_to_use: Use this router to locate valid infrastructure paths (venv, 
        scratch, auth) instead of guessing.
    identity:
      path: .meta_brain/meta_identity/
      description: The absolute architectural rules and system laws for the 
        Agentic OS.
      when_to_use: Loaded automatically via BOOT-00 for system grounding.
      files_count: 19
      files:
        Agent_Standards:
          path: .meta_brain/meta_identity/Agent_Standards.md
          description: Schema and standards for agent and skill files inside 
            `.meta_brain/toolboxes/`, plus the toolbox dependency graph and 
            changelog conventions.
          when_to_use: Consult before creating, scoring, or refactoring any 
            agent/skill file under a toolbox folder.
        Communication_Style:
          path: .meta_brain/meta_identity/Communication_Style.md
          description: Style and reaction guidance for agent-to-user 
            communication, plus the canonical formats for status text, hub 
            messages, and error reports during long autonomous runs.
          when_to_use: Consult any time the agent is composing user-facing 
            prose, status text, hub events, error reports, or reactions during 
            long autonomous runs.
        Concurrency_Model:
          path: .meta_brain/meta_identity/Concurrency_Model.md
          description: Single consolidated reference for how the Agentic OS 
            stays correct under multi-hour autonomous operation with multiple 
            agents running in parallel. Before this doc existed, the rules were 
            spread across `Rules_And_Considerations §11`, `Evolution_Protocol 
            §11/§13/§14`, `Session_Template §4`, `Controler_Guide §5/§7`, and 
            `BOOT_CONTRACTS.constants`. New agents had to assemble the picture 
            themselves and routinely missed laws — the gap that caused this doc 
            to be created.
          when_to_use: Consult before any operation that writes to 
            `CONTROLER.yaml`, `meta_router.yaml`, a router under 
            `.meta_routing/`, a pipeline state file, or 
            `pending_evolutions.yaml`. Also consult when designing a new sync 
            engine or auto-archiver.
        Controler_Guide:
          path: .meta_brain/meta_identity/Controler_Guide.md
          description: Operational guide for `CONTROLER.yaml` — the central 
            command state of the OS — covering layout markers, anti-bloat 
            thresholds, allow-listed schema, and engine-owned rollups.
          when_to_use: Consult before writing to `CONTROLER.yaml`, when 
            reconciling drift between the controller and `milestones/`, or when 
            extending the schema.
        Core_Architecture:
          path: .meta_brain/meta_identity/Core_Architecture.md
          description: Authoritative reference for the substrate layout, 
            directory roles, and the component-based sync engine architecture.
          when_to_use: Consult before any structural change, sync-engine 
            modification, or when explaining the system layout to a new agent or
            human reviewer.
        Core_Capabilities:
          path: .meta_brain/meta_identity/Core_Capabilities.md
          description: Catalog of the foundational cognitive toolboxes and the 
            engine system that every agent inherits at boot.
          when_to_use: Consult when picking the right cognitive toolbox for a 
            task, or when chaining sync engines for a structural change.
        Decision_Making:
          path: .meta_brain/meta_identity/Decision_Making.md
          description: Conflict-resolution and escalation playbook for agent 
            decision-making.
          when_to_use: Consult when prompts conflict with stored goals, when 
            sensitive actions need approval, when information is missing, or 
            when a step has failed multiple times.
        Event_Vocabulary:
          path: .meta_brain/meta_identity/Event_Vocabulary.md
          description: Single authoritative catalog of OS-wide events emitted at
            the meta layer (controller, milestones, sessions, modes, sync 
            engine).
          when_to_use: Consult when emitting an event from `CONTROLER.yaml` / 
            `milestones/`, when interpreting events observed in hubs, or when 
            adding a new cross-pipeline event.
        Evolution_Protocol:
          path: .meta_brain/meta_identity/Evolution_Protocol.md
          description: 'Defines the recursive self-improvement cycle: when to evolve,
            what to evolve, and the laws (non-loss, zero-drift, marker-preservation,
            anti-recurrence, etc.) that govern every change.'
          when_to_use: 'Consult after every user interaction in `evolution_mode: EVOLVE`,
            after any bug fix or gap closure, and whenever proposing changes to `meta_identity/`
            or pipeline runbooks.'
        Hierarchy:
          path: .meta_brain/meta_identity/Hierarchy.md
          description: Defines the strict three-pillar hierarchy of Agentic OS 
            v5 (Brain / Runtime / Workspaces) and how information flows between 
            them.
          when_to_use: Consult before creating a new top-level folder, moving a 
            file across pillars, or deciding which pillar a new artifact belongs
            to.
        Modes:
          path: .meta_brain/meta_identity/Modes.md
          description: Defines the three operational dimensions (`work_mode`, 
            `action_gate`, `evolution_mode`) and how their combinations govern 
            agent behaviour.
          when_to_use: Consult before any sensitive operation, before approving 
            plans, and any time a session/pipeline mode changes.
        Orchestration_And_Flow:
          path: .meta_brain/meta_identity/Orchestration_And_Flow.md
          description: Strict deterministic 10-step execution flow with 
            input/output/gate contracts for every step.
          when_to_use: Consult during any non-trivial task to confirm you've 
            satisfied the gate of the current step before advancing, and during 
            Step 2/Step 10 to trigger the sync engine.
        Orchestrator_Engine:
          path: .meta_brain/meta_identity/Orchestrator_Engine.md
          description: Defines the programmatic tools that automate the 
            map-making process for the Agentic OS v5.
          when_to_use: Consult before running, modifying, or extending any sync 
            engine, or when an engine reports a validation failure.
        Persona:
          path: .meta_brain/meta_identity/Persona.md
          description: Defines the default agent persona (Piper) and the schema 
            for spawning specialised personas in multi-agent operations.
          when_to_use: Read at boot to load the active persona; consult when a 
            session declares a non-default persona or when you need to mint a 
            new one.
        Quick_Start:
          path: .meta_brain/meta_identity/Quick_Start.md
          description: First-touch onboarding playbook for any agent landing in 
            this workspace.
          when_to_use: Read at the very start of a fresh session, before BOOT-00
            if you've never landed in this workspace before. Skip on subsequent 
            boots.
        Rules_And_Considerations:
          path: .meta_brain/meta_identity/Rules_And_Considerations.md
          description: Hard architectural laws and naming/structural rules that 
            bind every agent and engine in the workspace.
          when_to_use: Consult before creating new folders/files, before 
            refactoring, and any time you're unsure if an action would violate 
            the substrate's invariants.
        Session_Template:
          path: .meta_brain/meta_identity/Session_Template.md
          description: Required structure for sessions and goals in 
            `CONTROLER.yaml` and the corresponding physical files in 
            `.meta_brain/milestones/`.
          when_to_use: Consult before creating a new session/goal, when filling 
            out `SESSION.yaml` / `GOAL.yaml`, or when an engine flags a schema 
            violation against `milestones.yaml#session_schema` / `#goal_schema`.
        System-Orchestrator-Loop:
          path: .meta_brain/meta_identity/System-Orchestrator-Loop.md
          description: 'Defines the daily autonomous execution loop for an Agent operating
            the Agentic OS in `work_mode: AUTO`.'
          when_to_use: Read at boot whenever `CONTROLER.modes.system.work_mode 
            == AUTO` and no specific user prompt is pending. Skip in 
            STRICT/COLLAB modes.
        Universal_Portability_Standard:
          path: .meta_brain/meta_identity/Universal_Portability_Standard.md
          description: '**When to use:** Consult before installing any dependency,
            adding a new runtime language, committing build artifacts, or invoking
            an interpreter directly.'
          when_to_use: Consult before installing any dependency, adding a new 
            runtime language, committing build artifacts, or invoking an 
            interpreter directly.

# ─── Workspaces ─────────────────────────────────────────────────────────────
  workspaces:
    pipelines:
      path: .meta_brain/.meta_routing/pipelines.yaml
      target_path: _pipelines/
      description: "Index of all active OS pipelines (Scaler, Hustler, etc.). Pipelines
        are continuous operation loops governed by runbooks in their .meta folders.\n"
      when_to_use: Read to find the correct pipeline router when starting a 
        session.
    projects:
      path: .meta_brain/.meta_routing/projects.yaml
      target_path: projects/
      description: "Index of all finite, bounded codebases and standalone applications
        housed under projects/. Unlike pipelines (continuous processes), projects
        have a defined scope, a clear entry point, and a completion state.\n"
      when_to_use: Read before touching any file under projects/.
