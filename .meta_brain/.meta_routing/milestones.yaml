name: milestones_router
schema_version: '1.0'
generated_at: null
description: Catalogs all active execution sessions and goals.

# ─── Part 1: Protocols, Instructions & Guides ───────────────────────────────────
routing_instructions:
- "1. Session & Goal Discovery: Scan .meta_brain/milestones/ for session folders.
  Validate SESSION.yaml exists. Scan for goal folders."
- "2. State Extraction & Validation: Validate status against allowed vocabularies.
  Recalculate progress_percentage. Collect file paths in artifacts array."
- "3. Naming Enforcement: REJECT (sync fails) sessions/goals with numeric suffixes
  (-001, -3, etc.). Sessions must start with SES-, goals with GOAL-. See Rules_And_Considerations.md
  §5."
- "4. Health Computation: -10% per blocked goal AND -5% per stale-pending goal (no
  `last_progress_at` change within constants.pending_goal_stale_days). Output overall_health
  to the router index."
- "5. Auto-Promote: When every goal in a session is done/archived, the engine sets
  metadata.status='completed' automatically (D1)."
- "6. Auto-Archive: Sessions whose status='completed' and goals are all done are moved
  to .milestones_archive/<name>_<YYYYMMDD>; a SESSION_ARCHIVED event is appended to
  milestones_history.yaml (FIFO-capped at constants.milestones_history_max)."
- "7. Persistence Exhaustion: When a persistence-enabled session reaches max_rounds,
  status moves to 'paused' AND metadata.persistence.exhausted=true. Never use out-of-vocabulary
  statuses like 'pended'."
- "8. Multi-Session Safety: All YAML writes are atomic (tmp+os.replace) and the master
  sync runs under .meta_routing/.sync.lock so concurrent agents serialise instead
  of racing."

# ─── Part 2: Schemas ─────────────────────────────────────────────────────────────
session_schema: |
  metadata:
    name: string
    description: string
    status: active | paused | completed | archived
    started_at: timestamp
    agent: string
    priority: LOW | MEDIUM | HIGH | CRITICAL
    pipeline: string             # e.g., SCALER, HUSTLER
    persistence:
      enabled: boolean
      max_rounds: integer | unlimited
      current_round: integer
  execution:
    summary: string              # Live summary of the session work
    active_goals: [string]       # List of goal folder names

goal_schema: |
  metadata:
    name: string
    session: string              # Parent session name
    description: string
    status: pending | in-progress | blocked | done
    priority: LOW | MEDIUM | HIGH | CRITICAL
    round: integer
  execution:
    plan:
      tasks: [string | dict]     # List of tasks with status
    state:
      progress_percentage: string # Auto-calculated (0-100%)
      tracking: string           # Live updates and notes
      artifacts: [string]        # Relative paths to deliverables
      last_progress_at: timestamp # Auto-stamped only when progress changed (D3)

# ─── Part 3: Actual Routing ──────────────────────────────────────────────────────
index:
  generated_at: null
  overall_health: 100%
  sessions: {}
  goals: {}
sessions: {}
freshness:
  last_synced: null
  fresh_until: null
  status: stale
  threshold_seconds: 1800
