# ─── Part 1: Protocols, Instructions & Guides ───────────────────────────────────
routing_instructions:
- "1. Session & Goal Discovery: Scan .meta_brain/milestones/ for session folders.
  Validate SESSION.yaml exists. Scan for goal folders."
- "2. State Extraction & Validation: Validate status against allowed vocabularies.
  Recalculate progress_percentage. Collect file paths in artifacts array."
- "3. Naming Enforcement: Enforce naming conventions defined in Naming-Conventions.md."
- "4. Health Computation: -10% health for every blocked goal. Output overall_health
  to the router index."
- "5. Auto-Archive: Execute archiving process as defined in Evolution_Protocol.md
  when conditions are met."

# ─── Part 2: Schemas ─────────────────────────────────────────────────────────────
session_schema: |
  metadata:
    name: string
    description: string
    status: active | paused | completed | archived
    started_at: timestamp
    agent: string
    priority: LOW | MEDIUM | HIGH | CRITICAL
    pipeline: string             # e.g., SCALER, HUSTLER
    persistence:
      enabled: boolean
      max_rounds: integer | unlimited
      current_round: integer
  execution:
    summary: string              # Live summary of the session work
    active_goals: [string]       # List of goal folder names

goal_schema: |
  metadata:
    name: string
    session: string              # Parent session name
    description: string
    status: pending | in-progress | blocked | done
    priority: LOW | MEDIUM | HIGH | CRITICAL
    round: integer
  execution:
    plan:
      tasks: [string | dict]     # List of tasks with status
    state:
      progress_percentage: string # Auto-calculated (0-100%)
      tracking: string           # Live updates and notes
      artifacts: [string]        # Relative paths to deliverables

