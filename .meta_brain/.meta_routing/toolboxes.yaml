# 🗺️ TOOLBOX LIBRARY ROUTER

# Master index of all toolboxes across Core and Extended domains.

# AUTO-SYNCED by: .meta_brain/meta_sync.py

# Last manual update: 2026-05-17

name: toolbox_library_router
schema_version: "1.0"
description: Master index of all toolboxes across Core and Extended domains.

# ─── Part 1: Protocols, Instructions & Guides ───────────────────────────────────
routing_instructions:
- "1. Domain Cataloging: Iterate through core_toolboxes and extended_toolboxes. Verify
  folder exists."
- "2. Inner Metadata Pull: Load internal [toolbox_name].yaml. Extract description,
  when_to_use, maturity_level."
- "3. Capability Audit: Scan agents/ and skills/ folders. Count files and extract
  names."
- "4. Health & Maturity Calculation: Compute status (empty, partial, functional, complete)."

# ─── Part 2: Schemas ─────────────────────────────────────────────────────────────
# T1: the audit timestamp field is `last_audited` everywhere (router + inner
# manifests). The engine renames any legacy `last_audit` it encounters.
toolbox_inner_schema: |
  metadata:
    name: string                   # e.g., planning
    description: string            # primary role
    when_to_use: string            # usage guidelines
    maturity_level: stub | partial | functional | complete
  health:
    status: empty | partial | functional | complete
    last_audited: timestamp
  capabilities:
    agent_count: integer
    skill_count: integer
    agent_names: [string]
    skill_names: [string]

# T4: the dependency graph block is owned by toolboxes_sync. Edges must point
# at known toolbox keys (`core.<name>` or `<domain>/<sub_name>`); broken refs
# get listed under `dependency_graph.metadata.broken_references` and fail the
# sync with a warning.
dependency_graph_schema: |
  metadata:
    version: string
    last_validated: timestamp
    total_edges: integer
    generator: string
  edges:
    - from: string
      to: string
      relationship: prerequisite | enhances | complements | delivers_to | escalates_to
      note: string

