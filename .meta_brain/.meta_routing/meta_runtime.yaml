name: meta_runtime_router
schema_version: '1.0'
description: Index of all runtime infrastructure components.

# ─── Part 1: Protocols, Instructions & Guides ───────────────────────────────────
routing_instructions:
- "Use this router to locate valid infrastructure paths and files under .meta_runtime/
  instead of guessing."
- "1. Scan: Recursively discovers all directories and files under .meta_runtime/."
- "2. Exclude: Filters out heavy transient data directories like venv virtual packages
  and auth browser profiles."
- "3. Sanitize: Replaces spaces with underscores in keys to ensure clean, valid YAML
  formatting."
- "4. Update Router: Populates the infrastructure component dictionary in meta_runtime.yaml."

# ─── Part 2: Schemas ─────────────────────────────────────────────────────────────
