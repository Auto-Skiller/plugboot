name: meta_runtime_router
schema_version: '1.0'
description: Index of all runtime infrastructure components.

# ─── Part 1: Protocols, Instructions & Guides ───────────────────────────────────
routing_instructions:
- "Use this router to locate valid infrastructure paths and files under .meta_runtime/
  instead of guessing."
- "1. Scan: Recursively discovers all directories and files under .meta_runtime/."
- "2. Exclude: Filters out heavy transient data directories like venv virtual packages
  and auth browser profiles."
- "3. Sanitize: Replaces spaces with underscores in keys to ensure clean, valid YAML
  formatting."
- "4. Update Router: Populates the infrastructure component dictionary in meta_runtime.yaml."

# ─── Part 2: Schemas ─────────────────────────────────────────────────────────────
infrastructure_schema: |
  "[INFRA_ID]":
    path: string
    description: string

# ─── Part 3: Actual Routing ──────────────────────────────────────────────────────
health:
  status: healthy
  warnings: []
infrastructure:
  .meta_archive:
    path: .meta_runtime/.meta_archive
    description: 'Directory: .meta_archive'
  .meta_scratch:
    path: .meta_runtime/.meta_scratch
    description: 'Directory: .meta_scratch'
  __pycache__:
    path: .meta_runtime/__pycache__
    description: 'Directory: __pycache__'
  auth:
    path: .meta_runtime/auth
    description: 'Directory: auth'
  auth/notebooklm:
    path: .meta_runtime/auth/notebooklm
    description: 'Directory: notebooklm'
  auth/notebooklm/config.json:
    path: .meta_runtime/auth/notebooklm/config.json
    description: 'File: config.json'
  auth/notebooklm/profiles:
    path: .meta_runtime/auth/notebooklm/profiles
    description: 'Directory: profiles'
  auth/notebooklm/profiles/default:
    path: .meta_runtime/auth/notebooklm/profiles/default
    description: 'Directory: default'
  auth/notebooklm/profiles/default/context.json:
    path: .meta_runtime/auth/notebooklm/profiles/default/context.json
    description: 'File: context.json'
  auth/notebooklm/profiles/default/storage_state.json:
    path: .meta_runtime/auth/notebooklm/profiles/default/storage_state.json
    description: 'File: storage_state.json'
  venv:
    path: .meta_runtime/venv
    description: 'Directory: venv'
  os_engine:
    path: .meta_runtime/venv/requirements.txt
    description: Python runtime engine manifest (requirements.txt).
  venv/.env:
    path: .meta_runtime/venv/.env
    description: 'File: .env'
  venv/.python-version:
    path: .meta_runtime/venv/.python-version
    description: 'File: .python-version'
  venv/.venv:
    path: .meta_runtime/venv/.venv
    description: 'Directory: .venv'
  venv/bootstrap.ps1:
    path: .meta_runtime/venv/bootstrap.ps1
    description: 'File: bootstrap.ps1'
  venv/bootstrap.sh:
    path: .meta_runtime/venv/bootstrap.sh
    description: 'File: bootstrap.sh'
  venv/meta_run.ps1:
    path: .meta_runtime/venv/meta_run.ps1
    description: 'File: meta_run.ps1'
  venv/meta_run.sh:
    path: .meta_runtime/venv/meta_run.sh
    description: 'File: meta_run.sh'
  venv/requirements.txt:
    path: .meta_runtime/venv/requirements.txt
    description: 'File: requirements.txt'
generated_at: null
freshness:
  last_synced: null
  fresh_until: null
  status: stale
  threshold_seconds: 1800
