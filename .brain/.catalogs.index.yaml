_meta:
  engine: "router"
  purpose: "The Master Index. Routes the Orchestrator to the correct domain catalog based on the task context."

knowledge_catalogs:
  - path: ".brain/.context_control/knowledge/core.knowledge.catalog.yaml"
    read_when: "Always read to understand OS-level structural knowledge and protocols."
  - path: ".brain/.context_control/knowledge/pipelines/hustler.knowledge.catalog.yaml"
    read_when: "Task involves Algerian e-commerce, advertising, revenue, or the Hustler pipeline."
  - path: ".brain/.context_control/knowledge/pipelines/scaler.knowledge.catalog.yaml"
    read_when: "Task involves Agentic OS architecture, skills development, tools, or scaling."

missions_catalogs:
  - path: ".brain/.context_control/missions/definitions.missions.catalog.yaml"
    read_when: "Always read to understand the blueprints and templates of available missions."
  - path: ".brain/.context_control/missions/runs/core.missions.catalog.yaml"
    read_when: "Investigating past OS failures or reviewing core gap analysis logs."
  - path: ".brain/.context_control/missions/pipelines/hustler.missions.catalog.yaml"
    read_when: "Reviewing past advertising campaigns or Hustler execution logs."

toolbox_catalogs:
  - path: ".brain/.context_control/toolbox/core_toolbox.catalog.yaml"
    read_when: "Always read to access essential OS tools (planning, file writing, terminal, reasoning)."
  - path: ".brain/.context_control/toolbox/extended_toolbox.catalog.yaml"
    read_when: "Task requires domain-specific capabilities (e-commerce, video editing, advanced engineering)."

engines_catalogs:
  - path: ".brain/.context_control/engines/core_engines.catalog.yaml"
    read_when: "Always read to map and interface with the core OS engines (cataloger, navigator, router)."
  - path: ".brain/.context_control/engines/extended_engines.catalog.yaml"
    read_when: "Task involves visual generation, specific intelligence integrations (e.g. Drawnix, SocratiCode)."
