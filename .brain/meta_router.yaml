# 🧠 MASTER ROUTER INDEX
schema_version: "1.1"
description: "The absolute source of truth for Agentic OS routing. This map directs
  you to specialized routers. Always consult this file first before navigating the
  workspace."

# ─── Router Manifest (Schema Version Registry) ────────────────────────────────
# The sync engine validates child router versions against these expected values.
router_manifest:
  mission_board.router: "1.0"
  toolbox_library.router: "1.0"
  scaler.router: "3.1"
  hustler.router: "1.0"
  core.router: "1.0"
  projects.router: "1.0"
compatibility_matrix:
  "1.1":   # This master schema version accepts:
    mission_board: ["1.0"]
    toolbox_library: ["1.0"]
    scaler: ["3.1"]
    hustler: ["1.0"]
    core: ["1.0"]
    projects: ["1.0"]

# ─── Boot Contract Reference ──────────────────────────────────────────────────
boot_contract:
  path: ".brain/BOOT_CONTRACT.yaml"
  version: "1.0"
  description: "Machine-readable boot sequence. All agents MUST execute steps in order.
    This is the canonical source — AGENTS.md references it."

routing_instructions:
- "MANDATORY FIRST: Read BOOT_CONTRACT.yaml at boot_contract.path above and execute
  all mandatory steps before any action."
- "Step 1: Read the 'when_to_use' field for each router below to determine if it fits
  your current task."
- "Step 2: If you need context on your assignment, active goals, or current state,
  follow the mission_board path."
- "Step 3: If you need to leverage a specific capability, skill, or agent, follow
  the toolbox_library path."
- "Step 4: If you are executing a pipeline workflow, follow the respective pipeline
  router to find your exact runbook instructions, state tracker, and scratchpad."
- "Step 5: If you are working on a finite codebase, follow the projects router to
  load stack, entry point, and status."
- "CRITICAL: Never guess file paths. Always use the absolute paths explicitly provided
  within these routers."
- "CRITICAL: A schema_version mismatch between this file and a child router is a blocking
  error — do not proceed."

routers:
  runtime:
    os_engine:
      path: ".runtime/venv/requirements.txt"
      target_path: ".runtime/venv/.venv"
      description: "The central Python runtime engine for the Agentic OS. Contains
        the manifest of all installed global dependencies."
      when_to_use: "Use to check if a required Python package (e.g., playwright, httpx)
        is already installed before attempting to download it."
      expected_schema: |
        [package_name]==[version]

  brain:
    mission_board:
      path: ".brain/sessions_goals/.map/sessions_goals 02.yaml"
      index_path: ".brain/sessions_goals/.map/sessions_goals 01.yaml"
      target_path: ".brain/sessions_goals"
      description: "Contains exact paths to active sessions, goals, their statuses,
        and operational context files. Read _index.yaml first for a fast flat view
        of all sessions and goals."
      when_to_use: "Use _index.yaml for a fast boot overview. Use this router for
        full paths and detailed session/goal context."
      status_vocabulary:
        session: [active, paused, completed, archived]
        goal: [pending, in-progress, blocked, done, archived]
        priority: [LOW, MEDIUM, HIGH, CRITICAL]
      directory_conventions:
        session_dir: "SES-{PIPELINE}-{PURPOSE}/"
        session_file: "SESSION.yaml                   # canonical — always this name"
        session_scratch: ".runtime/.scratch/                     # ephemeral agent
          working space — never archived"
        goal_dir: "GOAL-{NAME}/                       # GOAL- prefix is mandatory"
        goal_file: "GOAL.yaml                         # canonical — always this name"
        goal_artifacts: "artifacts/                   # produced deliverables — archived
          with goal"
      expected_schema_ref: ".brain/.sync/sync_mission_board.md"

    toolbox_library:
      path: ".brain/toolbox_library/.map/toolbox_library.yaml"
      target_path: ".brain/toolbox_library"
      graph_path: ".brain/toolbox_library/.map/toolbox_graph.yaml"
      description: "Contains all agentic capabilities, categorized into core and extended
        domain toolboxes."
      when_to_use: "Use to find available agentic capabilities and core tools."
      graph_when_to_use: "Read toolbox_graph.yaml to understand cross-toolbox dependencies
        before chaining skills or designing multi-step agent workflows."
      expected_schema_ref: ".brain/.sync/sync_toolbox.md"

    development_standards:
      path: ".brain/_identity/Python_Integration_Standard.md"
      description: "The absolute architectural rules for adding new Python tools and
        maintaining OS portability."
      when_to_use: "Use BEFORE installing any new pip packages or building a new Python
        toolbox to ensure you follow the OS portability rules."

  workspaces:
    pipelines:
      path: "_pipelines/pipelines.yaml"
      target_path: "_pipelines/"
      description: "Index of all active OS execution pipelines."
      when_to_use: "Read to find the correct pipeline router when starting a session."
    projects:
      path: "projects/projects.yaml"
      target_path: "projects/"
      description: "Index of all finite codebases and standalone builds. Provides
        stack, entry point, type, and status for each project."
      when_to_use: "Read before touching any file under projects/. Use to discover
        project structure before editing."

# ─── Infrastructure — Supporting Subsystems ──────────────────────────────────
# These paths support execution but are not routers themselves.
# All agents must load .env BEFORE executing any tool.
infrastructure:
  env:
    path: ".runtime/venv/.env"
    description: "Environment variables for the workspace. Must be loaded before executing
      any tool (notebooklm-py, pyragify, etc.)."
    when_to_use: "Load at the start of every session before calling any Python tool."
    load_command: "Get-Content .runtime\\venv\\.env | ForEach-Object { if ($_ -match
      '^([^#][^=]*)=(.*)$') { [System.Environment]::SetEnvironmentVariable($Matches[1].Trim(),
      $Matches[2].Trim()) } }"
    expected_vars:
    - name: NOTEBOOKLM_HOME
      required: true
      default: ".runtime/auth/notebooklm"
      description: "Redirects notebooklm-py session data into the workspace for portability."

  auth:
    path: ".runtime/auth/"
    description: "Active external state — auth cookies and session profiles for third-party
      services. Contents are tracked in Git for portability."
    when_to_use: "Check here for notebooklm auth state. Do NOT store mission tracking
      or tool configs here — use .mission_board/ and .scratch/ respectively."
    contents:
      notebooklm:
        path: ".runtime/auth/notebooklm/"
        env_var: "NOTEBOOKLM_HOME"
        description: "Playwright browser profiles and cookies for notebooklm-py."

  scratch:
    path: ".runtime/.scratch/"
    description: "Ephemeral agent working data and tool configurations. Never archived.
      Safe to clear between major sessions."
    when_to_use: "Use for temporary tool configs (e.g., pyragify identity rules) and
      intermediate working files that do not need to persist."
    cleanup_policy: "Contents are ephemeral. Never archive. Safe to delete between
      sessions."
    contents:
      pyragify:
        path: ".runtime/.scratch/pyragify/"
        description: "pyragify output base directory. Organized by target (e.g., identity/,
          scaler-runbook/). Contains generated chunks and hashes."
        linked_toolbox: ".brain/toolbox_library/core/rag"

  archive:
    path: ".runtime/.archive/"
    description: "Root-level archive for deprecated workspace items, old pipeline
      runbooks, and superseded documents."
    when_to_use: "Never read actively — consult only when investigating historical
      context. All active content lives in its canonical location."
    note: "Contains deprecated runbooks and pipeline-(1).md, pipeline-(2).md drafts."

