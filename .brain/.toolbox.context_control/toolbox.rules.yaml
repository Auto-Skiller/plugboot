# 🛠️ Toolbox Rules Schema

version: "1.0"
description: "Defines the structure and requirements for all capabilities in the .toolbox/ directory."

directory_structure:
  domain_level:
    description: "Every domain folder (e.g. .toolbox/business_toolbox/marketing/) must contain these two subdirectories."
    required_folders:
      - agents/
      - skills/
    
file_standards:
  agents:
    extension: ".md"
    naming_convention: "kebab-case (e.g., social-media-manager.md)"
    purpose: "Defines a specific persona, their operating rules, and their preferred skills."
    required_frontmatter:
      name: "Agent Name"
      role: "Brief description of the agent's function"
  
  skills:
    extension: ".md"
    naming_convention: "kebab-case (e.g., write-tweet-thread.md)"
    purpose: "Step-by-step executable instructions for a specific task."
    required_frontmatter:
      name: "Skill Name"
      description: "What this skill does (used by Cataloger/Router)"
      triggers: ["list", "of", "keywords", "for", "routing"]
      version: "1.0"
      inputs: ["list", "of", "required", "context", "or", "data"]
      outputs: ["list", "of", "deliverables", "or", "state", "changes"]
      cataloger_lock: false # Optional: Set true to prevent Cataloger from overwriting description

routing_hints:
  - "The description field in the skill frontmatter is CRITICAL. It is read by the Cataloger and used by the Router."
  - "Keep triggers highly specific to avoid routing conflicts."
