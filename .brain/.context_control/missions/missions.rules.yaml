# 🎯 Missions Rules Schema

version: "1.0"
description: "Defines the structure and lifecycle for all missions in .scope/**/.missions/."

cataloger_rules:
  target_structure: "split"
  include_patterns: ["definitions/*.mission.yaml", "runs/*.catalog.yaml"]

directory_structure:
  definitions: "Contains the .mission.yaml files outlining the mission plan."
  runs: "Contains the execution logs for active or completed missions."

mission_definition_schema:
  extension: ".mission.yaml"
  naming_convention: "kebab-case (e.g., launch-campaign.mission.yaml)"
  required_fields:
    name: "Mission Name"
    description: "What the mission aims to achieve"
    scope: "The scope this mission belongs to"
    status: "pending | active | completed | failed"
    phases:
      - id: "phase-1-name"
        description: "What this phase does"
        status: "pending | active | completed"
        routing_hints: ["list", "of", "suggested", "toolboxes", "or", "skills"]

mission_lifecycle:
  1_creation: "Agent or User creates a .mission.yaml in the definitions/ folder."
  2_activation: "Mission is linked to a goal in BOARD.yaml (via mission_ref and current_phase)."
  3_execution: "Agent executes the current phase. Details logged to the runs/ folder."
  4_phase_transition: "Phase marked completed in definition. Next phase becomes active."
  5_completion: "All phases completed. Mission marked completed. BOARD.yaml goal marked done."

run_log_guidelines:
  - "Logs should capture WHAT was done, NOT a dump of the code/output."
  - "Include timestamps for every log entry."
  - "Note any failures, errors, or conflicts encountered during the run."
