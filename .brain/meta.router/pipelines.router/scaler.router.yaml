# 🧭 SCALER PIPELINE ROUTER
description: "Master index for the Scaler Pipeline. Exposes the growth engine's architecture, workflows, rules, gateway lifecycle, and tracking ledgers to the top-level system."
schema_version: "2.0"
last_updated: '2026-05-12T01:00:00+01:00'

routing_instructions:
  - "The Scaler pipeline has strict Input Modes (INTERNAL, EXTERNAL, AUTO) and Output Levels (ARCHITECTURE, CAPABILITYS, BUSSINESS, AUTO)."
  - "MANDATORY: Read all four runbook files before any Scaler execution — Architecture, Workflows, Operational-Rules, Gateway."
  - "MANDATORY: Every Scaler output must pass through the gateway (EXTERNAL/proposals/ or INTERNAL/solutions/) before integration. See Scaler-Gateway.md for the full lifecycle."
  - "MANDATORY: Consult ledgers (EXTERNAL-LEDGER.yaml or INTERNAL-LEDGER.yaml) before starting any operation to prevent anti-duplication violations."
  - "MANDATORY: Update SCALER-STATE.yaml at the start AND end of every operation cycle."
  - "scaler.tracker/ tracks every single file, card, and integration granularly — it is the ground truth for Scaler state."
  - "CRITICAL: Never guess file paths. Always use the absolute paths explicitly provided within these routers."

components:
  runbook:
    path: "pipelines/scaler/.scaler.meta/scaler.runbook/"
    description: "The identity and operational rules for the Scaler. Read ALL files before executing."
    files:
      - name: "Scaler-Architecture.md"
        description: "Defines the pipeline layers, input modes, output levels, the 6 OS aspects, the mandatory gateway law, the proposals/solutions gateway flow, and planning/execution mode behavior."
        when_to_use: "Read first — establishes the fundamental laws of how the Scaler operates. Contains the Scope Creation Law and Gateway Architecture."

      - name: "Scaler-Workflows.md"
        description: "Implements the 5-phase execution approach (Discovery → Mapping → Engineering → Architecting/Proposing → Integration) for both EXTERNAL and INTERNAL paths. Includes Discovery Analysis Intelligence (Section 5) with integration strategies: DIRECT_MOVE, ADAPT_AND_INTEGRATE, ARCHITECTURE_AUDIT, PARTIAL_EXTRACT, MERGE_WITH_PENDING."
        when_to_use: "Read when executing a Scaler task. Follow the correct phase-by-phase execution path and discovery strategy."

      - name: "Scaler-Operational-Rules.md"
        description: "Defines strict rules, constraints, and prohibitions: System Assimilation, Copy-over-Warp, No Product Builds, Zero-Drift Sync, Atomic State, Anti-Duplication, No Scope Creation Without Approval, Mandatory Gateway, Mode-Aware Integration rules (Sections 6 & 7), and full Proposal/Solution Card YAML schemas."
        when_to_use: "Read always during Scaler operations to ensure compliance. Contains the card schemas used for all gateway outputs."

      - name: "Scaler-Gateway.md"
        description: "Single authoritative reference for the full Proposal/Solution Card lifecycle: pre-card checks → card drafting → atomic ledger update → mode-aware gate (PLANNING/EXECUTION) → integration → post-integration sync. Includes validation checklist and prevention rules."
        when_to_use: "Read whenever creating a Proposal Card or Solution Card. Contains the step-by-step lifecycle, NOTES re-approval loop, and all post-integration sync requirements."

  scratch:
    path: "pipelines/scaler/.scaler.meta/scaler.scratch/"
    description: "Automation scripts and engines for the Scaler (similar to .sync_engine). Not for drafting proposals or processing data."
    files: []

  tracker:
    path: "pipelines/scaler/.scaler.meta/scaler.tracker/"
    description: "Granular tracking of all external files, internal gaps, proposals, solutions, and gateway state. Schema version 2.0 — all fields support the gateway card lifecycle."
    files:
      - name: "SCALER-STATE.yaml"
        description: "Current high-level operational state, phase, active_mode mirror (action_gate, input_mode, output_level), discovery metrics, and gateway_metrics (pending_approvals_count, integration_queue_count, last_gateway_action, active_triage). Update at START and END of every operation."
        when_to_use: "Update when changing phases, starting operations, creating cards, or completing integrations."

      - name: "EXTERNAL-LEDGER.yaml"
        description: "Schema v2.0. Tracks external files from discovery to Proposal Card to integration. Fields include: file_id, source_path, discovery_type, aspect, output_level, processed_matrix (anti-duplication), proposal_id, card_path, integration_type, pending_proposal_ref, user_decision, action_gate_at_creation, integration_status, integrated_at, scaler_notes."
        when_to_use: "Consult BEFORE any EXTERNAL operation (anti-duplication). Update ATOMICALLY when a Proposal Card is created."

      - name: "INTERNAL-LEDGER.yaml"
        description: "Schema v2.0. Tracks internal gaps from identification to Solution Card to integration. Fields include: gap_id, aspect, output_level, description, gap_path, solution_id, card_path, change_type, pending_proposal_ref, user_decision, action_gate_at_creation, integration_status, integrated_at, scaler_notes."
        when_to_use: "Consult BEFORE any INTERNAL operation (anti-duplication). Update ATOMICALLY when a Solution Card is created."

  gateway:
    external:
      path: "pipelines/scaler/EXTERNAL/proposals/"
      description: "Gateway folder for all EXTERNAL outputs. Structure: [aspect]/[level]/PROPOSAL-[ID].yaml. Valid aspects: routing_and_syncing, identity, mission_board_and_controller, toolbox_library, pipeline_scaler, pipeline_hustler. Valid levels: architecture, capabilitys, bussiness."
      when_to_use: "All EXTERNAL Scaler outputs MUST be materialized here as a Proposal Card before integration."

    internal_gaps:
      path: "pipelines/scaler/INTERNAL/gaps/"
      description: "Gap reports for all INTERNAL gaps. Structure: [aspect]/[level]/GAP-[ASPECT]-[NNN].yaml. Same aspect/level taxonomy as proposals."
      when_to_use: "Create a gap report here for every identified internal gap before drafting a Solution Card."

    internal_solutions:
      path: "pipelines/scaler/INTERNAL/solutions/"
      description: "Gateway folder for all INTERNAL outputs. Structure: [aspect]/[level]/SOLUTION-[ID].yaml. Same aspect/level taxonomy as proposals."
      when_to_use: "All INTERNAL Scaler outputs MUST be materialized here as a Solution Card before integration."
