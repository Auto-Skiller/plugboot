# 🧰 TOOLBOX: Documentation

metadata:
  name: Documentation
  description: Core agentic toolbox for producing written knowledge artifacts including
    READMEs, guides, API specs, and tutorials.
  when_to_use: Use when you need to produce or update written documentation, guides,
    specs, or any structured knowledge artifact.
content:
  agents: []
  skills:
  - name: write-docs
    path: .brain/.toolbox_library/core.toolbox/documentation/skills/write-docs
    description: 'Produce written knowledge artifacts: READMEs, guides, API specs,
      tutorials.'
    version: '1.0'
    triggers:
    - document
    - write guide
    - readme
    - tutorial
    - spec
    - wiki
    inputs:
    - source material
    - target audience
    - format
    outputs:
    - written document
    cataloger_lock: false
    when_to_use: Use when you need to create or update documentation, write a guide,
      or produce any structured written output.
  relevant_toolboxes:
  - 'notebooklm: Generating FAQs, briefing docs, and structuring large raw documentation.'
