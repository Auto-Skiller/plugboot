# 🧰 TOOLBOX: Planning

metadata:
  name: Planning
  description: Core agentic toolbox for determining and structuring the immediate
    next steps before taking action toward a goal.
  when_to_use: Use when you need to plan an approach, create a roadmap, or define
    the immediate next steps before execution.
content:
  agents: []
  skills:
  - name: determine-next-steps
    path: .brain/.toolbox_library/core.toolbox/planning/skills/determine-next-steps
    description: Determine or adjust the immediate next steps before taking action.
    version: '1.0'
    triggers:
    - plan
    - roadmap
    - next steps
    - strategy
    - how to
    - approach
    inputs:
    - current state
    - goal
    outputs:
    - action plan
    - next steps
    cataloger_lock: false
    when_to_use: Use at the start of any multi-step task or when the current plan
      needs to be adjusted before proceeding.
  relevant_toolboxes: []
