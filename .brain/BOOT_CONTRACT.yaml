# 🚀 BOOT CONTRACT — Agentic OS v5
# ─────────────────────────────────────────────────────────────────────────────
# This is the canonical, machine-readable boot sequence for the Agentic OS.
# ALL agents MUST execute these steps in exact order before taking any action.
# This file is the authoritative source — AGENTS.md references it as ground truth.
# ─────────────────────────────────────────────────────────────────────────────
schema_version: "1.0"
last_updated: "2026-05-14T23:14:00+01:00"
os_version: "Agentic OS v5"

steps:
  - id: BOOT-01
    action: read
    target: ".brain/meta_router.yaml"
    purpose: >
      Load the master routing index. This file maps every subsystem, pipeline,
      and toolbox to its exact path. Without this, all subsequent navigation is
      guesswork — a protocol violation.
    mandatory: true
    validation: "File must be readable and contain top-level keys: routers, routing_instructions"

  - id: BOOT-02
    action: execute
    target: ".brain/.sync/sync_engine.py"
    command: ".runtime\\venv\\.venv\\Scripts\\python.exe .brain\\.sync\\sync_engine.py"
    purpose: >
      Synchronize all routers, CONTROLER.yaml, and the mission board index.
      Detects drift, computes progress, and ensures all router paths reflect
      the current on-disk state before any agent reads them.
    mandatory: true
    validation: "Output must include '[!] Sync Complete.' — any error before this line requires investigation."

  - id: BOOT-03
    action: read
    target: "CONTROLER.yaml"
    purpose: >
      Load current operational state: active sessions, pipeline modes (work_mode,
      action_gate, input_mode, target_pillar), communication hub events, and
      the overall health score. This is the command bridge.
    mandatory: true
    validation: "File must contain: system_status, modes, active_sessions blocks."

  - id: BOOT-03b
    action: conditional
    condition: "CONTROLER.yaml indicates work_mode: AUTO"
    target: ".brain/_identity/System-Orchestrator-Loop.md"
    purpose: >
      If the system is in AUTO mode, the agent MUST read the Orchestrator loop
      runbook to understand its daily polling sequence and cross-pipeline duties.
    mandatory: true
    validation: "Must execute the 5-step Orchestrator Loop if no specific session is assigned."

  - id: BOOT-04
    action: conditional
    condition: "Task involves a specific pipeline (scaler, hustler, or future pipelines)"
    target: "_pipelines/pipelines.yaml"
    purpose: >
      Load the pipeline-specific router, then read ALL runbook files referenced
      within it before any execution. Partial knowledge of a pipeline is a
      protocol violation under the Core Law.
    mandatory: true
    validation: "All files listed in components.runbook.files[] must be read in full before execution begins."

  - id: BOOT-05
    action: conditional
    condition: "Task requires a specific agentic capability or skill"
    target: ".brain/toolbox_library/.map/toolbox_library.yaml"
    purpose: >
      Locate the correct toolbox for the required capability. Never build or
      install something that already exists in the toolbox library.
    mandatory: false
    validation: "Confirm the required skill/agent path exists before use."

  - id: BOOT-06
    action: conditional
    condition: "Task involves creating or modifying a project"
    target: "projects/projects.yaml"
    purpose: >
      Load the projects router to understand the project's stack, entry point,
      and status before making any changes.
    mandatory: false
    validation: "Project entry must exist in projects.router.yaml before modification."

# ─── Failure Protocol ─────────────────────────────────────────────────────────
fallback_on_failure:
  rule: >
    If any MANDATORY step fails (file missing, parse error, sync error),
    HALT immediately and report the exact failure to the user.
    Do NOT proceed with cached, guessed, or approximated context.
  prohibited_actions:
    - "Guessing file paths not present in a router"
    - "Skipping BOOT-02 sync to save time"
    - "Reading only part of a mandatory runbook"
    - "Using context from a previous conversation without re-reading physical files"

# ─── Core Laws Enforced at Boot ───────────────────────────────────────────────
core_laws:
  zero_drift_audit: >
    Always perform a fresh disk read of any file before editing it.
    Never rely on context from earlier in the same conversation for file state.
  zero_guess_law: >
    Never guess file paths. All paths must come from a router or a physical
    directory listing (list_dir tool).
  portability_law: >
    All dependencies must be installed inside the workspace (.venv, node_modules).
    Never install globally on the host OS.
  logic_preservation_law: >
    During structural moves or refactors, NO existing logic, rules, or content
    may be deleted without explicit user confirmation and a no-loss warning.
