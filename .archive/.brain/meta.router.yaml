# 🧠 MASTER ROUTER INDEX
description: "The absolute source of truth for Agentic OS routing. This map directs you to specialized routers. Always consult this file first before navigating the workspace."

routing_instructions:
  - "Step 1: Read the 'when_to_use' field for each router below to determine if it fits your current task."
  - "Step 2: If you need context on your assignment, active goals, or current state, follow the mission_board path."
  - "Step 3: If you need to leverage a specific capability, skill, or agent, follow the toolbox_library path."
  - "Step 4: If you are executing a pipeline workflow, follow the respective pipeline router to find your exact runbook instructions, state tracker, and scratchpad."
  - "CRITICAL: Never guess file paths. Always use the absolute paths explicitly provided within these routers."

routers:
  core:
    mission_board:
      path: ".brain/meta.router/mission_board.router.yaml"
      target_path: ".core/mission_board"
      description: "Contains exact paths to active sessions, goals, their statuses, and operational context files."
      when_to_use: "Use to understand current sessions, goals, and tracking."
      expected_schema: |
        sessions:
          [SESSION_ID]:
            folder_path: string
            yaml_path: string
            status: string
            progress_percentage: string
            goals:
              - name: string
                folder_path: string
                yaml_path: string
                status: string
                progress_percentage: string
                extra_files:
                  - name: string
                    description: string
                    when_to_use: string
      expected_file_schemas:
        session_file: |
          session_name: string
          details:
            agent: string
            started_at: datetime string
            summary: string
            status: string
          goals: [string]
        goal_file: |
          goal_name: string
          session: string
          details: string
          status: string
          tasks: [string]
          tracking: string
          artifacts: [string]

    toolbox_library:
      path: ".brain/meta.router/toolbox_library.router.yaml"
      target_path: ".core/toolbox_library"
      description: "Contains all agentic capabilities, categorized into core and extended domain toolboxes."
      when_to_use: "Use to find available agentic capabilities and core tools."
      expected_schema: |
        core_toolboxes:
          [TOOLBOX_NAME]:
            path: string
            yaml_path: string
            description: string
            when_to_use: string
            agent_count: int
            skill_count: int
        extended_toolboxes:
          [DOMAIN_NAME]:
            path: string
            description: string
            when_to_use: string
            sub_toolboxes:
              [TOOLBOX_NAME]:
                path: string
                yaml_path: string
                description: string
                when_to_use: string
                agent_count: int
                skill_count: int
      expected_file_schemas:
        toolbox_file: |
          name: string
          description: string
          when_to_use: string
          agents:
            - name: string
              path: string
              description: string
              when_to_use: string
          skills:
            - name: string
              skill_file:
                path: string
                description: string
                when_to_use: string
              extra_folders:
                - name: string
                  description: string
                  when_to_use: string
                  extra_files:
                    - name: string
                      path: string
                      description: string
                      when_to_use: string

  workspaces:
    pipelines:
      description: "Execution routers providing paths to runbooks, scratchpads, and tracker files."
      expected_schema: |
        pipeline: string
        meta_context:
          runbook:
            path: string
            files:
              - name: string
                description: string
                when_to_use: string
          scratch:
            path: string
            files: []
          tracker:
            path: string
            files: []
      expected_file_schemas:
        runbook_file: |
          # Title
          ## Objective
          ## Steps
          1. Step description
          ...
        scratch_file: |
          Empty or temporary code/notes.
        tracker_file: |
          # State Tracker
          ## Current Status
          ## Variables
          - var1: value
          ...
      hustler:
        path: ".brain/meta.router/pipelines.router/hustler.router.yaml"
        target_path: "pipelines/hustler"
        description: "Execution router providing paths to Hustler's runbook, scratch, and tracker files."
        when_to_use: "Use to access runbooks, scratchpads, and trackers for the hustler pipeline."
      scaler:
        path: ".brain/meta.router/pipelines.router/scaler.router.yaml"
        target_path: "pipelines/scaler"
        description: "Execution router providing paths to Scaler's runbook, scratch, and tracker files."
        when_to_use: "Use to access runbooks, scratchpads, and trackers for the scaler pipeline."
    projects: {}
