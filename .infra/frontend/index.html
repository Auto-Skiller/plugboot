<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic OS — Entity Control</title>
  <link rel="stylesheet" href=".infra/frontend/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">🚀</div>
      <div>
        <h1>Agentic OS v6.0</h1>
        <div class="brand-sub"><span class="sync-dot fresh" id="sync-dot"></span><span>ONLINE</span></div>
      </div>
    </div>
    <nav class="nav-menu" id="nav-menu">
      <div class="nav-group-label">Loading Entities...</div>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h2 class="view-title" id="view-title">Entity Viewer</h2>
    </header>

    <div class="view active" id="entity-view" style="overflow-y: auto; padding-bottom: 50px; height: calc(100vh - 70px);">
      
      <!-- Metrics Grid -->
      <div class="grid grid-3" id="metrics-grid">
      </div>

      <!-- Missions & Hubs -->
      <div class="grid grid-2" style="margin-top: 24px;">
        <div class="card">
          <div class="card-header">
            <h3>Active Missions & Queues</h3>
          </div>
          <div class="card-body" id="missions-list">
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Recent Events Log</h3>
          </div>
          <div class="card-body" id="events-log" style="max-height: 300px; overflow-y: auto;">
          </div>
        </div>
      </div>
      
      <!-- Pipelines & Toolboxes -->
      <div class="grid grid-2" style="margin-top: 24px;">
        <div class="card">
          <div class="card-header">
            <h3>Pipelines & Profiles</h3>
          </div>
          <div class="card-body" id="pipelines-list">
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Toolboxes (Domain → Hierarchy)</h3>
          </div>
          <div class="card-body" id="toolboxes-list">
          </div>
        </div>
      </div>

      <!-- Raw Board -->
      <div class="card" style="margin-top: 24px;">
        <div class="card-header">
          <h3>Raw Board Viewer</h3>
        </div>
        <div class="card-body code-block" id="raw-board">
        </div>
      </div>

    </div>
  </main>
</div>
<script src=".infra/frontend/app.js"></script>
</body>
</html>
