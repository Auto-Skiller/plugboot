####################################################
# entity VALUES 
####################################################

####################################################
# Freshness
####################################################

freshness:
  sync_status: fresh | need-syncing | syncing | error
  sync_count: integer
  last_synced: timestamp
  last_edited: timestamp
  
####################################################
#   METRICS  (engine-computed rollup, sits just below freshness)
#     Live counts across the runtime so the dashboard/user see status at a glance.
####################################################

metrics:
  review_queue: integer     # direct length of the review_queue list (Option 4 snapshot)
  backlog: integer          # direct length of the backlog list
  pillars:
    actives: integer
    validated: integer
    suggestions: integer
  evolution_objectives:
    actives: integer
    validated: integer
    suggestions: integer
  fill_queue:
    os_prompts: integer   # OS entity only (data lives in os_prompts/); projects use `data`
    data: integer         # project entity: gaps in data/ folder (only present for projects)
    missions: integer
    toolboxes: integer
    inbox:                 # 3-stage inbox pipeline: raw -> analysing -> gateway
      raw: integer        # raw drops missing semantics (status != delivered)
      analysing: integer  # analysing-block items missing fields / failing quality gates
      gateway: integer    # gateway items missing skeleton (pillar/aspect/FG) fields
    runtime:              # runtime-section gaps (NOT inbox)
      pillars: integer
      evolution_objectives: integer

################################################
#   REVIEW QUEUE  (merged with feedback)
#     → Agents → User: items that need human review.
#       Each item carries its own review feedback inline.
################################################

review_queue:
  - item: string
    feedback: string      # user/agent review note for this item ('' when none)

################################################
#   BACKLOG  (merged with feedback)
#     → Shared: ideas, next steps, and focuses
#       both agents and the user. A rolling ideas pool.
#       Each item carries its own backlog feedback inline.
################################################

backlog:
  - item: string
    feedback: string      # user/agent note for this backlog item ('' when none)

####################################################
#    PILLARS 
####################################################

pillars:
  actives: [string] # all validated with active: true

  validated:
    total: integer
    active: integer

    "pillar_name":
      status: true | false
      description: string
      why: string
      contains: string | [string]
      triggers: [string]
      relevant_paths: 
        - ""

    "...":

  suggestions:  
    total: integer

    "pillar_name":
      status: true | false # user switch to validate this pillar, once on engine needs to move it to validated_pillars:
      description: string
      why: string # why agents suggest to add this pillar
      contains: string | [string]
      triggers: [string]
      relevant_paths: 
        - ""

    "...":

####################################################
#   EVOLUTION Objectives
####################################################

evolution_objectives:
  actives: [string] # all validated with active: true

  validated:
    total: integer
    active: integer

    "objective_name":
      status: true | false
      description: string
      objective: string

    "...":

  suggestions:  
    total: integer

    "objective_name":
      status: true | false # user switch to validate this objective, once on engine needs to move it to validated:
      description: string
      objective: string

    "...":

####################################################
#   FILL QUEUE
#     → Engine → Agents: fields/files that need populating.
#       Engine flags what's empty or stale; agents fill it.
#       Key name reflects the entity: OS data => `os_prompts`,
#       project data => `data` (never the hybrid `os_prompts/data`).
####################################################

fill_queue:
  os_prompts: [string] # OS entity: gaps in os_prompts/ reference files
  data: [string] # project entity: gaps in data/ folder (only present for projects)
  missions: [string] # Gaps at missions level
  toolboxes: [string] # Gaps at toolboxes level (grouped per agent/skill file)
  inbox:                 # 3-stage inbox pipeline
    raw: [string]        # raw drops missing semantics
    analysing: [string]  # analysing-block items missing fields / failing quality gates (dupe/contains/when_to_use/disposition)
    gateway: [string]    # gateway items missing skeleton (pillar/aspect/FG) fields
  runtime:               # runtime-SECTION gaps (pillars / evolution_objectives) — NOT inbox
    pillars: [string]    # gaps in runtime.pillars.validated|suggestions (description/why/contains/triggers) + empty-section notice
    evolution_objectives: [string]  # gaps in runtime.evolution_objectives.* + empty-section notice

####################################################
#   RECENT EVENTS
#     trimed to 10 max by engine (applies to every entity runtime).
#     Newest FIRST: flat strings -> 'DD-MM-YYYY HH:MM "event"'.
#     The engine normalises any legacy {time, event} dicts into this string form.
####################################################

recent_events:
  - '09-07-2026 09:12 "[LAW-11] PASS: Daemon State Reconciliation ..."'

####################################################
# END OF VALUES SCHEMA
################################################
