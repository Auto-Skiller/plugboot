####################################################
# INBOX SCHEMA - <entity>-inbox.yaml
# Tracker + brain over the inbox folder and its gateway.
# Pipeline (4 stages):
#   DISCOVERY -> RAW -> ANALYSING -> (GATEWAY | REJECTED)
# Disk:
#   <entity>-inbox/                       live drops (agent moves them out after discovery)
#   <entity>-inbox/_drained_raw_<date>/   immutable full copy of every drop (LAW 2)
#   <entity>-inbox/.<entity>-inbox_gateway/   <Pillar>/<aspect>/<functional_group>/<items>
#   (for _os: _os/os-inbox/.os-inbox_gateway/)
####################################################

freshness:
  sync_status: fresh | need-syncing | syncing | error
  sync_count: integer
  last_synced: timestamp
  last_edited: timestamp

metrics:
  discovery_items: integer
  raw_items: integer
  analysing_items: integer
  rejected_items: integer
  duplicate_blocked: integer
  gateway_items: integer
  pillars: integer
  functional_groups: integer

# DISCOVERY - the FIRST stage. The daemon archives the drop (LAW 2) then writes
# the FULL directory tree of each new drop here. An item is NOT the top-level
# folder — the AGENT reads this tree, decides the real item boundaries (a single
# file, or a tight group of files that strictly must be processed together), and
# then creates the actual raw: entries. Maximize granularity: never blindly group.
discovery:
  "drop_name":                       # same key as the live drop folder
    drop: string                    # live drop path, e.g. _os/os-inbox/my-drop
    archived_at: timestamp          # when daemon froze it into _drained_raw_<date>/
    status: needs_analysis | analyzed   # analyzed = agent has emitted raw: items
    tree:                           # full structure, any depth; dirs -> nested dict, files -> [list]
      "subfolder/":
        "file.md": [string]         # file -> list of globbed sibling/child paths (members)
      "deep/another/":
        "run.py": [string]
    # agent-written result of discovery (optional, mirrors what was created in raw):
    decided_items: [string]

# RAW - items the agent discovered from a drop. One entry per DECIDED item
# (a file, or a tight multi-file group). NOT the drop folder itself.
# Carries `paths` so ANALYSING knows exactly where to read each member.
raw:
  "item_name":                      # agent-chosen; stable, unique
    drop: string                    # source drop folder name (back-ref to discovery)
    paths: [string]                 # member file paths (1+), relative to archived drop
    content_hash: string            # hash over the item's member files
    added_at: timestamp
    status: needs_semantics | promoted | delivered
    # promoted = moved into analysing; delivered = routed to gateway/rejected
  "...":

# ANALYSING - the SINGLE place semantics get written. Per ITEM, plus per MEMBER.
# The agent reads raw[item].paths ONCE and fills everything.
# Each member file has its OWN merged record: raw_path (source, frozen at
# archive) + gateway_path (filled on route) + semantics + status. One block per
# file => semantics, state, source and destination never drift apart.
analysing:
  "item_name":                       # same key as raw
    drop: string
    paths: [string]                 # member raw_paths (source of truth for which members exist)
    content_hash: string             # dedup key
    disposition: route | reject      # decided by agent after semantics filled
    reject_reason: string            # required when disposition == reject
    description: string              # ITEM-level: what this whole item is
    contains: string | [string]      # ITEM-level: actual things inside (not paths/provenance)
    when_to_use: string              # ITEM-level: concrete use-cases
    # PER-MEMBER merged record: semantics + state + source + destination
    members:
      "relative/path/file.md":       # keyed by raw_path
        raw_path: "relative/path/file.md"   # source, relative to drop root (frozen at archive)
        gateway_path: ""                    # filled when routed -> where it landed in gateway
        description: string
        contains: string | [string]
        when_to_use: string
        status: pending | routed | rejected | dupe   # progress
      "...":
    status: needs_semantics | ready_to_route   # ready_to_route = complete + disposition:route
    suggested_pillar: string         # agent's LAW-1 routing decision (filled at route time)
    suggested_aspect: string         # Architecture | Capabilities | Monetization
    suggested_fg: string             # functional group (LAW 4, named by function)
  "...":

# REJECTED - recoverable ledger of items the agent chose not to route.
# Never hard-deleted; user can resurrect by moving back to analysing/raw.
# CRITICAL: this is a FROZEN FULL-FIELD COPY of the analysing entry — when an
# item moves analysing -> rejected (or analysing -> gateway), EVERY field from
# analysing is carried over so no information is ever lost (move = copy, never drop).
rejected:
  "item_name":                       # same key as analysing
    drop: string
    paths: [string]                  # carried from raw/analysing
    content_hash: string             # tracks the raw file; dedup key
    reject_reason: string            # required — why it was not routed
    rejected_at: timestamp
    # full frozen copy of the analysing semantic fields (members merged):
    description: string
    contains: string | [string]
    when_to_use: string
    members:                         # per-member merged record (raw_path/gateway_path/semantics/status)
      "relative/path/file.md":
        raw_path: "relative/path/file.md"
        gateway_path: ""
        description: string
        contains: string | [string]
        when_to_use: string
        status: pending | routed | rejected | dupe
      "...":
    suggested_pillar: string
    suggested_aspect: string
    suggested_fg: string
  "...":

# GATEWAY - pillar -> aspect -> functional group -> items (copies of raw, never moves)
# Lives on disk at <entity>-inbox/.<entity>-inbox_gateway/
# aspect = Architecture | Capabilities | Monetization (the mid-level axis live data uses)
# Gateway items REUSE the analysing fields (written once, carried over) — they
# must NOT re-store provenance like "moved from raw". contains describes the
# actual things inside, never paths or "moved from ..." text.
gateway:
  "<Pillar>":                      # dynamic, matches runtime pillars
    "<aspect>":                    # Architecture | Capabilities | Monetization
      "<functional_group>":        # named by what items DO
        "item_name":
          path: string
          description: string
          contains: string | [string]
          when_to_use: string
          extracted_concern: string  # what this pillar extracts from the item
          source_raw_item: string    # back-ref into raw
          content_hash: string
          # PER-MEMBER merged record carried over from analysing.members so that
          # nothing is lost when an item routes (raw_path + gateway_path + semantics
          # + status travel together).
          members:                  # keyed by raw_path (source, frozen at archive)
            "relative/path/file.md":
              raw_path: "relative/path/file.md"   # source, relative to drop root
              gateway_path: ""                    # where it landed (filled on route)
              description: string
              contains: string | [string]
              when_to_use: string
              status: pending | routed | rejected | dupe
            "...":
        "...":
      "...":
    "...":
  "...":

# PROCESSED - INBOX-evolution anti-reprocessing tracker
processed:
  actives: integer
  "<gateway_item>":
    processed_by_missions: [string]   # evolution mission names
    aspects: [string]                 # Architecture | Capabilities | Monetization
    processed_at: timestamp
  "...":

# END OF INBOX SCHEMA
