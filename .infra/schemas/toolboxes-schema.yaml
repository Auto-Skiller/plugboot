####################################################
# TOOLBOXES — User-controlled toolbox activation
# Agent/skill/reference files are plain Markdown — no frontmatter.
# Their Full metadata is declared here so users can see what's available and control it and agents can pick actives.
####################################################

####################################################
# Freshness
####################################################

freshness:
  sync_status: fresh | need-syncing | syncing | error
  sync_count: integer
  last_synced: timestamp
  last_edited: timestamp

####################################################
# Domains, Toolboxes, agents, skills, skills references
####################################################

metrics:
  total: integer

  active:
    total: integer
    stub: integer
    functional: integer
    hardened: integer
    battle-tested: integer

  inactive:
    total: integer
    stub: integer
    functional: integer
    hardened: integer
    battle-tested: integer

"domain_name": # e.g. "agentic", "engineering"
  status: true | false
  description: string   # REQUIRED (flagged empty) ONLY IF domain has >=1 toolbox — derived from its toolboxes
  when_to_use: string   # REQUIRED (flagged empty) ONLY IF domain has >=1 toolbox — derived from its toolboxes
  path: ""

  metrics:
    total: integer

    active:
      total: integer
      stub: integer
      functional: integer
      hardened: integer
      battle-tested: integer

    inactive:
      total: integer
      stub: integer
      functional: integer
      hardened: integer
      battle-tested: integer

  "toolbox_name": # e.g. "analysis", "coding"
    status: true | false
    maturity: stub | functional | hardened | battle-tested
    description: string   # REQUIRED (flagged empty) ONLY IF toolbox has >=1 agent/skill — derived from children
    when_to_use: string   # REQUIRED (flagged empty) ONLY IF toolbox has >=1 agent/skill — derived from children
    path: ""

    agents: 
      status: true | false
      path: ""

      metrics:
        total: integer

        active:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer

        inactive:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer

      "agent_name":
        status: true | false
        maturity: stub | functional | hardened | battle-tested
        role: string            # REQUIRED (flagged empty if blank)
        description: string     # REQUIRED (flagged empty if blank)
        when_to_use: string     # REQUIRED (flagged empty if blank)
        triggers: [string]      # REQUIRED (flagged empty if [])
        path: ""                # engine-managed (auto-derived from disk; NOT required)

      "...":

    skills: 
      status: true | false
      path: ""

      metrics:
        total: integer

        active:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer

        inactive:
          total: integer
          stub: integer
          functional: integer
          hardened: integer
          battle-tested: integer
  
      "skill_name":
        status: true | false
        maturity: stub | functional | hardened | battle-tested
        role: string            # REQUIRED (flagged empty if blank)
        description: string     # REQUIRED (flagged empty if blank)
        when_to_use: string     # REQUIRED (flagged empty if blank) — must be a REAL use-case, not "Use this when the task involves…"
        triggers: [string]      # REQUIRED (flagged empty if [])
        inputs: [string]        # REQUIRED (flagged empty if [])
        outputs: [string]       # REQUIRED (flagged empty if [])
        references:
          "reference_name":
            contains: string | [string]   # what the reference actually covers (NOT a path / "moved from")
            when_to_use: string
            triggers: [string]
            path: ""            # engine-managed; NOT required
          "...":
        path: ""                # engine-managed; NOT required

      "...":

  "...":

"...":

####################################################
# END OF TOOLBOXES SCHEMA
####################################################