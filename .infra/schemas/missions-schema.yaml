####################################################
# MISSIONS
# Agents or user read and update missions.
# missions can be in PLANNING/EXECUTION modes
# missions can be direct missions or preseted (preseted are missions with preseted workflows, goals and tasks - just some parameters changed)
####################################################

####################################################
# Freshness
####################################################

freshness:
  sync_status: fresh | need-syncing | syncing | error
  sync_count: integer
  last_synced: timestamp
  last_edited: timestamp

####################################################
# Required top-level mission keys (from missions-templates.yaml)
# Law 9 (Schema-First) + GAP-1 resolution: the daemon/agent must reject a
# mission missing any of these. proposal_name is the canonical launched key.
####################################################

required:
  - proposal_name   # canonical launched mission key (from templates)
  - model
  - objective
  - priority
  - state
  - rounds


# Missions metrics
####################################################

metrics:
  total: integer
  progress_percentage: string
  actives_count: integer
  actives_progress_percentage: string
  blocked: integer

  actives: 

    standard: 

      PLANNING:
        pending: integer
        in-progress: integer
        completed: integer
        blocked: integer
      EXECUTION: 
        pending: integer
        in-progress: integer
        completed: integer
        blocked: integer

    research: 

      PLANNING:
        pending: integer
        in-progress: integer
        completed: integer
        blocked: integer
      EXECUTION: 
        pending: integer
        in-progress: integer
        completed: integer
        blocked: integer

    evolution:

      FAST: 
        PLANNING:
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer
        EXECUTION: 
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer

      DEEP:
        PLANNING:
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer
        EXECUTION: 
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer

      RESEARCH:
        PLANNING:
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer
        EXECUTION: 
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer

      INBOX:
        PLANNING:
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer
        EXECUTION: 
          pending: integer
          in-progress: integer
          completed: integer
          blocked: integer

    archived: 
      total: integer
      completed: integer
      cancelled: integer

