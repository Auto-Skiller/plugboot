####################################################
# CONFIG SCHEMA — config.yaml
# Global Control and entities Configurations.
####################################################

####################################################
# Freshness
####################################################

freshness:
  sync_status: fresh | need-syncing | syncing | error
  sync_count: integer
  last_synced: timestamp
  last_edited: timestamp

####################################################
# Top-level key Configurations
####################################################

current_window: os | "project_name" # what is the current showed window in the dashboard ui ?
manager_boot: true | false # Master switch for the MANAGER layer: does the agent start the daemon-manager at boot? (false = agent stops any running manager). Replaces the retired 'boot' auto-boot flag, now covered by autonomy + Law #12.
sync_daemon: true | false  # When false: the sync engine stop (when user needs to audit without the sync engine corrupt his changes)
dashboard:    # Dashboard UI settings (NOT the server). Server is controlled by sync_daemon.
  enabled: true | false     # Show the dashboard ui?
  auto_open: true | false   # Open it in a browser on launch?
  theme: dark | light       # UI theme
  port: integer             # Port the dashboard server listens on (used when sync_daemon: true)

####################################################
# OS key Configurations
####################################################

status: true | false # Is OS active? when false: all projects considered as status: false (they can still showen as on but they consideresd off)
autonomy: true | false # Does it run autonomously in a long loop until goal done? (anly os, projects not included)
toolboxes: true | false

inbox-gateway_delivery: true | false

missions:

  auto_triggering:
    standard: true | false
    research: true | false
    evolution: 
      FAST: true | false
      DEEP: true | false
      RESEARCH: true | false
      INBOX: true | false
      ANALYTICS: true | false

  auto_execution: 
    standard: true | false
    research: true | false
    evolution: 
      FAST: true | false
      DEEP: true | false
      RESEARCH: true | false
      INBOX: true | false
      ANALYTICS: true | false

  auto_archiving:
    standard: true | false
    research: true | false
    evolution: 
      FAST: true | false
      DEEP: true | false
      RESEARCH: true | false
      INBOX: true | false
      ANALYTICS: true | false

####################################################
# PROJECT key Configurations
####################################################

"project_name":
  status: true | false # Is project active?
  autonomy: true | false # Does it run autonomously in a long loop until goal done?
  toolboxes: true | false

  inbox-gateway_delivery: true | false

  missions:

    auto_triggering:
      standard: true | false
      research: true | false
      evolution: 
        FAST: true | false
        DEEP: true | false
        RESEARCH: true | false
        INBOX: true | false
        ANALYTICS: true | false

    auto_execution: 
      standard: true | false
      research: true | false
      evolution: 
        FAST: true | false
        DEEP: true | false
        RESEARCH: true | false
        INBOX: true | false
        ANALYTICS: true | false

    auto_archiving:
      standard: true | false
      research: true | false
      evolution: 
        FAST: true | false
        DEEP: true | false
        RESEARCH: true | false
        INBOX: true | false
        ANALYTICS: true | false

  last_progress_at: timestamp

"...":

####################################################
# END OF CONFIG SCHEMA
####################################################