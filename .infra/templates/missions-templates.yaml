####################################################
# MISSIONS TEMPLATES
####################################################

####################################################
# STANDARD MISSIONS TEMPLATES (standard missions)
####################################################

standard: 

  "mission_name":
    model: standard
    objective: string # mission objectives
    priority: CRITICAL | HIGH | MEDIUM | LOW
    last_progress_at: timestamp
    
    state:
      status: true | false
      class: PLANNING | EXECUTION
      progress: pending | in-progress | completed | blocked
      
    rounds: 
      status: true | false # when false the mission runs one time (ignore persistant: and max:), when true the mission repeats once it completed
      persistent: true | false # when true consider max: unlimited (repeats until stopped by user - ignore max:), when false look at max:
      max: integer # cant be bellow current round

    metrics:
      goals: integer
      progress_percentage: string
      tasks: integer
      round_progress_percentage: string
      round: integer

    runtime:
      recent_events: [string] # trimed to 3 max by engine

      review_queue: [string] # Agents → User: mission relevant items that need human review (Agents queue approvals requests, proposals, decisions, or blockers here.)

      backlog: [string] # mission ideas, next steps, and focuses (both agents and the user. A rolling ideas pool)

    goals:

      "goal_name":
        status: true | false
        priority: CRITICAL | HIGH | MEDIUM | LOW

        goal: string

        why: string # why we should reach that goal
        cause: string # why we do not aready reached it
        how: string # how we should reach it

        benefits: [string]
        benefits_value: CRITICAL | HIGH | MEDIUM | LOW
        costs: [string]
        costs_value: CRITICAL | HIGH | MEDIUM | LOW
        worth-it: yes | no # final recommendation (implement or not ?)

        instructions: 
          - string
          - string

      "...":

    tasks:

      "task_name":
        priority_ref: integer # 1 | 2 | 3 | .... from first task to last
        progress: pending | in-progress | completed | blocked
        last_progress_at: timestamp
          
        task: string
        instructions: 
          - string
          - string

      "...":

  "...":

####################################################
# ANALYTICS MISSIONS TEMPLATES (analytics mission type)
####################################################
# DECISION-SUPPORT, not diagnostics. Analyses PROJECT DATA and emits INSIGHTS
# for business owners / project managers: progress, bottlenecks, value, risk.
# Mirrors evolution DEEP's shape but emits insights (insight + evidence + metric)
# instead of implementable cases. analysis_methodology = how to think when
# analysing (default generic framing supplied by build_analytics_mission_type).

analytics:

  "mission_name":
    model: analytics
    subject: string # what project / entity data is being analysed
    scope: none | all | [string] # pillars/areas in scope (project-data lens)
    aspects: all | [Architecture | Capabilities | Monetization]
    priority: CRITICAL | HIGH | MEDIUM | LOW
    last_progress_at: timestamp

    state:
      status: true | false
      class: PLANNING | EXECUTION
      progress: pending | in-progress | completed | blocked

    rounds:
      status: true | false # when false the mission runs one time (ignore persistent: and max:), when true the mission repeats once it completed
      persistent: true | false # when true consider max: unlimited (repeats until stopped by user - ignore max:), when false look at max:
      max: integer # cant be bellow current round

    analysis_methodology: string # how to think when analysing (generic default: progress / bottleneck / value / risk)

    metrics:
      insights: integer
      progress_percentage: string

    runtime:
      recent_events: [string] # trimed to 3 max by engine
      review_queue: [string] # Agents → User: mission relevant items that need human review
      backlog: [string] # mission ideas, next steps, and focuses

    findings:

      "finding_name":
        status: true | false
        priority: CRITICAL | HIGH | MEDIUM | LOW
        insight: string        # the business-owner / PM insight
        evidence: string       # where it comes from (data / metric / file)
        metric: string         # the supporting number / indicator
        recommendation: string # suggested action (optional)

      "...":

  "...":

####################################################
# PRESET MISSIONS TEMPLATES (pre defined missions for spesific targets)
####################################################

research: 

  "research_name":
    model: research
    pillars: none | all | [string]
    evolution_objectives: none | all | [string] | string
    subjects: string | [string]
    priority: CRITICAL | HIGH | MEDIUM | LOW
    last_progress_at: timestamp

    state:
      status: true | false # When true: os can evolves via proposals
      class: PLANNING | EXECUTION
      progress: pending | in-progress | completed | blocked
      
    levels:
      depth_level: HIGH | MEDIUM | LOW
      details_level: HIGH | MEDIUM | LOW
      precise_level: HIGH | MEDIUM | LOW

    sources: 
      training_data: true | false
      web: true | false
      notebook_lm: true | false
      youtube: true | false
  
    metrics:
      topics: integer
      research_time: string
      progress_percentage: string

  topics: 

    "topic_name":
      status: true | false
      priority: CRITICAL | HIGH | MEDIUM | LOW

      topic: string
      
      why: string # why we need this topic and how we will use it
      keywords: [string]

      instructions: 
        - string
        - string

      "...":
  
  "...":

####################################################

evolution: 

  "proposal_name":
    model: evolution
    type: FAST | DEEP | RESEARCH | INBOX | ANALYTICS
    # the goal is always to detect (gaps, best practices, extend/enhance opportunities) across all the entity components like (board, data/os_prompts, toolboxes) and implement fixes and enhancements BASED on different sources INTERNAL modes -> (FAST -> based on realtime user intent and working outputs), (DEEP -> based on massive Deep analytics across all the entity components themselves), EXTERNAL modes -> (RESEARCH -> based on already existing researches + entity components themselves), (INBOX -> based on Deep analytics on the inbox + entity components themselves), (ANALYTICS -> based on analytics-mission findings + entity components themselves)
    pillars: all | [string]
    evolution_objectives: all | [string] | string
    action_gates: all | [string]
    priority: CRITICAL | HIGH | MEDIUM | LOW
    last_progress_at: timestamp

    state:
      status: true | false # When true: os can evolves via proposals
      class: PLANNING | EXECUTION
      progress: pending | in-progress | completed | blocked

    readiness:
      mission_params_read: false        # flip true after reading THIS mission's params
      evolution_os_prompt_read: false   # flip true after reading the evolution os_prompt
      ready_to_advance: false           # flip true ONLY when both above are true
      
    metrics:
      cases: integer
      worth-it: integer
      progress_percentage: string

    runtime:
      recent_events: [string] # trimmed to 3 max by engine

      review_queue: [string] # Agents → User: mission relevant items that need human review (Agents queue approvals requests, proposals, decisions, or blockers here.)

      backlog: [string] # mission ideas, next steps, and focuses (both agents and the user. A rolling ideas pool)

    cases:

      "case_name":
        status: true | false
        priority: CRITICAL | HIGH | MEDIUM | LOW

        case: string # gap, preference, opportunity, brand new cases
        solution: string # proposed implementation

        why: string # why we should implement this solution
        cause: string # why we do not have it already implemented
        how: string # how we should implement it
        targets: [string] # where we should implement it

        benefits: [string]
        benefits_value: CRITICAL | HIGH | MEDIUM | LOW
        costs: [string]
        costs_value: CRITICAL | HIGH | MEDIUM | LOW
        worth-it: yes | no # final recommendation (implement or not ?)

        instructions: 
          - string
          - string

      "...":

  "...":

####################################################
# END OF MISSIONS TEMPLATES
