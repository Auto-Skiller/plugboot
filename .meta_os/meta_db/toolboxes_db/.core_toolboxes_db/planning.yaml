system_metadata:
  name: planning
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .meta_os/meta_db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves planning.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - determine-next-steps
agents: {}
skills:
  determine-next-steps:
    description: "Determine and structure the immediate next steps before taking any
      action toward a goal."
    triggers: ["plan", "roadmap", "next steps", "strategy", "how to", "approach",
      "what should I do"]
    inputs: ["current state", "goal", "constraints", "action_gate mode"]
    outputs: ["ordered action plan", "dependency map", "risk flags", "checkpoint list"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/planning/skills/determine-next-steps
