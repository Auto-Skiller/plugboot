system_metadata:
  name: brainstorming
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves brainstorming.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - generate-ideas
agents: {}
skills:
  generate-ideas:
    description: "Generate ideas and explore multiple approaches when a path isn't
      clear."
    triggers: ["brainstorm", "ideate", "explore", "alternatives", "options", "what
          if"]
    inputs: ["problem statement", "constraints", "context"]
    outputs: ["divergent idea list", "categorized approaches", "recommended direction"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/brainstorming/skills/generate-ideas
