system_metadata:
  name: evaluation
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves evaluation.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - assess-quality
agents: {}
skills:
  assess-quality:
    description: "Assess outcomes and quality of executed steps against expected results."
    triggers: ["evaluate", "assess quality", "does it work", "test", "validate result",
      "review output", "qa"]
    inputs: ["execution output", "expected results", "success criteria", "context"]
    outputs: ["quality verdict", "score", "discrepancy list", "actionable feedback",
      "pass/fail gate"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/evaluation/skills/assess-quality
