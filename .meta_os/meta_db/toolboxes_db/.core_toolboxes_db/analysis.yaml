system_metadata:
  name: analysis
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves analysis.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - analyze-context
agents: {}
skills:
  analyze-context:
    description: "Perceive and break down current state, context, user input, and
      data."
    triggers: ["understand", "analyze", "assess", "breakdown", "review", "audit"]
    inputs: ["current state", "context", "user input", "data"]
    outputs: ["broken down context", "assessment", "identified constraints", "open
          questions"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/analysis/skills/analyze-context
