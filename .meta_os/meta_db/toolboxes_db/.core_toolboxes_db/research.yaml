system_metadata:
  name: research
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .meta_os/meta_db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves research.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - resolve-knowledge-gaps
agents: {}
skills:
  resolve-knowledge-gaps:
    description: "Resolve knowledge gaps by finding external information, reading
      docs, and synthesizing findings."
    triggers: ["research", "find out", "look up", "investigate", "what is", "learn
          about", "I don't know"]
    inputs: ["topic", "specific questions", "urgency", "acceptable sources"]
    outputs: ["answered questions", "synthesis", "confidence level", "unresolved gaps",
      "source list"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/research/skills/resolve-knowledge-gaps
