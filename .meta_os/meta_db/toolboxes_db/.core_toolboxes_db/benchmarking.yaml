system_metadata:
  name: benchmarking
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves benchmarking.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - compare-options
agents: {}
skills:
  compare-options:
    description: "Measure, compare, and optimize choices to ensure best path is taken."
    triggers: ["benchmark", "compare", "measure", "optimize", "best option", "which
          is better"]
    inputs: ["options list", "evaluation criteria", "constraints"]
    outputs: ["comparison matrix", "optimal choice", "rationale", "trade-offs"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/benchmarking/skills/compare-options
