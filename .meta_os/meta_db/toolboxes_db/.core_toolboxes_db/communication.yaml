system_metadata:
  name: communication
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .meta_os/meta_db/.db_shemas_db/toolboxes_shemas.yaml

  last_audited: ''

metadata:
  when_to_use: Use when the task involves communication.
  status: on # (in)
  agent_count: 0
  agent_names: []
  skill_count: 1
  skill_names:
    - format-output
agents: {}
skills:
  format-output:
    description: "Transform raw content or agent output into a polished, audience-appropriate
      format."
    triggers: ["format", "present", "write for", "summarize for", "convert to", "make
          readable", "package output"]
    inputs: ["raw content or findings", "target audience", "output format", "tone"]
    outputs: ["formatted output", "structured data (YAML/JSON)", "executive summary",
      "markdown artifact"]
    cataloger_lock: false
    path: .toolboxes/.core_toolboxes/communication/skills/format-output
