system_metadata:
  name: qa_testing
  type: db
  version: '1.0'
  schema_version: '1.0'
  schema_path: .meta_os/meta_db/.db_shemas_db/toolboxes_shemas.yaml
  last_audited: ''

metadata:
  when_to_use: Use when the task involves quality assurance, test generation, 
    test coverage, e2e testing, or verification gates.
  status: active # (in)
  agent_count: 1
  agent_names:
    - e2e-runner
  skill_count: 3
  skill_names:
    - test-coverage
    - unit-testing
    - verification-gate
agents:
  e2e-runner:
    path: .toolboxes/engineering_toolboxes/qa_testing/agents/e2e-runner
skills:
  test-coverage:
    path: .toolboxes/engineering_toolboxes/qa_testing/skills/test-coverage
  unit-testing:
    description: Interactive QA session where user reports bugs or issues 
      conversationally, and the agent files GitHub issues. Explores the codebase
      in the background for context and domain language. Use when user wants to 
      report bugs, do QA, file issues conversationally, or mentions "QA 
      session".
    path: .toolboxes/engineering_toolboxes/qa_testing/skills/unit-testing
  verification-gate:
    description: Use when about to claim work is complete, fixed, or passing, 
      before committing or creating PRs - requires running verification commands
      and confirming output before making any success claims; evidence before 
      assertions always
    origin: Superpowers
    path: .toolboxes/engineering_toolboxes/qa_testing/skills/verification-gate
