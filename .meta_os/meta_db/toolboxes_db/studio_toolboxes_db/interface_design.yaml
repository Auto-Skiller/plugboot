skills:
  banner-design:
    cataloger_lock: true
    description: "Design banners for social media, ads, website heroes, creative assets,
      and print. Multiple art direction options with AI-generated visuals. Actions:
      design, create, generate banner. Platforms: Facebook, Twitter/X, LinkedIn, YouTube,
      Instagram, Google Display, website hero, print. Styles: minimalist, gradient,
      bold typography, photo-based, illustrated, geometric, retro, glassmorphism,
      3D, neon, duotone, editorial, collage. Uses ui-ux-pro-max, frontend-design,
      ai-artist, ai-multimodal skills."
    argument-hint: "[platform] [style] [dimensions]"
    license: MIT
    metadata:
      author: claudekit
      version: "1.0.0"
    path: .toolboxes/studio_toolboxes/interface_design/skills/banner-design
  brand:
    cataloger_lock: true
    description: Brand voice, visual identity, messaging frameworks, asset 
      management, brand consistency. Activate for branded content, tone of 
      voice, marketing assets, brand compliance, style guides.
    argument-hint: "[update|review|create] [args]"
    metadata:
      author: claudekit
      version: "1.0.0"
    path: .toolboxes/studio_toolboxes/interface_design/skills/brand
  design:
    cataloger_lock: true
    description: "Comprehensive design skill: brand identity, design tokens, UI styling,
      logo generation (55 styles, Gemini AI), corporate identity program (50 deliverables,
      CIP mockups), HTML presentations (Chart.js), banner design (22 styles, social/ads/web/print),
      icon design (15 styles, SVG, Gemini 3.1 Pro), social photos (HTML→screenshot,
      multi-platform). Actions: design logo, create CIP, generate mockups, build slides,
      design banner, generate icon, create social photos, social media images, brand
      identity, design system. Platforms: Facebook, Twitter, LinkedIn, YouTube, Instagram,
      Pinterest, TikTok, Threads, Google Ads."
    argument-hint: "[design-type] [context]"
    license: MIT
    metadata:
      author: claudekit
      version: "2.1.0"
    path: .toolboxes/studio_toolboxes/interface_design/skills/design
  design-an-interface:
    cataloger_lock: true
    description: Generate multiple radically different interface designs for a 
      module using parallel sub-agents. Use when user wants to design an API, 
      explore interface options, compare module shapes, or mentions "design it 
      twice".
    path: 
      .toolboxes/studio_toolboxes/interface_design/skills/design-an-interface
  design-system:
    cataloger_lock: true
    description: Token architecture, component specifications, and slide 
      generation. Three-layer tokens (primitive→semantic→component), CSS 
      variables, spacing/typography scales, component specs, strategic slide 
      creation. Use for design tokens, systematic design, brand-compliant 
      presentations.
    argument-hint: "[component or token]"
    license: MIT
    metadata:
      author: claudekit
      version: "1.0.0"
    path: .toolboxes/studio_toolboxes/interface_design/skills/design-system
  liquid-glass-design:
    cataloger_lock: true
    description: iOS 26 Liquid Glass design system — dynamic glass material with
      blur, reflection, and interactive morphing for SwiftUI, UIKit, and 
      WidgetKit.
    path: 
      .toolboxes/studio_toolboxes/interface_design/skills/liquid-glass-design
  quality-review:
    description: Skills for analyzing web design quality and typography.
    cataloger_lock: true
    path: .toolboxes/studio_toolboxes/interface_design/skills/quality-review
  sketch:
    description: Guidelines and patterns for creating interactive, themeable, 
      multi-variant design sketches.
    cataloger_lock: true
    path: .toolboxes/studio_toolboxes/interface_design/skills/sketch
  slides:
    cataloger_lock: true
    description: Create strategic HTML presentations with Chart.js, design 
      tokens, responsive layouts, copywriting formulas, and contextual slide 
      strategies.
    argument-hint: "[topic] [slide-count]"
    metadata:
      author: claudekit
      version: "1.0.0"
    path: .toolboxes/studio_toolboxes/interface_design/skills/slides
  ui-styling:
    cataloger_lock: true
    description: Create beautiful, accessible user interfaces with shadcn/ui 
      components (built on Radix UI + Tailwind), Tailwind CSS utility-first 
      styling, and canvas-based visual designs. Use when building user 
      interfaces, implementing design systems, creating responsive layouts, 
      adding accessible components (dialogs, dropdowns, forms, tables), 
      customizing themes and colors, implementing dark mode, generating visual 
      designs and posters, or establishing consistent styling patterns across 
      applications.
    argument-hint: "[component or layout]"
    license: MIT
    metadata:
      author: claudekit
      version: "1.0.0"
    path: .toolboxes/studio_toolboxes/interface_design/skills/ui-styling
  ui-ux-pro-max:
    cataloger_lock: true
    description: "UI/UX design intelligence for web and mobile. Includes 50+ styles,
      161 color palettes, 57 font pairings, 161 product types, 99 UX guidelines, and
      25 chart types across 10 stacks (React, Next.js, Vue, Svelte, SwiftUI, React
      Native, Flutter, Tailwind, shadcn/ui, and HTML/CSS). Actions: plan, build, create,
      design, implement, review, fix, improve, optimize, enhance, refactor, and check
      UI/UX code. Projects: website, landing page, dashboard, admin panel, e-commerce,
      SaaS, portfolio, blog, and mobile app. Elements: button, modal, navbar, sidebar,
      card, table, form, and chart. Styles: glassmorphism, claymorphism, minimalism,
      brutalism, neumorphism, bento grid, dark mode, responsive, skeuomorphism, and
      flat design. Topics: color systems, accessibility, animation, layout, typography,
      font pairing, spacing, interaction states, shadow, and gradient. Integrations:
      shadcn/ui MCP for component search and examples."
    path: .toolboxes/studio_toolboxes/interface_design/skills/ui-ux-pro-max
