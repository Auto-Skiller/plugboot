system_metadata:
  name: projects_schemas
  type: schema
  version: '3.0'
  schema_version: '1.0'
  schema_path: .meta_os/meta_db/.db_shemas_db/projects_os_shemas.yaml

metadata:
  purpose:
    entry_type: static
    value: >
      Schema for the projects index DB (.meta_os/meta_db/projects_os.yaml) and individual
      project DB files under projects/.projects_os/.projects_db/. Follows Dual-Entry system.

content: {}

projects_index_schema: |
  system_metadata:
    name: string
    purpose: string
    type: db
    version: string
    schema_version: string
    schema_path: string
    freshness:
      last_synced: timestamp
      status: fresh | syncing | error

  metadata:
    modes:
      project_status: string         # (in) — set by user
    projects: {}                     # OUT — registered project entries
    hub:
      messages: [string]             # (in-out)
      recent_events: [string]        # OUT — last 3 events
      backlog: [string]              # (in-out)
    queues:                          # (in-out) — future project queues
    state:
      gateway:                       # OUT
      metrics:                       # OUT
    milestones:                      # OUT — from projects/.projects_milestones/ metadata

  milestones_history:                # OUT — last 3, from .projects_archived_milestones/
  health_history:                    # OUT — last 3 health snapshots

  indexes:
    identity_laws: {}                # OUT — from projects/.projects_identity/
    db: {}                           # OUT — from projects/.projects_db/


project_db_schema: |
  # Schema for individual project DB files under projects/.projects_db/
  system_metadata:
    name: string
    type: project
    version: string
    schema_version: string
    schema_path: string
    freshness:
      last_synced: timestamp
      status: fresh | syncing | error

  metadata:
    status: string                   # (in) — on | paused | completed | archived
    stack:
      language: string
      framework: string
      entry_point: string
    state:
      current_phase: string          # OUT
      completion_percentage: string  # OUT
      last_updated: timestamp        # OUT

  allowed_values:
    status:
      - on
      - paused
      - completed
      - archived
