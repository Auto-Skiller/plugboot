system_metadata:
  name: pipeline_hustler_mapping
  purpose: Maps trackers in .db/pipelines_db/pipeline_hustler_db/ that track the
    pipeline_hustler pipeline.
  type: pipeline
  version: '1.0'
  schema_version: '1.0'
  schema_path: .meta_os/meta_db/.db_shemas_db/pipelines_os_shemas.yaml
  freshness:
    last_synced: '2026-05-20T00:08:20.548533'
    status: fresh
metadata:
  modes:
    work_mode: STRICT 🟢
    pipeline_status: "off"
    audit_request: false
  audit_policy:
    trigger_on_goal_complete: true
    audit_check_timeout: 300
  profiles:
    INGESTION:
      action_gate:
        EXECUTION:
          - cascade_into_existing_feature
          - cascade_into_existing_product
        PLANNING:
          - validate_new_feature
          - validate_new_product
          - validate_new_focus
          - cluster_first_audit
    PROCESSING:
      action_gate:
        EXECUTION:
          - definition_extraction
          - tag_transition_new_data_to_processed
          - extract_need_from_processed_data
        PLANNING:
          - scrape_for_data_gap
          - productization_marking
  hub:
    messages: []   # (in-out)
    recent_events: []
    backlog: []   # (in-out)

  queues:
    product_gaps_queue:   # (in-out)
      - gap_id: pg-ui-framework
        description: Need a unified UI component library
        discovered_by: Antigravity
        status: open
  state:
    gateway:
      status: listening
      active_pipelines: 1
    metrics:
      throughput: 12 gaps/hr
    audit_in_progress: false
    last_audit: {}
    audit_findings: []
    rescoping_history: []
  milestones: {}
milestones_history:
health_history: []
runbook_readiness: {}
