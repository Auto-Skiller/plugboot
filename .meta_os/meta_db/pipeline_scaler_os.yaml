system_metadata:
  name: pipeline_scaler_mapping
  purpose: Maps trackers in .db/pipelines_db/pipeline_scaler_db/ that track the 
    pipeline_scaler pipeline.
  type: pipeline
  version: '1.0'
  schema_version: '3.1'
  schema_path: .meta_os/meta_db/.db_shemas_db/pipelines_os_shemas.yaml
  freshness:
    last_synced: '2026-05-20T00:08:20.548533'
    status: fresh

metadata:

  modes:
    work_mode: AUTO 🟢   # (in) — set by user
    input_mode: AUTO # (in) — set by user
    pipeline_status: on # (in) — set by user

  profiles:
    INTERNAL:
      target_pillars: # (in)
        - FOUNDATIONAL INTEGRITY
        - OPERATIONAL MUSCLES
        - VALUE GENERATION
      action_gate:
        EXECUTION: FULL   # (in)
        PLANNING:        # (in)
    EXTERNAL:
      target_pillars: # (in)
        - FOUNDATIONAL INTEGRITY
        - OPERATIONAL MUSCLES
        - VALUE GENERATION
      action_gate:
        EXECUTION:        # (in)
        PLANNING: FULL   # (in)

  hub:
    messages: [] # (in-out)
    recent_events: [] # OUT — last 3 events
    backlog: [] # (in-out)

  queues:
    scaler_review_queue: [] # (in-out)
    remediation_queue: [] # (in-out)

  state:
    current_phase: 4
    deferred_assets_count: 0
    audit_in_progress: false
    last_audit:
      outcome: CLEAN
      completed_at:
    audit_findings: []
    active_triage: []
    gateway_metrics:
      pending_approvals_count: 2
      integration_queue_count: 0
      last_gateway_action:
      last_archive_rotation:
    metrics:
      scaling_ops: 4
      systems_scaled: 0
      proposals_generated: 3
      solutions_generated: 0
      group_items_logged: 0
  milestones: {} # OUT — from milestones metadatas in pipeline_scaler/.scaler_os/scaler_milestones/

milestones_history: # OUT — only last 3 - from milestones metadatas in pipeline_scaler/.scaler_os/scaler_milestones/.scaler_archived_milestones - should support loging multi archived things like full millistones , sessions or goals

indexes:

  identity_laws: # OUT — from pipeline_scaler\.scaler_os\scaler_identity
    SCALER_CONTRACTS.yaml:
      path: pipeline_scaler/.scaler_os/scaler_identity/SCALER_CONTRACTS.yaml
    Scaler-Architecture.md:
      path: pipeline_scaler/.scaler_os/scaler_identity/Scaler-Architecture.md
    Scaler-Discovery-Logic.md:
      path: pipeline_scaler/.scaler_os/scaler_identity/Scaler-Discovery-Logic.md
    Scaler-Event-Vocabulary.md:
      path: 
        pipeline_scaler/.scaler_os/scaler_identity/Scaler-Event-Vocabulary.md
    Scaler-Gateway.md:
      path: pipeline_scaler/.scaler_os/scaler_identity/Scaler-Gateway.md
    Scaler-Operational-Rules.md:
      path: 
        pipeline_scaler/.scaler_os/scaler_identity/Scaler-Operational-Rules.md
    Scaler-Workflows.md:
      path: pipeline_scaler/.scaler_os/scaler_identity/Scaler-Workflows.md
  db: # OUT — from pipeline_scaler\.scaler_os\scaler_db
    .scaler_mixed_inbox.yaml:
      path: pipeline_scaler/.scaler_os/scaler_db/.scaler_mixed_inbox.yaml
    Foundational_Integrity.proposals.yaml:
      path: 
        pipeline_scaler/.scaler_os/scaler_db/Foundational_Integrity.proposals.yaml
    Foundational_Integrity.sources.yaml:
      path: 
        pipeline_scaler/.scaler_os/scaler_db/Foundational_Integrity.sources.yaml
    Operational_Muscles.proposals.yaml:
      path: 
        pipeline_scaler/.scaler_os/scaler_db/Operational_Muscles.proposals.yaml
    Operational_Muscles.sources.yaml:
      path: 
        pipeline_scaler/.scaler_os/scaler_db/Operational_Muscles.sources.yaml
    Value_Generation.proposals.yaml:
      path: pipeline_scaler/.scaler_os/scaler_db/Value_Generation.proposals.yaml
    Value_Generation.sources.yaml:
      path: pipeline_scaler/.scaler_os/scaler_db/Value_Generation.sources.yaml
