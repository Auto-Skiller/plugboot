            - goal_id: ROUND-CLASSIFY-AND-ROUTE-MIXED-INBOX
              status: done  # active | pending | done | archived
              description: >
                Phase 1 — Classify all 4 clusters in .scaler_mixed_inbox/ using
                the Two-Layered Organisation Protocol. Apply P-LAW-022 strong-source-identity
                check. Execute multi-pillar fan-out for applicable clusters. Route
                all items to correct typed discovery hubs. Log all decisions atomically
                in the relevant sources_ledger files.
              last_progress_at: '2026-06-19T19:24:00+01:00'
              artifacts: []

            - goal_id: ROUND-MAP-AND-ANALYZE-ALL-PILLARS
              status: done
              description: >
                Phase 2 — For each routed functional group in all 3 pillar discovery
                hubs,
                perform Strategic Interrogation, read the full group as a single unit,
                perform the Match-to-Pending check, and resolve Integration_Type +
                aspects
                for every group. Update sources_ledger with aspects.
              last_progress_at:
              artifacts: []

            - goal_id: ROUND-DRAFT-PROPOSAL-CARDS-ALL-PILLARS
              status: done
              description: >
                Phase 4 — Draft Proposal Cards (v3.1 YAML) for all resolved discoveries
                across FI, OM, and VG pillars. Post in gateway folders. Update ledgers
                atomically. Post review requests in CONTROLER.yaml (PLANNING mode).
              last_progress_at:
              artifacts: []

